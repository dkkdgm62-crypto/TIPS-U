  {id:17,nr:'17',name:'Selimi, Avdi',geb:'26.06.2015',fuss:'R/L',nat:'MKD',verein:'FC Nordstern BS',tw:false},
  {id:18,nr:'18',name:'Spahiu, Luan',geb:'25.11.2015',fuss:'L',nat:'MKD',verein:'BSC Old Boys',tw:false},

  {id:23,nr:'23',name:'Yüce, Areiz',geb:'09.10.2015',fuss:'R/L',nat:'CH',verein:'FC Allschwil',tw:false},
];
// PLAYERS ist dynamisch (BASE + Roster aus Supabase). Wird in loadRoster() neu aufgebaut.
let PLAYERS = BASE_PLAYERS.map(p=>({...p}));
const DIMS=['T','I','P','S','U'];
const DIM_FULL={T:'Technik',I:'Spielintelligenz',P:'Persönlichkeit',S:'Schnelligkeit',U:'Umfeld'};
const DIM_COLOR={T:'#e07b39',I:'#6366f1',P:'#10b981',S:'#f59e0b',U:'#3b82f6'};
const DIM_SUB={T:['Ballkontrolle','Passqualität','Dribbling 1v1','Abschluss'],I:['Vororientierung','Entscheidung','Lösungen o.Ball','Umschalten'],P:['Motivation','Resilienz','Coachability','Teamfähigkeit'],S:['Sprintkraft','Agilität','Kognitive Schnelligkeit','Ausdauer'],U:['Schule/Fussball','Fam. Support','Eigenverantwortung','Logistik']};
const CYCLES=[{key:'z1',short:'Z1',label:'Diagnostik',sub:'Juli – August'},{key:'z2',short:'Z2',label:'Hinrunde',sub:'Sep – Nov'},{key:'z3',short:'Z3',label:'Winterpause',sub:'Dez – Jan'},{key:'z4',short:'Z4',label:'Abschluss',sub:'Feb – Juni'}];
const NOTES=[1,1.25,1.5,1.75,2,2.25,2.5,2.75,3,3.25,3.5,3.75,4];
const SI_FIELDS=['wahrnehmen','loesungen','entscheidung','gegen_ball'];
const SI_LABELS=['Wahrnehmen','Lösungen','Entscheidung','Gegen Ball'];

// State
let state = {view:'dashboard', cycle:'z1', selPlayer:null, compareIds:[], data:{}, siData:{}, editPlayer:false};
let saveTimers = {};

function initState(){
  state.data={}; state.siData={};
  PLAYERS.forEach(p=>{
    state.data[p.id]={ratings:{},notes:{},position:'',defizit:'',staerke:''};
    CYCLES.forEach(c=>{
      state.data[p.id].ratings[c.key]={};
      state.data[p.id].notes[c.key]='';
      DIMS.forEach(d=>{state.data[p.id].ratings[c.key][d]={ist:null,soll:null,massnahme:''};});
    });
    state.siData[p.id]={wahrnehmen:0,loesungen:0,entscheidung:0,gegen_ball:0};
  });
}

// ═══════════════════════════════════════════════════
// ROSTER / SPIELER-VERWALTUNG (editierbar via Supabase)
// ═══════════════════════════════════════════════════
let rosterRows = [];

// PLAYERS aus BASE + Roster-Overrides neu zusammensetzen
function rebuildPlayers(){
  const map = {};
  BASE_PLAYERS.forEach(p=> map[p.id] = {...p});
  (rosterRows||[]).forEach(r=>{
    if(r.deleted){ delete map[r.id]; return; }
    map[r.id] = {id:r.id, nr:r.nr||'', name:r.name||'', geb:r.geb||'', fuss:r.fuss||'', nat:r.nat||'', verein:r.verein||'', tw:!!r.tw, rae:!!r.rae};
  });
  PLAYERS = Object.values(map).sort((a,b)=>{
    const na=parseInt(a.nr)||9999, nb=parseInt(b.nr)||9999;
    return na-nb || a.id-b.id;
  });
}

// Stellt sicher, dass state-Einträge für alle (auch neue) Spieler existieren
function ensureStateForPlayers(){
  PLAYERS.forEach(p=>{
    if(!state.data[p.id]){
      state.data[p.id]={ratings:{},notes:{},position:'',defizit:'',staerke:''};
      CYCLES.forEach(c=>{state.data[p.id].ratings[c.key]={};state.data[p.id].notes[c.key]='';DIMS.forEach(d=>{state.data[p.id].ratings[c.key][d]={ist:null,soll:null,massnahme:''};});});
    }
    if(!state.siData[p.id]) state.siData[p.id]={wahrnehmen:0,loesungen:0,entscheidung:0,gegen_ball:0};
  });
}

function nextPlayerId(){
  let mx=0;
  BASE_PLAYERS.forEach(p=>{if(p.id>mx)mx=p.id;});
  rosterRows.forEach(r=>{if(r.id>mx)mx=r.id;});
  return mx+1;
}
function nextPlayerNr(){
  let mx=0;
  PLAYERS.forEach(p=>{const n=parseInt(p.nr)||0; if(n>mx)mx=n;});
  return String(mx+1).padStart(2,'0');
}

async function loadRoster(){
  try{ const r=await sb.from('roster').select('*'); rosterRows=r.data||[]; }
  catch(e){ console.error('loadRoster',e); rosterRows=[]; }
  rebuildPlayers();
}

async function addPlayer(){
  const id=nextPlayerId();
  const rec={id,nr:nextPlayerNr(),name:'Neuer Spieler',geb:'',fuss:'R',nat:'CH',verein:'BSC Old Boys',tw:false,rae:false,deleted:false};
  await sb.from('roster').upsert(rec,{onConflict:'id'});
  if(typeof logActivity==='function') logActivity(id,'meta','Neuer Spieler erstellt',null,null,'roster','','neu');
  await loadRoster();
  ensureStateForPlayers();
  state.selPlayer=id; state.editPlayer=true;
  showView('player');
}

async function savePlayer(id){
  const g=f=>document.getElementById('pf_'+f);
  const rec={
    id,
    nr:g('nr').value.trim(),
    name:g('name').value.trim(),
    geb:g('geb').value.trim(),
    fuss:g('fuss').value,
    nat:g('nat').value.trim(),
    verein:g('verein').value.trim(),
    tw:g('tw').checked,
    rae:g('rae').checked,
    deleted:false
  };
  if(!rec.name){ alert('Bitte einen Namen eingeben.'); return; }
  await sb.from('roster').upsert(rec,{onConflict:'id'});
  if(typeof logActivity==='function') logActivity(id,'meta','Stammdaten aktualisiert: '+rec.name,null,null,'roster',null,rec.name);

const gap=(i,s)=>i&&s?parseFloat((s-i).toFixed(2)):null;
const avgVals=v=>{const f=v.filter(x=>x!=null);return f.length?parseFloat((f.reduce((a,b)=>a+b,0)/f.length).toFixed(2)):null};
const noteColor=v=>!v?'#6b7280':v<2?'#ef4444':v<3?'#f59e0b':v<4?'#22c55e':'#3b82f6';
const gapColor=g=>g==null?'#9ca3af':g>=2?'#ef4444':g>=1?'#f59e0b':'#22c55e';
const gapBg=g=>g==null?'transparent':g>=2?'rgba(239,68,68,0.12)':g>=1?'rgba(245,158,11,0.12)':'rgba(34,197,94,0.1)';
const initials=n=>{const p=n.split(',');return((p[0]?.[0]||'')+(p[1]?.trim()?.[0]||'')).toUpperCase()};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getAvg=(pid,cy)=>avgVals(DIMS.map(d=>state.data[pid]?.ratings[cy][d].ist));
const getMaxGap=(pid,cy)=>{let mg=null,md=null;DIMS.forEach(d=>{const g=gap(state.data[pid]?.ratings[cy][d].ist,state.data[pid]?.ratings[cy][d].soll);if(g!=null&&(mg==null||g>mg)){mg=g;md=d;}});return{gap:mg,dim:md}};

function noteSelect(pid,cy,dim,field,val){
  let opts=`<option value="">—</option>`;
  NOTES.forEach(n=>{opts+=`<option value="${n}"${val==n?' selected':''}>${n.toFixed(2)}</option>`;});
  return `<select class="note-select" style="color:${val?noteColor(val):'#6b7280'}" onchange="updateRating(${pid},'${cy}','${dim}','${field}',this.value?parseFloat(this.value):null)">${opts}</select>`;
}

function radarSVG(ist,soll,size=160){
  const cx=size/2,cy=size/2,r=size*0.36;
  const ang=i=>(i*2*Math.PI/5)-Math.PI/2;
  const pt=(v,i)=>{const a=ang(i),sc=Math.max(0,(v-1)/3);return[cx+r*sc*Math.cos(a),cy+r*sc*Math.sin(a)]};
  const poly=pts=>pts.map(p=>p.join(',')).join(' ');
  const grid=lv=>DIMS.map((_,i)=>{const a=ang(i),sc=lv/4;return[cx+r*sc*Math.cos(a),cy+r*sc*Math.sin(a)]});
  const istPts=DIMS.map((d,i)=>pt(ist[d]||1,i));
  const sollPts=DIMS.map((d,i)=>pt(soll[d]||1,i));
  let s=`<svg width="${size}" height="${size}">`;
  for(let lv=1;lv<=4;lv++)s+=`<polygon points="${poly(grid(lv))}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>`;
  DIMS.forEach((_,i)=>s+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(ang(i))}" y2="${cy+r*Math.sin(ang(i))}" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>`);
  if(DIMS.some(d=>soll[d]>0))s+=`<polygon points="${poly(sollPts)}" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,2"/>`;
  if(DIMS.some(d=>ist[d]>0))s+=`<polygon points="${poly(istPts)}" fill="rgba(224,123,57,0.2)" stroke="#e07b39" stroke-width="2"/>`;
  DIMS.forEach((d,i)=>{const lx=cx+(r+14)*Math.cos(ang(i)),ly=cy+(r+14)*Math.sin(ang(i));s+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="${DIM_COLOR[d]}">${d}</text>`;});
  s+=`</svg>`;return s;
}

function userShort(email){
  if(!email) return '—';
  const base=email.split('@')[0];
  const tok=base.split(/[._\-\s]/)[0]||base;
  return tok.charAt(0).toUpperCase()+tok.slice(1);
}
function formatTSShort(ts){

  return p(d.getDate())+'.'+p(d.getMonth()+1)+'. '+p(d.getHours())+':'+p(d.getMinutes());
}

function debSave(key,fn,delay=800){clearTimeout(saveTimers[key]);saveTimers[key]=setTimeout(fn,delay);}

function saveRating(pid,cy,dim,oldIst,oldSoll){
  const r=state.data[pid].ratings[cy][dim];
  debSave(`r_${pid}_${cy}_${dim}`,async()=>{
    await sb.from('ratings').upsert({player_id:pid,cycle:cy,dim,ist:r.ist,soll:r.soll,massnahme:r.massnahme||''},{onConflict:'player_id,cycle,dim'});
    const details = `${cycleLabel(cy)} · ${dimLabel(dim)} → IST: ${r.ist?.toFixed(2)||'—'} / SOLL: ${r.soll?.toFixed(2)||'—'}${r.massnahme?' · '+r.massnahme:''}`;
    logActivity(pid,'rating',details,cy,dim,'ist/soll', oldIst!=null?oldIst.toFixed(2):null, r.ist!=null?r.ist.toFixed(2):null);
  });
}
function saveNote(pid,cy,oldVal){
  debSave(`n_${pid}_${cy}`,async()=>{
    const content=state.data[pid].notes[cy];
    await sb.from('notes').upsert({player_id:pid,cycle:cy,content},{onConflict:'player_id,cycle'});
    logActivity(pid,'note',`${cycleLabel(cy)} · Notiz aktualisiert`,cy,null,'content',oldVal?.substring(0,80),content?.substring(0,80));
  });
}
function saveMeta(pid,field,oldVal){
  const d=state.data[pid];
  debSave(`m_${pid}`,async()=>{
    await sb.from('player_meta').upsert({player_id:pid,position:d.position,defizit:d.defizit,staerke:d.staerke},{onConflict:'player_id'});
    logActivity(pid,'meta',`${field}: ${d[field]||'—'}`,null,null,field,oldVal,d[field]);
  });
}
function saveSI(pid,oldVals){
  const s=state.siData[pid];
  debSave(`si_${pid}`,async()=>{
    await sb.from('si_data').upsert({player_id:pid,...s},{onConflict:'player_id'});
    const total=SI_FIELDS.reduce((a,f)=>a+(s[f]||0),0);
    logActivity(pid,'si',`W:${s.wahrnehmen} L:${s.loesungen} E:${s.entscheidung} G:${s.gegen_ball} Total:${total}`,null,null,'si_data',null,`Total: ${total}`);

}

async function manualSave(){
  const btn=document.getElementById('manualSaveBtn');
  const orig=btn?btn.innerHTML:'';
  if(btn){ btn.disabled=true; btn.style.opacity='0.65'; btn.innerHTML='<i class="ti ti-loader-2"></i> SPEICHERT…'; }
  const cy=state.cycle;
  let done=0;
  try{
    // Aktuelles Spielerprofil: Matrix + Notizen + Meta
    if(state.view==='player' && state.selPlayer){
      const pid=state.selPlayer, pd=state.data[pid];
      for(const d of DIMS){
        const r=pd.ratings[cy][d];
        await sb.from('ratings').upsert({player_id:pid,cycle:cy,dim:d,ist:r.ist,soll:r.soll,massnahme:r.massnahme||''},{onConflict:'player_id,cycle,dim'});
      }
      await sb.from('notes').upsert({player_id:pid,cycle:cy,content:pd.notes[cy]||''},{onConflict:'player_id,cycle'});
      await sb.from('player_meta').upsert({player_id:pid,position:pd.position,defizit:pd.defizit,staerke:pd.staerke},{onConflict:'player_id'});
      await logActivity(pid,'rating','Manuell gespeichert · '+cycleLabel(cy)+' (Matrix + Profil)',cy,null,'manual',null,'Speicherstand');
      await logActivity(pid,'meta','Manuell gespeichert · Profil/Notizen '+cycleLabel(cy),null,null,'manual',null,'Speicherstand');
      done++;
    }
    // SI-Erfassung: alle Spieler
    if(state.view==='si'){
      for(const p of PLAYERS){ const s=state.siData[p.id]; await sb.from('si_data').upsert({player_id:p.id,...s},{onConflict:'player_id'}); }
      await logActivity(PLAYERS[0]?PLAYERS[0].id:1,'si','Manuell gespeichert · SI-Erfassung (alle Spieler)',null,null,'manual',null,'Speicherstand');
      done++;
    }
    // Detailbogen
    if(state.view==='detail' && state.tipsSelPlayer){
      const pid=state.tipsSelPlayer, t=ensureTips(pid,cy);
      await sb.from('tips_detail').upsert({player_id:pid,cycle:cy,scores:t.scores,beobachter:t.beobachter,entwicklung:t.entwicklung},{onConflict:'player_id,cycle'});
      await logActivity(pid,'tips','Manuell gespeichert · Detailbogen '+cycleLabel(cy),cy,null,'manual',null,'Speicherstand');
      done++;
    }
    // Anderer Bereich → trotzdem Snapshot-Eintrag
    if(done===0){
      await logActivity(state.selPlayer||(PLAYERS[0]&&PLAYERS[0].id)||1,'meta','Manueller Speicherstand ('+state.view+')',null,null,'manual',null,'Speicherstand');
    }
    showSavedToast('✓ Stand gespeichert');
    refreshStamps();
  }catch(e){
    console.error('manualSave',e);
    showSavedToast('Fehler – bitte activity_log in Supabase prüfen', false);
  }
  if(btn){ btn.disabled=false; btn.style.opacity='1'; btn.innerHTML=orig; }
}

function updateRating(pid,cy,dim,field,val){

  const sel=document.querySelector(`[data-notesel="${pid}_${cy}_${dim}_${field}"]`);
  if(sel)sel.style.color=val?noteColor(val):'#6b7280';
}
function updateMassnahme(pid,cy,dim,val){
  state.data[pid].ratings[cy][dim].massnahme=val;

function updateNote(pid,cy,val){

}
function updateField(pid,f,val){
  const old=state.data[pid][f];

}
function updateSI(pid,field,delta){
  const old={...state.siData[pid]};
  state.siData[pid][field]=Math.max(0,(state.siData[pid][field]||0)+delta);
  saveSI(pid,old);
  const el=document.getElementById(`si_val_${pid}_${field}`);
  if(el)el.textContent=state.siData[pid][field];
  const tot=document.getElementById(`si_tot_${pid}`);
  if(tot){const t=SI_FIELDS.reduce((a,f)=>a+(state.siData[pid][f]||0),0);tot.textContent=t;tot.style.color=t>0?noteColor(Math.min(4,1+t*3/20)):'rgba(255,255,255,0.2)';}
  const rang=document.getElementById(`si_rang_${pid}`);
  if(rang){const t=SI_FIELDS.reduce((a,f)=>a+(state.siData[pid][f]||0),0);rang.innerHTML=t>0?`<span style="font-size:11px;font-weight:700;background:rgba(99,102,241,0.15);color:#818cf8;padding:3px 9px;border-radius:5px">${t} Pkt</span>`:`<span style="color:rgba(255,255,255,0.15);font-size:12px">—</span>`;}

  else if(v==='player')renderPlayer();
  else if(v==='detail')renderTipsDetail();
  else if(v==='vergleich')renderVergleich();
  else if(v==='si')renderSI();
  else if(v==='spiele')renderSpiele();
  else if(v==='makro')renderMakro();
  else if(v==='verlauf')renderVerlauf();
}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

function noteSelectDirect(pid,cy,dim,field,val){
  let opts=`<option value="">—</option>`;
  NOTES.forEach(n=>{opts+=`<option value="${n}"${val==n?' selected':''}>${n.toFixed(2)}</option>`;});
  return `<select class="note-select" style="color:${val?noteColor(val):'#6b7280'}" onchange="updateRating(${pid},'${cy}','${dim}','${field}',this.value?parseFloat(this.value):null)">${opts}</select>`;
}

    });

  } else {
    cards=`<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.4)"><i class="ti ti-git-compare" style="font-size:40px;display:block;margin-bottom:10px;opacity:.3"></i>Spieler oben auswählen</div>`;

  document.getElementById('mainContent').innerHTML=`<div class="card" style="padding:14px 16px;margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:.08em;margin-bottom:10px">SPIELER AUSWÄHLEN (max. 3)</div><div style="display:flex;gap:5px;flex-wrap:wrap">${btns}</div></div>${cards}`;

function toggleCompare(id){
  if(state.compareIds.includes(id))state.compareIds=state.compareIds.filter(x=>x!==id);
  else if(state.compareIds.length<3)state.compareIds.push(id);
  renderVergleich();
}

// RGB-Hilfsfunktionen für jsPDF
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}
function noteRgb(v){
  if(!v)return[107,114,128];
  if(v<2)return[239,68,68];
  if(v<3)return[245,158,11];
  if(v<4)return[34,197,94];
  return[59,130,246];
}
function gapRgb(g){
  if(g==null)return[156,163,175];
  if(g>=2)return[239,68,68];
  if(g>=1)return[245,158,11];
  return[34,197,94];
}

// Zeichnet eine Spieler-Karte in den PDF-Doc
// x/y = obere linke Ecke, w/h = Breite/Höhe der Karte
function drawPlayerCard(doc, p, cy, x, y, w, h) {
  const pd = state.data[p.id];
  const cyInfo = CYCLES.find(c=>c.key===cy);
  const avg = getAvg(p.id, cy);

  // ── Kartenhintergrund ──────────────────────────────
  doc.setFillColor(17, 29, 46);
  doc.roundedRect(x, y, w, h, 4, 4, 'F');
  doc.setDrawColor(40, 60, 85);
  doc.setLineWidth(0.4);
  doc.roundedRect(x, y, w, h, 4, 4, 'S');

  // ── Oranger Kopfbalken ────────────────────────────
  doc.setFillColor(224, 123, 57);
  doc.roundedRect(x, y, w, 10, 4, 4, 'F');
  doc.setFillColor(224, 123, 57);
  doc.rect(x, y+4, w, 6, 'F'); // untere Ecken gerade

  // ── Kopfzeile: Name + Nr ──────────────────────────
  doc.setFont(undefined, 'bold');
  doc.setFontSize(12);
  doc.setTextColor(255, 255, 255);
  const nameStr = `${p.nr}  ${p.name}`;
  doc.text(nameStr, x+5, y+7);

  // Zyklus-Label rechts im Kopfbalken
  doc.setFontSize(8);
  doc.setFont(undefined, 'normal');
  doc.text(`${cyInfo.short} · ${cyInfo.label}`, x+w-5, y+7, {align:'right'});

  // ── Stammdaten Zeile ──────────────────────────────
  const infoY = y + 15;
  doc.setFontSize(8);
  doc.setFont(undefined, 'normal');
  doc.setTextColor(160, 175, 195);
  const infoStr = `Geb: ${p.geb}  ·  Fuss: ${p.fuss}  ·  Nat: ${p.nat}  ·  Verein: ${p.verein}${p.tw?' · TW':''}${p.rae?' · RAE':''}`;
  doc.text(infoStr, x+5, infoY);

  // Trennlinie
  doc.setDrawColor(40, 60, 85);
  doc.setLineWidth(0.3);
  doc.line(x+4, infoY+3, x+w-4, infoY+3);

  // ── TIPS/U Matrix ─────────────────────────────────
  const matrixStartY = infoY + 8;
  const colW = [52, 18, 18, 16, w - 52 - 18 - 18 - 16 - 10]; // Dim | IST | SOLL | GAP | Massnahme
  const colX = [x+5, x+57, x+75, x+93, x+109];
  const rowH = 9;

  // Tabellen-Header
  doc.setFontSize(7);
  doc.setFont(undefined, 'bold');
  doc.setTextColor(130, 145, 165);
  ['DIMENSION', 'IST', 'SOLL', 'GAP', 'MASSNAHME'].forEach((h,i)=>{
    doc.text(h, colX[i] + (i>0&&i<4 ? colW[i]/2 : 0), matrixStartY, {align: i>0&&i<4 ? 'center' : 'left'});
  });

  // Tabellen-Trennlinie
  doc.setDrawColor(40, 60, 85);
  doc.line(x+4, matrixStartY+2, x+w-4, matrixStartY+2);

  // Matrix-Zeilen
  DIMS.forEach((dim, idx) => {
    const r = pd.ratings[cy][dim];
    const g = gap(r.ist, r.soll);
    const rowY = matrixStartY + 5 + idx * rowH;
    const dimRgb = hexToRgb(DIM_COLOR[dim]);

    // Zebra-Hintergrund
    if(idx%2===0){
      doc.setFillColor(22, 35, 55);
      doc.rect(x+4, rowY-5, w-8, rowH, 'F');
    }

    // Dim-Badge (farbiger Kreis)
    doc.setFillColor(...dimRgb);
    doc.circle(colX[0]+3, rowY-1.5, 2.5, 'F');
    doc.setFontSize(6);
    doc.setFont(undefined,'bold');
    doc.setTextColor(255,255,255);
    doc.text(dim, colX[0]+3, rowY-0.8, {align:'center'});

    // Dim-Name
    doc.setFontSize(8);
    doc.setFont(undefined,'bold');
    doc.setTextColor(...dimRgb);
    doc.text(DIM_FULL[dim], colX[0]+9, rowY);

    // IST
    if(r.ist){
      doc.setFont(undefined,'bold');
      doc.setFontSize(8);
      doc.setTextColor(...noteRgb(r.ist));
      doc.text(r.ist.toFixed(2), colX[1]+colW[1]/2, rowY, {align:'center'});
    } else {
      doc.setTextColor(100,115,130);
      doc.setFont(undefined,'normal');
      doc.text('—', colX[1]+colW[1]/2, rowY, {align:'center'});
    }

    // SOLL
    if(r.soll){
      doc.setFont(undefined,'bold');
      doc.setFontSize(8);
      doc.setTextColor(99,102,241);
      doc.text(r.soll.toFixed(2), colX[2]+colW[2]/2, rowY, {align:'center'});
    } else {
      doc.setTextColor(100,115,130);
      doc.setFont(undefined,'normal');
      doc.text('—', colX[2]+colW[2]/2, rowY, {align:'center'});
    }

    // GAP
    if(g!=null){
      doc.setFont(undefined,'bold');
      doc.setFontSize(8);
      doc.setTextColor(...gapRgb(g));
      const gStr = (g>=0?'+':'')+g.toFixed(2)+(g>=2?' ⚠':'');
      doc.text(gStr, colX[3]+colW[3]/2, rowY, {align:'center'});
    } else {
      doc.setTextColor(100,115,130);
      doc.setFont(undefined,'normal');
      doc.text('—', colX[3]+colW[3]/2, rowY, {align:'center'});
    }

    // Massnahme (abgeschnitten wenn zu lang)
    if(r.massnahme){
      doc.setFont(undefined,'normal');
      doc.setFontSize(7);
      doc.setTextColor(180,190,205);
      const ms = r.massnahme.length>38 ? r.massnahme.substring(0,36)+'…' : r.massnahme;
      doc.text(ms, colX[4], rowY);
    }
  });

  // Trennlinie nach Matrix
  const afterMatrixY = matrixStartY + 5 + DIMS.length * rowH + 1;
  doc.setDrawColor(40, 60, 85);
  doc.line(x+4, afterMatrixY, x+w-4, afterMatrixY);

  // ── Stärke / Defizit ─────────────────────────────
  const sdY = afterMatrixY + 6;
  const halfW = (w-14)/2;

  // Stärke Box
  doc.setFillColor(22, 55, 35);
  doc.roundedRect(x+4, sdY-4, halfW, 10, 2, 2, 'F');
  doc.setFont(undefined,'bold');
  doc.setFontSize(7);
  doc.setTextColor(34,197,94);
  doc.text('STÄRKE', x+6, sdY);
  doc.setFont(undefined,'normal');
  doc.setTextColor(180,210,185);
  const staerkeStr = pd.staerke ? (pd.staerke.length>28?pd.staerke.substring(0,26)+'…':pd.staerke) : '—';
  doc.text(staerkeStr, x+6, sdY+4.5);

  // Defizit Box
  doc.setFillColor(55, 22, 22);
  doc.roundedRect(x+4+halfW+6, sdY-4, halfW, 10, 2, 2, 'F');
  doc.setFont(undefined,'bold');
  doc.setFontSize(7);
  doc.setTextColor(239,68,68);
  doc.text('DEFIZIT', x+4+halfW+8, sdY);
  doc.setFont(undefined,'normal');
  doc.setTextColor(210,180,180);
  const defizitStr = pd.defizit ? (pd.defizit.length>28?pd.defizit.substring(0,26)+'…':pd.defizit) : '—';
  doc.text(defizitStr, x+4+halfW+8, sdY+4.5);

  // ── Trainer-Notizen ───────────────────────────────
  const noteY = sdY + 13;
  doc.setFont(undefined,'bold');
  doc.setFontSize(7);
  doc.setTextColor(245,158,11);
  doc.text(`NOTIZEN · ${cyInfo.label.toUpperCase()}`, x+5, noteY);

  doc.setFillColor(14, 22, 36);
  const noteBoxH = h - (noteY - y) - 5;
  doc.roundedRect(x+4, noteY+2, w-8, noteBoxH, 2, 2, 'F');

  if(pd.notes[cy]){
    doc.setFont(undefined,'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(180,190,205);
    // Text umbrechen
    const splitNotes = doc.splitTextToSize(pd.notes[cy], w-14);
    const visibleLines = splitNotes.slice(0, Math.floor(noteBoxH/4.5));
    doc.text(visibleLines, x+6, noteY+7);
  } else {
    doc.setFont(undefined,'normal');
    doc.setFontSize(7);
    doc.setTextColor(80,95,115);
    doc.text('Keine Notizen erfasst.', x+6, noteY+7);
  }

  // ── Durchschnitt Ø oben rechts ────────────────────
  if(avg){
    const rgb = noteRgb(avg);
    doc.setFillColor(...rgb);
    doc.roundedRect(x+w-24, y+12, 20, 9, 2, 2, 'F');
    doc.setFont(undefined,'bold');
    doc.setFontSize(8);
    doc.setTextColor(255,255,255);
    doc.text(`Ø ${avg.toFixed(2)}`, x+w-14, y+18, {align:'center'});
  }
}

// Gesamt-Team: alle Spieler, 2 pro Seite, Querformat

async function exportProfilesPDF() {
  const {jsPDF} = window.jspdf;
  const cy = state.cycle;
  const cyLabel = CYCLES.find(c=>c.key===cy)?.label || cy;

  const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
  // A4 landscape: 297 x 210 mm
  const PW = 297, PH = 210;
  const margin = 8;
  const cardW = (PW - margin*3) / 2;  // 2 Karten nebeneinander
  const cardH = PH - margin*2 - 12;   // Höhe minus Kopfzeile und Rand
  const headerH = 10;

  PLAYERS.forEach((p, idx) => {
    const pageIdx = Math.floor(idx / 2);
    const posOnPage = idx % 2; // 0 = links, 1 = rechts

    if(posOnPage === 0){
      if(pageIdx > 0) doc.addPage();
      // Seitenhintergrund
      doc.setFillColor(13, 21, 32);
      doc.rect(0, 0, PW, PH, 'F');

      // Seitenheader
      doc.setFontSize(9);
      doc.setFont(undefined,'bold');
      doc.setTextColor(224,123,57);
      doc.text('FE12 Old Boys · TIPS/U Spielerprofile', margin, margin+4);
      doc.setFont(undefined,'normal');
      doc.setTextColor(120,135,155);
      doc.text(`${cyLabel} · Erstellt: ${new Date().toLocaleDateString('de-CH')}`, margin, margin+8);
      // Seitenzahl rechts
      doc.setTextColor(80,95,115);
      doc.text(`Seite ${pageIdx+1} / ${Math.ceil(PLAYERS.length/2)}`, PW-margin, margin+4, {align:'right'});
      // Trennlinie
      doc.setDrawColor(40,60,85);
      doc.setLineWidth(0.4);
      doc.line(margin, margin+10, PW-margin, margin+10);
    }

    // Karten-X-Position
    const cardX = margin + posOnPage * (cardW + margin);
    const cardY = margin + headerH;

    drawPlayerCard(doc, p, cy, cardX, cardY, cardW, cardH);
  });

  doc.save(`FE12_Profile_${cyLabel}_${new Date().toISOString().slice(0,10)}.pdf`);
}

const TIPS_NCRIT = TIPS_CATS.reduce((a,c)=>a+c.items.length,0);

const critIdD = (k,i)=>k+(i+1);
const detColor = v=>({1:'#ef4444',2:'#f59e0b',3:'#22c55e',4:'#3b82f6'}[v]||'#6b7280');

function ensureTips(pid,cy){
  if(!state.tipsDetail) state.tipsDetail={};
  if(!state.tipsDetail[pid]) state.tipsDetail[pid]={};
  if(!state.tipsDetail[pid][cy]) state.tipsDetail[pid][cy]={scores:{},beobachter:'',entwicklung:''};
  return state.tipsDetail[pid][cy];
}
function tipsTotals(t){
  let total=0,assessed=0; const cats={};
  TIPS_CATS.forEach(c=>{
    let sum=0,cnt=0;
    c.items.forEach((_,i)=>{const v=t.scores[critIdD(c.key,i)]; if(v){sum+=v;cnt++;total+=v;assessed++;}});
    cats[c.key]={sum,cnt,avg:cnt?(sum/cnt).toFixed(2):null};
  });
  return {total,assessed,cats,avg:assessed?(total/assessed).toFixed(2):'—'};
}
async function loadTipsDetail(){
  state.tipsDetail={};
  try{
    const r=await sb.from('tips_detail').select('*');
    (r.data||[]).forEach(row=>{
      if(!state.tipsDetail[row.player_id]) state.tipsDetail[row.player_id]={};
      state.tipsDetail[row.player_id][row.cycle]={scores:row.scores||{},beobachter:row.beobachter||'',entwicklung:row.entwicklung||''};
    });
  }catch(e){console.error('loadTipsDetail',e);}
}
function saveTipsDetail(pid,cy){
  const t=ensureTips(pid,cy);
  debSave('tips_'+pid+'_'+cy,async()=>{
    await sb.from('tips_detail').upsert({player_id:pid,cycle:cy,scores:t.scores,beobachter:t.beobachter,entwicklung:t.entwicklung},{onConflict:'player_id,cycle'});
    if(typeof logActivity==='function'){const tt=tipsTotals(t);logActivity(pid,'tips',cycleLabel(cy)+' · Detailbogen ('+tt.assessed+'/'+TIPS_NCRIT+' · Total '+tt.total+')',cy,null,'tips_detail',null,'Total '+tt.total);}
  });
}
function setTipsScore(pid,cy,cid,v){
  const t=ensureTips(pid,cy);
  if(t.scores[cid]===v) delete t.scores[cid]; else t.scores[cid]=v;
  saveTipsDetail(pid,cy);
  renderTipsDetail();
}
function setTipsMeta(pid,cy,field,val){
  const t=ensureTips(pid,cy);
  t[field]=val; saveTipsDetail(pid,cy);
}
function selectTipsPlayer(id){ state.tipsSelPlayer=id?parseInt(id):null; renderTipsDetail(); }

      <span style="font-size:13px;color:rgba(255,255,255,0.5)">Ø: <b style="color:${tot.avg!=='—'?noteColor(parseFloat(tot.avg)):'#e2e8f0'}">${tot.avg}</b></span>
      <span style="font-size:11px;color:rgba(255,255,255,0.35);margin-left:auto">bewertet: ${tot.assessed} / ${TIPS_NCRIT}</span>

    <p style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:4px;padding:0 4px">Automatisch gespeichert · gebunden an Spieler &amp; Zyklus (${cyInfo.short}). Zyklus oben rechts umschaltbar.</p>`;

// ── TIPS Detailbogen PDF (weiss, Noten farbig, TIPS/U Matrix oben) ──
function drawTipsPlayerPDF(doc,p,cy){
  const t=ensureTips(p.id,cy);
  const tot=tipsTotals(t);
  const cyInfo=CYCLES.find(c=>c.key===cy);
  const pd=state.data[p.id];
  const detRgb=v=>({1:[239,68,68],2:[245,158,11],3:[34,197,94],4:[59,130,246]}[v]||[120,130,145]);

  // Kopf (weisser Hintergrund = Standard)
  doc.setFontSize(15);doc.setFont(undefined,'bold');doc.setTextColor(224,123,57);
  doc.text('TIPS-Detailbogen',14,16);
  doc.setFontSize(10);doc.setFont(undefined,'bold');doc.setTextColor(30,41,59);
  doc.text(p.nr+'  '+p.name,14,23);
  doc.setFontSize(8);doc.setFont(undefined,'normal');doc.setTextColor(90,100,115);
  doc.text(cyInfo.label+' ('+cyInfo.short+')  ·  Beobachter: '+(t.beobachter||'—')+'  ·  Entwicklung: '+(t.entwicklung||'—')+'  ·  '+new Date().toLocaleDateString('de-CH'),14,28);
  doc.setDrawColor(224,123,57);doc.setLineWidth(0.5);doc.line(14,31,196,31);

  // ── TIPS/U Matrix (kompakt, quer) ──
  doc.setFontSize(8.5);doc.setFont(undefined,'bold');doc.setTextColor(30,41,59);
  doc.text('TIPS/U Matrix · '+cyInfo.short,14,37);
  const istRow=['IST'], sollRow=['SOLL'], gapRow=['GAP'];
  DIMS.forEach(d=>{
    const r=pd.ratings[cy][d];
    istRow.push(r.ist!=null?r.ist.toFixed(2):'–');
    sollRow.push(r.soll!=null?r.soll.toFixed(2):'–');
    const g=gap(r.ist,r.soll);
    gapRow.push(g!=null?(g>=0?'+':'')+g.toFixed(2):'–');
  });
  doc.autoTable({
    startY:39,
    head:[['', 'T · Technik','I · Intelligenz','P · Persönl.','S · Schnell.','U · Umfeld']],
    body:[istRow,sollRow,gapRow],
    theme:'grid',
    styles:{fontSize:8,cellPadding:1.6,halign:'center',lineColor:[210,215,222],lineWidth:0.2,textColor:[40,50,65]},
    headStyles:{fillColor:[238,241,245],textColor:[60,72,90],fontStyle:'bold',fontSize:7.5,halign:'center'},
    columnStyles:{0:{halign:'left',fontStyle:'bold',cellWidth:18,fillColor:[238,241,245]}},
    margin:{left:14,right:14},
    didParseCell:function(data){
      if(data.section==='body' && data.column.index>0){
        const raw=data.cell.raw;
        if(raw==='–'){data.cell.styles.textColor=[165,173,183];return;}
        const num=parseFloat(String(raw).replace('+',''));
        data.cell.styles.fontStyle='bold';
        data.cell.styles.textColor = data.row.index===2 ? gapRgb(num) : noteRgb(num);
      }
    }
  });
  let y=doc.lastAutoTable.finalY+4;

  // ── Total / Ø / bewertet (oben, 1. Seite) ──
  doc.setFillColor(245,247,250);
  doc.roundedRect(14,y,182,9,2,2,'F');
  doc.setFillColor(224,123,57);doc.rect(14,y,1.5,9,'F');
  doc.setFontSize(9.5);doc.setFont(undefined,'bold');doc.setTextColor(30,41,59);
  doc.text('Total: '+tot.total+' / '+TIPS_MAX,19,y+6);
  doc.setFont(undefined,'normal');doc.setTextColor(90,100,115);
  doc.text('Ø: '+tot.avg,82,y+6);
  doc.text('bewertet: '+tot.assessed+' / '+TIPS_NCRIT,118,y+6);
  y+=13;

  // Legende
  doc.setFontSize(6.8);doc.setFont(undefined,'normal');doc.setTextColor(120,130,145);
  doc.text(TIPS_LEGEND,14,y);
  y+=3;

  // ── Kategorien ──
  TIPS_CATS.forEach(c=>{
    if(y>262){doc.addPage();y=16;}
    const col=hexToRgb(DIM_COLOR[c.key]||'#e07b39');
    doc.setFontSize(9.5);doc.setFont(undefined,'bold');doc.setTextColor(col[0],col[1],col[2]);
    doc.text(c.key+' · '+c.title+(tot.cats[c.key].avg?'   (Ø '+tot.cats[c.key].avg+')':''),14,y+1);
    const body=c.items.map((it,i)=>{const v=t.scores[critIdD(c.key,i)];return [c.key+(i+1),'Er/Sie '+it, v?String(v):'–'];});
    doc.autoTable({
      startY:y+2.5,
      head:[['#','Kriterium','Note']],
      body:body,
      theme:'plain',
      styles:{fontSize:7,cellPadding:1.1,textColor:[40,50,65]},
      headStyles:{fillColor:[238,241,245],textColor:[60,72,90],fontStyle:'bold',fontSize:7},
      alternateRowStyles:{fillColor:[248,249,251]},
      columnStyles:{0:{cellWidth:11,halign:'center',textColor:[120,130,145]},1:{cellWidth:163},2:{cellWidth:14,halign:'center',fontStyle:'bold'}},
      margin:{left:14,right:14},
      didParseCell:function(data){
        if(data.section==='body' && data.column.index===2){
          const raw=data.cell.raw;
          if(raw && raw!=='–'){ data.cell.styles.textColor=detRgb(parseInt(raw)); }
          else { data.cell.styles.textColor=[170,178,188]; }
        }
      }
    });
    y=doc.lastAutoTable.finalY+3;
  });
}

      return`<div style="background:${bg};${border};border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s" onclick="makroExpanded=${isExp?'null':w.kw};renderMakro()" onmouseenter="this.style.borderColor='${TYP_BORDER[w.typ]||'rgba(255,255,255,0.2)'}'" onmouseleave="this.style.borderColor='${isCurrent?'#e07b39':'rgba(255,255,255,0.06)'}'">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:${isExp?'10':'0'}px">
          <div style="width:36px;height:36px;border-radius:8px;background:${TYP_COLOR[w.typ]||'rgba(255,255,255,0.06)'};border:1px solid ${TYP_BORDER[w.typ]||'rgba(255,255,255,0.1)'};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:8px;color:rgba(255,255,255,0.4);letter-spacing:.05em">KW</span>
            <span style="font-size:14px;font-weight:800;color:${TYP_BORDER[w.typ]||'#e2e8f0'};line-height:1">${w.kw}</span>
          </div>
          <div style="flex:1;min-width:0">
            ${isCurrent?`<span style="font-size:9px;font-weight:700;background:#e07b39;color:#fff;padding:1px 6px;border-radius:3px;margin-bottom:3px;display:inline-block">AKTUELLE WOCHE</span><br>`:''}
            ${w.dna?`<span style="font-size:9px;font-weight:700;color:${DNA_COLOR[w.dna]||'#fff'};letter-spacing:.04em">DNA: ${w.dna}${w.me?' · '+w.me:''}</span><br>`:''}
            <span style="font-size:12px;font-weight:600;color:#e2e8f0">${esc(w.label||w.ta||w.hp||'—')}</span>
          </div>
          <span style="font-size:9px;font-weight:700;color:${TYP_BORDER[w.typ]||'rgba(255,255,255,0.3)'};background:${TYP_COLOR[w.typ]||'rgba(255,255,255,0.04)'};padding:2px 7px;border-radius:4px;flex-shrink:0">${TYP_LABEL[w.typ]||''}</span>
          <i class="ti ti-chevron-${isExp?'up':'down'}" style="font-size:14px;color:rgba(255,255,255,0.3);flex-shrink:0"></i>
        </div>
        ${isExp?`<div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:10px;margin-top:4px">
          ${w.ta?`<div style="margin-bottom:6px"><span style="font-size:9px;font-weight:700;color:#e07b39;letter-spacing:.06em">TA</span><div style="font-size:12px;color:#e2e8f0;margin-top:2px">${esc(w.ta)}</div></div>`:''}
          ${w.te?`<div style="margin-bottom:6px"><span style="font-size:9px;font-weight:700;color:#f59e0b;letter-spacing:.06em">TE</span><div style="font-size:12px;color:#e2e8f0;margin-top:2px">${esc(w.te)}</div></div>`:''}
          ${w.hp?`<div style="margin-bottom:6px"><span style="font-size:9px;font-weight:700;color:#22c55e;letter-spacing:.06em">HP</span><div style="font-size:12px;color:#e2e8f0;margin-top:2px">${esc(w.hp)}</div></div>`:''}
          ${w.impulse?`<div><span style="font-size:9px;font-weight:700;color:#6366f1;letter-spacing:.06em">IMPULSE</span><div style="margin-top:4px">${impulseLines}</div></div>`:''}
        </div>`:''}
      </div>`;
    }).join('');
    const hasCurrentKW=weeks.some(w=>w.kw===currentKW);
    return`<div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:13px;font-weight:800;color:${hasCurrentKW?'#e07b39':'#e2e8f0'};letter-spacing:.02em">${m}</span>
        ${hasCurrentKW?`<span style="font-size:10px;font-weight:700;background:rgba(224,123,57,0.15);color:#e07b39;padding:2px 8px;border-radius:4px">Aktueller Monat</span>`:''}
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.06)"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">${cards}</div>
    </div>`;
  }).join('');
  document.getElementById('mainContent').innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button onclick="makroPhase='vorrunde';makroExpanded=null;renderMakro()" style="padding:8px 20px;font-size:12px;font-weight:700;border-radius:8px;border:none;background:${makroPhase==='vorrunde'?'#e07b39':'rgba(255,255,255,0.06)'};color:${makroPhase==='vorrunde'?'#fff':'rgba(255,255,255,0.5)'};cursor:pointer">Vorrunde · Juli – Dez 2026</button>
      <button onclick="makroPhase='rueckrunde';makroExpanded=null;renderMakro()" style="padding:8px 20px;font-size:12px;font-weight:700;border-radius:8px;border:none;background:${makroPhase==='rueckrunde'?'#e07b39':'rgba(255,255,255,0.06)'};color:${makroPhase==='rueckrunde'?'#fff':'rgba(255,255,255,0.5)'};cursor:pointer">Rückrunde · Jan – Juni 2027</button>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:rgba(255,255,255,0.4)">Aktuelle KW: <strong style="color:#e07b39">${currentKW}</strong></span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:6px;margin-bottom:16px">
      ${Object.entries(TYP_LABEL).map(([k,v])=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:2px;background:${TYP_BORDER[k]||'rgba(255,255,255,0.3)'};flex-shrink:0"></div><span style="font-size:10px;color:rgba(255,255,255,0.4)">${v}</span></div>`).join('')}
    </div>
    ${monthSections}
    <p style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:8px">Klick auf eine Woche für Volldetails · Automatisch auf Saison 2026/27 angepasst</p>`;
}

// ═══════════════════════════════════════════════════
// VERLAUF
// ═══════════════════════════════════════════════════
let verlaufFilter={player:'all',type:'all',user:'all'};

async function renderVerlauf(){
  document.getElementById('mainContent').innerHTML=`<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4)"><i class="ti ti-loader-2" style="font-size:32px;display:block;margin-bottom:8px;opacity:.5"></i>Lade Archiv...</div>`;
  const logs=await loadArchiv(null);
  buildVerlaufHTML(logs);
}

function buildVerlaufHTML(logs){
  const players=[{id:'all',name:'Alle Spieler'},...PLAYERS.map(p=>({id:p.id,name:p.name}))];
  const types=['all','rating','note','meta','si'];
  const typeNames={all:'Alle Aktionen',rating:'📊 Bewertungen',note:'📝 Notizen',meta:'👤 Profil',si:'🧠 SI-Erfassung'};
  const users=['all',...[...new Set(logs.map(l=>l.user_email))]];
  let filtered=logs.filter(l=>{
    if(verlaufFilter.player!=='all'&&l.player_id!=verlaufFilter.player)return false;
    if(verlaufFilter.type!=='all'&&l.action_type!==verlaufFilter.type)return false;
    if(verlaufFilter.user!=='all'&&l.user_email!==verlaufFilter.user)return false;
    return true;
  });
  const rows=filtered.slice(0,300).map((l,idx)=>{
    const isD=l.user_email?.includes('dogus')||l.user_email?.includes('kaplan');
    const userColor=isD?'#e07b39':'#6366f1';
    const userInitial=l.user_email?.charAt(0).toUpperCase()||'?';
    const changeStr=l.old_value&&l.new_value&&l.old_value!==l.new_value?`<span style="color:#ef4444">${esc(l.old_value)}</span> <span style="color:rgba(255,255,255,0.3)">→</span> <span style="color:#22c55e">${esc(l.new_value)}</span>`:'';
    return`<tr style="border-bottom:${idx<filtered.length-1?'1px solid rgba(255,255,255,0.04)':'none'}" onmouseenter="this.style.background='rgba(255,255,255,0.02)'" onmouseleave="this.style.background='transparent'">
      <td style="padding:9px 12px;white-space:nowrap"><div style="font-size:12px;font-weight:600;color:#e2e8f0">${formatTS(l.created_at)}</div></td>
      <td style="padding:9px 12px"><div style="display:flex;align-items:center;gap:7px"><div style="width:24px;height:24px;border-radius:50%;background:${userColor}22;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:${userColor};flex-shrink:0">${userInitial}</div><span style="font-size:11px;color:rgba(255,255,255,0.6)">${esc(l.user_email||'—')}</span></div></td>
      <td style="padding:9px 12px"><div style="font-size:12px;font-weight:600;color:#e2e8f0">${esc(l.player_name||'—')}</div></td>
      <td style="padding:9px 12px"><span style="font-size:10px;font-weight:700;background:rgba(99,102,241,0.15);color:#818cf8;padding:2px 7px;border-radius:4px">${actionLabel(l.action_type)}</span></td>
      <td style="padding:9px 12px;max-width:280px"><div style="font-size:11px;color:rgba(255,255,255,0.6)">${esc(l.details||'')}${changeStr?'<br>'+changeStr:''}</div></td>
    </tr>`;
  }).join('');
  const empty=filtered.length===0?`<tr><td colspan="5" style="text-align:center;padding:40px;color:rgba(255,255,255,0.3)">Keine Einträge gefunden</td></tr>`:'';
  document.getElementById('mainContent').innerHTML=`
    <div class="card" style="padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <i class="ti ti-filter" style="color:rgba(255,255,255,0.4);font-size:14px"></i>
      <select onchange="verlaufFilter.player=this.value==='all'?'all':parseInt(this.value);renderVerlauf()" style="font-size:11px;padding:5px 8px;background:#1e2a3a;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e2e8f0">
        ${players.map(p=>`<option value="${p.id}" ${verlaufFilter.player==p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
      </select>
      <select onchange="verlaufFilter.type=this.value;renderVerlauf()" style="font-size:11px;padding:5px 8px;background:#1e2a3a;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e2e8f0">
        ${types.map(t=>`<option value="${t}" ${verlaufFilter.type===t?'selected':''}>${typeNames[t]}</option>`).join('')}
      </select>
      <select onchange="verlaufFilter.user=this.value;renderVerlauf()" style="font-size:11px;padding:5px 8px;background:#1e2a3a;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e2e8f0">
        ${users.map(u=>`<option value="${u}" ${verlaufFilter.user===u?'selected':''}>${u==='all'?'Alle Trainer':esc(u)}</option>`).join('')}
      </select>
      <span style="font-size:10px;color:rgba(255,255,255,0.3);margin-left:auto">${filtered.length} Einträge</span>
      <button onclick="renderVerlauf()" style="padding:5px 12px;font-size:11px;font-weight:700;background:rgba(224,123,57,0.12);border:1px solid rgba(224,123,57,0.25);border-radius:6px;color:#e07b39;cursor:pointer"><i class="ti ti-refresh"></i> Aktualisieren</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px">
      ${['rating','note','meta','si'].map(t=>{const cnt=logs.filter(l=>l.action_type===t).length;return`<div class="card" style="padding:12px;text-align:center"><div style="font-size:18px;font-weight:700;color:#e2e8f0">${cnt}</div><div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px">${typeNames[t]}</div></div>`;}).join('')}
    </div>
    <div class="card" style="overflow:auto">
      <table style="width:100%;border-collapse:collapse;min-width:600px">
        <thead><tr style="border-bottom:1px solid rgba(255,255,255,0.08)">
          <th style="text-align:left;padding:10px 12px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:.07em;white-space:nowrap">ZEITSTEMPEL</th>
          <th style="text-align:left;padding:10px 12px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:.07em">TRAINER</th>
          <th style="text-align:left;padding:10px 12px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:.07em">SPIELER</th>
          <th style="text-align:left;padding:10px 12px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:.07em">TYP</th>
          <th style="text-align:left;padding:10px 12px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:.07em">DETAILS</th>
        </tr></thead>
        <tbody>${rows||empty}</tbody>
      </table>
    </div>
    <p style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:8px">Alle Änderungen werden automatisch mit Zeitstempel archiviert. Max. 300 Einträge angezeigt.</p>`;
}

// ═══════════════════════════════════════════════════
// PDF EXPORT (bestehend)
// ═══════════════════════════════════════════════════
async function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const cy=state.cycle;
  const cyLabel=CYCLES.find(c=>c.key===cy)?.label||cy;
  doc.setFillColor(13,21,32);doc.rect(0,0,210,297,'F');
  doc.setTextColor(226,232,240);doc.setFontSize(20);doc.setFont(undefined,'bold');
  doc.text('FE12 — Old Boys',14,20);
  doc.setFontSize(11);doc.setFont(undefined,'normal');doc.setTextColor(160,170,185);
  doc.text(`TIPS/U Saison-Masterplan · ${cyLabel} · ${new Date().toLocaleDateString('de-CH')}`,14,28);
  doc.setDrawColor(224,123,57);doc.setLineWidth(0.5);doc.line(14,31,196,31);
  let y=40;
  PLAYERS.forEach((p,idx)=>{
    if(y>250){doc.addPage();doc.setFillColor(13,21,32);doc.rect(0,0,210,297,'F');y=20;}
    const pd=state.data[p.id];
    doc.setFontSize(11);doc.setFont(undefined,'bold');doc.setTextColor(224,123,57);
    doc.text(`${p.nr}  ${p.name}`,14,y);
    doc.setFontSize(9);doc.setFont(undefined,'normal');doc.setTextColor(120,130,145);
    doc.text(`${p.geb} · ${p.fuss} · ${p.nat} · ${p.verein}${p.tw?' · TW':''}${p.rae?' · RAE':''}`,14,y+5);
    const rows=DIMS.map(dim=>{
      const r=pd.ratings[cy][dim];const g=gap(r.ist,r.soll);
      return[`${dim} · ${DIM_FULL[dim]}`,r.ist?.toFixed(2)||'—',r.soll?.toFixed(2)||'—',g!=null?(g>=0?'+':'')+g.toFixed(2)+(g>=2?' ⚠':''):'—',r.massnahme||''];
    });
    doc.autoTable({startY:y+8,head:[['Dimension','IST','SOLL','Gap','Massnahme']],body:rows,theme:'plain',styles:{fontSize:8,cellPadding:2,textColor:[200,210,220],fillColor:[20,30,45]},headStyles:{fillColor:[30,42,58],textColor:[180,190,205],fontStyle:'bold'},columnStyles:{0:{cellWidth:40},1:{cellWidth:16,halign:'center'},2:{cellWidth:16,halign:'center'},3:{cellWidth:16,halign:'center'},4:{cellWidth:100}},margin:{left:14,right:14}});
    y=doc.lastAutoTable.finalY+4;
    if(pd.notes[cy]){doc.setFontSize(8);doc.setTextColor(120,130,145);doc.text(`Notizen: ${pd.notes[cy].substring(0,200)}`,14,y);y+=5;}
    if(pd.defizit){doc.setFontSize(8);doc.setTextColor(239,68,68);doc.text(`Defizit: ${pd.defizit}`,14,y);y+=4;}
    if(pd.staerke){doc.setFontSize(8);doc.setTextColor(34,197,94);doc.text(`Stärke: ${pd.staerke}`,14,y);y+=4;}
    y+=4;
    if(idx<PLAYERS.length-1){doc.setDrawColor(40,55,70);doc.setLineWidth(0.3);doc.line(14,y-1,196,y-1);}
  });
  // SI page
  doc.addPage();doc.setFillColor(13,21,32);doc.rect(0,0,210,297,'F');
  doc.setFontSize(14);doc.setFont(undefined,'bold');doc.setTextColor(224,123,57);
  doc.text('SI-Erfassung · 4v4 Spielintelligenz',14,20);
  const siRows=PLAYERS.map(p=>{const s=state.siData[p.id];const t=SI_FIELDS.reduce((a,f)=>a+(s[f]||0),0);return[p.nr,p.name,s.wahrnehmen,s.loesungen,s.entscheidung,s.gegen_ball,t];});
  doc.autoTable({startY:28,head:[['#','Spieler','Wahrnehmen','Lösungen','Entscheidung','Gegen Ball','Total']],body:siRows,theme:'plain',styles:{fontSize:9,cellPadding:2.5,textColor:[200,210,220],fillColor:[20,30,45]},headStyles:{fillColor:[30,42,58],textColor:[180,190,205],fontStyle:'bold'},columnStyles:{0:{cellWidth:12},1:{cellWidth:55},2:{halign:'center'},3:{halign:'center'},4:{halign:'center'},5:{halign:'center'},6:{halign:'center',fontStyle:'bold'}},margin:{left:14,right:14}});
  // Verlauf/Archiv page
  const logs=await loadArchiv(null);
  if(logs.length>0){
    doc.addPage();doc.setFillColor(13,21,32);doc.rect(0,0,210,297,'F');
    doc.setFontSize(14);doc.setFont(undefined,'bold');doc.setTextColor(224,123,57);
    doc.text('Verlauf & Archiv · Alle Änderungen',14,20);
    doc.setFontSize(8);doc.setFont(undefined,'normal');doc.setTextColor(120,130,145);
    doc.text(`Exportiert: ${new Date().toLocaleString('de-CH')}`,14,27);
    const logRows=logs.slice(0,150).map(l=>[formatTS(l.created_at),l.user_email?.split('@')[0]||'—',(l.player_name||'—').split(',')[0],actionLabel(l.action_type).replace(/[^\w\s·]/g,''),(l.details||'').substring(0,60)]);
    doc.autoTable({startY:32,head:[['Zeit','Trainer','Spieler','Typ','Details']],body:logRows,theme:'plain',styles:{fontSize:7,cellPadding:1.5,textColor:[200,210,220],fillColor:[20,30,45]},headStyles:{fillColor:[30,42,58],textColor:[180,190,205],fontStyle:'bold'},columnStyles:{0:{cellWidth:30},1:{cellWidth:22},2:{cellWidth:28},3:{cellWidth:22},4:{cellWidth:86}},margin:{left:14,right:14}});
  }
  doc.save(`FE12_OldBoys_${cyLabel}_${new Date().toISOString().slice(0,10)}.pdf`);
}

// Init
initState();
</script>
