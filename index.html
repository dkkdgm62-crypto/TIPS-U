select option{background:#1e2a3a;color:#e2e8f0}

::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
input:focus,select:focus,textarea:focus{outline:2px solid rgba(201,168,76,0.4)!important;border-color:rgba(201,168,76,0.4)!important}
.card{background:#111d2e;border:1px solid rgba(255,255,255,0.07);border-radius:12px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.05em}
.btn-nav{display:flex;align-items:center;gap:10px;padding:10px 16px;border:none;border-radius:8px;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:13px;font-weight:400;width:100%;text-align:left;margin:2px 0;transition:all .15s}
.btn-nav.active{background:rgba(201,168,76,0.15);color:#c9a84c;font-weight:600}
.btn-nav:hover{background:rgba(255,255,255,0.04)}
.cycle-btn{padding:4px 10px;font-size:11px;font-weight:700;border-radius:5px;border:none;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);cursor:pointer;letter-spacing:.04em;transition:all .15s}
.cycle-btn.active{background:#c9a84c;color:#fff}
.note-select{width:64px;font-size:12px;padding:4px 2px;background:#1e2a3a;border:1px solid rgba(255,255,255,0.1);border-radius:6px;font-weight:600;cursor:pointer;text-align:center}
.player-row{display:grid;grid-template-columns:40px 1fr 50px 50px 50px 50px 50px 64px 90px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background .1s}
.player-row:hover{background:rgba(255,255,255,0.03)}
.player-row:last-child{border-bottom:none}
.matrix-row{display:grid;grid-template-columns:170px 68px 68px 68px 1fr;align-items:center;padding:12px 16px;gap:6px;border-bottom:1px solid rgba(255,255,255,0.04)}
.matrix-row:last-child{border-bottom:none}
.sidebar{width:220px;background:#0a1018;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;transition:transform .25s ease}
.main-wrap{margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#0a1018;border-bottom:1px solid rgba(255,255,255,0.06);padding:0 16px;display:flex;align-items:center;height:56px;gap:12px;position:sticky;top:0;z-index:30;flex-shrink:0}
.content{padding:16px;flex:1}
.hamburger{display:none;padding:6px;background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:20px;align-items:center}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:40}
@media(max-width:767px){
  .sidebar{transform:translateX(-220px)}
  .sidebar.open{transform:translateX(0)}
  .main-wrap{margin-left:0}
  .hamburger{display:flex}
  .overlay.show{display:block}
  .hide-mobile{display:none!important}
  .player-row{grid-template-columns:36px 1fr 44px 44px 44px 44px 44px 56px 0}
  .player-row>:last-child{display:none}
  .matrix-row{grid-template-columns:130px 58px 58px 58px 1fr}
}
@media(max-width:480px){
  .matrix-row{grid-template-columns:1fr 54px 54px 54px}
  .matrix-row .massnahme-cell{display:none}
  .compare-grid{grid-template-columns:1fr!important}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.kader-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
body.ro .edit-only{display:none!important}
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:#0d1520}

let _logoMem = null; // Fallback, falls localStorage nicht verfügbar (z.B. Vorschau-Sandbox)
function getTeamLogo(){
  try{ const v=localStorage.getItem('fe12_team_logo'); if(v) return v; }catch(e){}
  return _logoMem || TEAM_LOGO_DEFAULT;
}
function _hasCustomLogo(){
  try{ if(localStorage.getItem('fe12_team_logo')) return true; }catch(e){}
  return !!_logoMem;
}
function applyTeamLogo(){
  const src=getTeamLogo();
  document.querySelectorAll('img[data-team-logo]').forEach(im=>{ im.src=src; });
  const custom=_hasCustomLogo();
  document.querySelectorAll('[data-logo-remove]').forEach(b=>{ b.style.display=custom?'inline-flex':'none'; });
}
function uploadTeamLogo(input){
  if(roGuard()) return;
  const f=input.files&&input.files[0]; if(!f) return;
  if(!/^image\//.test(f.type)){ showSavedToast('Bitte ein Bild auswählen',false); input.value=''; return; }
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      let durl;
      try{
        const maxW=440, scale=Math.min(1,maxW/img.width);
        const cw=Math.round(img.width*scale), ch=Math.round(img.height*scale);
        const c=document.createElement('canvas'); c.width=cw; c.height=ch;
        c.getContext('2d').drawImage(img,0,0,cw,ch);
        durl=c.toDataURL('image/jpeg',0.85);
      }catch(e){ durl=reader.result; }
      try{ localStorage.setItem('fe12_team_logo',durl); }catch(e){ _logoMem=durl; }
      applyTeamLogo(); renderCurrentView();
      showSavedToast('✓ Logo aktualisiert');
    };
    img.onerror=()=>{ try{ localStorage.setItem('fe12_team_logo',reader.result); }catch(e){ _logoMem=reader.result; } applyTeamLogo(); renderCurrentView(); showSavedToast('✓ Logo aktualisiert'); };
    img.src=reader.result;
  };
  reader.readAsDataURL(f);
  input.value='';
}
function removeTeamLogo(){
  if(roGuard()) return;
  try{ localStorage.removeItem('fe12_team_logo'); }catch(e){}
  _logoMem=null;
  applyTeamLogo(); renderCurrentView();
  showSavedToast('Logo auf Standard zurückgesetzt');
}

// State
let state = {view:'dashboard', cycle:'z1', selPlayer:null, compareIds:[], data:{}, siData:{}, editPlayer:false};
let saveTimers = {};

function initState(){
  state.data={}; state.siData={};
  PLAYERS.forEach(p=>{
    state.data[p.id]={ratings:{},notes:{},position:'',defizit:'',staerke:''};
    CYCLES.forEach(c=>{
      state.data[p.id].ratings[c.key]={};
      state.data[p.id].notes[c.key]='';
      DIMS.forEach(d=>{state.data[p.id].ratings[c.key][d]={ist:null,soll:null,massnahme:''};});
    });
    state.siData[p.id]={wahrnehmen:0,loesungen:0,entscheidung:0,gegen_ball:0};
  });
}

// ROSTER / SPIELER-VERWALTUNG (editierbar via Supabase)
// ═══════════════════════════════════════════════════
let rosterRows = [];

// PLAYERS aus BASE + Roster-Overrides neu zusammensetzen
function rebuildPlayers(){
  const map = {};
  BASE_PLAYERS.forEach(p=> map[p.id] = {...p});
  (rosterRows||[]).forEach(r=>{
    if(r.deleted){ delete map[r.id]; return; }
    map[r.id] = {id:r.id, nr:r.nr||'', name:r.name||'', geb:r.geb||'', fuss:r.fuss||'', nat:r.nat||'', verein:r.verein||'', tw:!!r.tw, rae:!!r.rae};
  });
  PLAYERS = Object.values(map).sort((a,b)=>{
    const na=parseInt(a.nr)||9999, nb=parseInt(b.nr)||9999;
    return na-nb || a.id-b.id;
  });
}

// Stellt sicher, dass state-Einträge für alle (auch neue) Spieler existieren
function ensureStateForPlayers(){
  PLAYERS.forEach(p=>{
    if(!state.data[p.id]){
      state.data[p.id]={ratings:{},notes:{},position:'',defizit:'',staerke:''};
      CYCLES.forEach(c=>{state.data[p.id].ratings[c.key]={};state.data[p.id].notes[c.key]='';DIMS.forEach(d=>{state.data[p.id].ratings[c.key][d]={ist:null,soll:null,massnahme:''};});});
    }
    if(!state.siData[p.id]) state.siData[p.id]={wahrnehmen:0,loesungen:0,entscheidung:0,gegen_ball:0};
  });
}

function nextPlayerId(){
  let mx=0;
  BASE_PLAYERS.forEach(p=>{if(p.id>mx)mx=p.id;});
  rosterRows.forEach(r=>{if(r.id>mx)mx=r.id;});
  return mx+1;
}
function nextPlayerNr(){
  let mx=0;
  PLAYERS.forEach(p=>{const n=parseInt(p.nr)||0; if(n>mx)mx=n;});
  return String(mx+1).padStart(2,'0');
}

async function loadRoster(){
  try{ const r=await sb.from('roster').select('*'); rosterRows=r.data||[]; }
  catch(e){ console.error('loadRoster',e); rosterRows=[]; }
  rebuildPlayers();
}

async function addPlayer(){
  if(roGuard()) return;
  const id=nextPlayerId();
  const rec={id,nr:nextPlayerNr(),name:'Neuer Spieler',geb:'',fuss:'R',nat:'CH',verein:'BSC Old Boys',tw:false,rae:false,deleted:false};
  await sb.from('roster').upsert(rec,{onConflict:'id'});
  if(typeof logActivity==='function') logActivity(id,'meta','Neuer Spieler erstellt',null,null,'roster','','neu');
  await loadRoster();
  ensureStateForPlayers();
  state.selPlayer=id; state.editPlayer=true;
  showView('player');
}

async function savePlayer(id){
  const g=f=>document.getElementById('pf_'+f);
  const rec={
    id,
    nr:g('nr').value.trim(),
    name:g('name').value.trim(),
    geb:g('geb').value.trim(),
    fuss:g('fuss').value,
    nat:g('nat').value.trim(),
    verein:g('verein').value.trim(),
    tw:g('tw').checked,
    rae:g('rae').checked,
    deleted:false
  };
  if(!rec.name){ alert('Bitte einen Namen eingeben.'); return; }
  await sb.from('roster').upsert(rec,{onConflict:'id'});
  if(typeof logActivity==='function') logActivity(id,'meta','Stammdaten aktualisiert: '+rec.name,null,null,'roster',null,rec.name);
  await loadRoster();
  ensureStateForPlayers();
  state.editPlayer=false;
  renderPlayer();
}

function cancelEditPlayer(){ state.editPlayer=false; renderPlayer(); }

async function deletePlayer(id){
  if(roGuard()) return;
  const p=PLAYERS.find(x=>x.id===id);
  if(!confirm('Spieler "'+(p?p.name:'')+'" wirklich löschen?\n\nDer Spieler wird aus dem Kader ausgeblendet. Bestehende Bewertungen bleiben in der Datenbank erhalten.')) return;
  await sb.from('roster').upsert({id,deleted:true},{onConflict:'id'});
  if(typeof logActivity==='function') logActivity(id,'meta','Spieler gelöscht',null,null,'roster',p?p.name:'',null);
  await loadRoster();
  state.selPlayer=null; state.editPlayer=false;
  showView('kader');
}

function radarSVG(ist,soll,size=160){
  const cx=size/2,cy=size/2,r=size*0.36;
  const ang=i=>(i*2*Math.PI/5)-Math.PI/2;
  const pt=(v,i)=>{const a=ang(i),sc=Math.max(0,(v-1)/3);return[cx+r*sc*Math.cos(a),cy+r*sc*Math.sin(a)]};
  const poly=pts=>pts.map(p=>p.join(',')).join(' ');
  const grid=lv=>DIMS.map((_,i)=>{const a=ang(i),sc=lv/4;return[cx+r*sc*Math.cos(a),cy+r*sc*Math.sin(a)]});
  const istPts=DIMS.map((d,i)=>pt(ist[d]||1,i));
  const sollPts=DIMS.map((d,i)=>pt(soll[d]||1,i));
  let s=`<svg width="${size}" height="${size}">`;
  for(let lv=1;lv<=4;lv++)s+=`<polygon points="${poly(grid(lv))}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>`;
  DIMS.forEach((_,i)=>s+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(ang(i))}" y2="${cy+r*Math.sin(ang(i))}" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>`);
  if(DIMS.some(d=>soll[d]>0))s+=`<polygon points="${poly(sollPts)}" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,2"/>`;
  if(DIMS.some(d=>ist[d]>0))s+=`<polygon points="${poly(istPts)}" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="2"/>`;
  DIMS.forEach((d,i)=>{const lx=cx+(r+14)*Math.cos(ang(i)),ly=cy+(r+14)*Math.sin(ang(i));s+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="${DIM_COLOR[d]}">${d}</text>`;});
  s+=`</svg>`;return s;
}

sb.auth.onAuthStateChange((event,session)=>{
  if(session?.user){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    document.getElementById('userEmail').textContent=session.user.email;
    currentUserEmail = session.user.email;

});

function coachLabel(email){ if(!email) return '—'; const k=email.toLowerCase(); return (state.coaches&&state.coaches[k])||userShort(email); }
function coachesList(){
  const m=state.coaches||{};
  const arr=Object.keys(m).filter(e=>!READONLY_EMAILS.includes(e)).map(e=>({email:e,name:m[e]||userShort(e)}));
  const cu=(currentUserEmail||'').toLowerCase();
  if(cu && !arr.some(c=>c.email===cu)) arr.push({email:cu,name:userShort(cu)});
  arr.sort((a,b)=>a.name.localeCompare(b.name));
  return arr;
}
function canEditAssess(){ return !window.IS_READONLY && (state.viewCoach||'').toLowerCase()===(currentUserEmail||'').toLowerCase(); }
function _rawUpsert(arrName,row,matchFn){
  if(!state[arrName]) state[arrName]=[];
  const i=state[arrName].findIndex(matchFn);
  if(i>=0) state[arrName][i]=row; else state[arrName].push(row);
}
function registerSelfCoach(){
  if(!currentUserEmail || window.IS_READONLY) return;
  const k=currentUserEmail.toLowerCase();
  if(!state.coaches) state.coaches={};
  if(!(k in state.coaches)){
    state.coaches[k]=userShort(currentUserEmail);
    sb.from('coaches').upsert({email:k,name:state.coaches[k]},{onConflict:'email'}).then(({error})=>{ if(error) console.warn('coaches upsert',error.message); });
  }
}
// Baut state.data/siData/tipsDetail für EINEN Trainer auf (Alt-Daten ohne Trainer gelten für alle, eigene überschreiben)
function projectCoach(coach){
  state.viewCoach = coach;
  initState();
  ensureStateForPlayers();
  state.tipsDetail={};
  const pick = rows => (rows||[]).filter(r=>!r.coach).concat((rows||[]).filter(r=>(r.coach||'').toLowerCase()===(coach||'').toLowerCase()));
  // geteilte Stammdaten
  (state.rawMeta||[]).forEach(m=>{ if(state.data[m.player_id]){ state.data[m.player_id].position=m.position||''; state.data[m.player_id].defizit=m.defizit||''; state.data[m.player_id].staerke=m.staerke||''; } });
  // pro Trainer
  pick(state.rawRatings).forEach(r=>{ const d=state.data[r.player_id]; if(d&&d.ratings[r.cycle]) d.ratings[r.cycle][r.dim]={ist:r.ist,soll:r.soll,massnahme:r.massnahme||''}; });
  pick(state.rawNotes).forEach(n=>{ if(state.data[n.player_id]) state.data[n.player_id].notes[n.cycle]=n.content||''; });
  pick(state.rawSI).forEach(s=>{ if(state.siData[s.player_id]) state.siData[s.player_id]={wahrnehmen:s.wahrnehmen||0,loesungen:s.loesungen||0,entscheidung:s.entscheidung||0,gegen_ball:s.gegen_ball||0}; });
  pick(state.rawTips).forEach(row=>{ if(!state.tipsDetail[row.player_id]) state.tipsDetail[row.player_id]={}; state.tipsDetail[row.player_id][row.cycle]={scores:row.scores||{},beobachter:row.beobachter||'',entwicklung:row.entwicklung||''}; });
}
function setViewCoach(email){ if(!email) return; projectCoach(email); renderCurrentView(); }
function openCoachAssign(){
  const c=state.viewCoach;
  if(!c){ showSavedToast('Bitte zuerst oben einen Trainer wählen',false); return; }
  assignLegacyToCoach(c);
}
async function assignLegacyToCoach(email){
  if(roGuard()) return;
  if(!email) return;
  if(!confirm('Alle bisher NICHT zugeordneten Bewertungen, Notizen, SMART+ und TIPS/U dem Trainer „'+coachLabel(email)+'" zuordnen?\n(Das lässt sich nur manuell wieder ändern.)')) return;
  try{
    for(const tbl of ['ratings','notes','si_data','tips_detail']){
      const {error}=await sb.from(tbl).update({coach:email}).is('coach',null);
      if(error){ console.error('assign',tbl,error); showSavedToast('Zuordnen fehlgeschlagen ('+tbl+')',false); return; }
    }
    showSavedToast('✓ Bestehende Daten „'+coachLabel(email)+'" zugeordnet');
    await loadAll();
  }catch(e){ console.error(e); showSavedToast('Zuordnen fehlgeschlagen',false); }
}

async function loadAll(){
  await loadRoster();
  initState();
  const [r1,r2,r3,r4,rc,rt]=await Promise.all([
    sb.from('ratings').select('*'),
    sb.from('notes').select('*'),
    sb.from('player_meta').select('*'),
    sb.from('si_data').select('*'),
    sb.from('coaches').select('*'),
    sb.from('tips_detail').select('*')
  ]);
  state.rawRatings=r1.data||[]; state.rawNotes=r2.data||[]; state.rawMeta=r3.data||[]; state.rawSI=r4.data||[]; state.rawTips=rt.data||[];
  state.coaches={}; (rc.data||[]).forEach(c=>{ if(c&&c.email) state.coaches[c.email.toLowerCase()]=c.name||userShort(c.email); });
  registerSelfCoach();
  if(!state.viewCoach) state.viewCoach=(currentUserEmail||'').toLowerCase();
  projectCoach(state.viewCoach);
  renderCurrentView();
}

let currentUserEmail = '';

// Bereich-Zuordnung für den Tages-Sammeleintrag
const AREA_OF = {rating:'matrix', note:'profil', meta:'profil', si:'si', tips:'detail', match:'spiele'};
const AREA_LABEL = {matrix:'TIPS/U Matrix', profil:'Profil / Notizen', si:'SMART+', detail:'TIPS/U', spiele:'Spiele', sonstiges:'Sonstiges'};

// Ein Eintrag pro Tag + Benutzer + Bereich (wird über den Tag fortgeschrieben)
async function logActivity(pid, actionType, details, cycle, dim, fieldName, oldVal, newVal) {
  if (!currentUserEmail) return;
  const area = AREA_OF[actionType] || 'sonstiges';
  const today = new Date().toISOString().slice(0,10);
  const p = PLAYERS.find(x => x.id === pid);
  try {
    const { error } = await sb.from('activity_log').upsert({
      user_email: currentUserEmail,
      log_date: today,
      area: area,
      player_id: pid || null,
      player_name: p ? p.name : null,
      action_type: actionType,
      cycle: cycle || null,
      details: AREA_LABEL[area] || area,
      created_at: new Date().toISOString()
    }, { onConflict: 'user_email,log_date,area' });
    if (error) console.error('logActivity error:', error.message);
  } catch(e) { console.error('logActivity', e); }
}

async function loadArchiv(pid) {
  let q = sb.from('activity_log').select('*').order('created_at', {ascending: false}).limit(200);
  if (pid) q = q.eq('player_id', pid);
  const { data } = await q;
  return data || [];
}

function formatTS(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('de-CH') + ' ' + d.toLocaleTimeString('de-CH', {hour:'2-digit',minute:'2-digit'});
}

// ── "Zuletzt bearbeitet"-Stempel (pro Bereich, aus activity_log) ──
function userShort(email){
  if(!email) return '—';
  const base=email.split('@')[0];
  const tok=base.split(/[._\-\s]/)[0]||base;
  return tok.charAt(0).toUpperCase()+tok.slice(1);
}
function formatTSShort(ts){
  const d=new Date(ts);
  const p=n=>String(n).padStart(2,'0');
  return p(d.getDate())+'.'+p(d.getMonth()+1)+'. '+p(d.getHours())+':'+p(d.getMinutes());
}
function formatDay(d){
  if(!d) return '';
  const parts=String(d).slice(0,10).split('-');
  return parts[2]+'.'+parts[1]+'.';
}
function timeShort(ts){const d=new Date(ts);const p=n=>String(n).padStart(2,'0');return p(d.getHours())+':'+p(d.getMinutes());}

  return {rating:'📊 Bewertung',note:'📝 Notiz',meta:'👤 Profil',si:'🧠 SMART+',match:'⚽ Spiel'}[type] || type;
}

function cycleLabel(cy) {
  return {z1:'Z1 Diagnostik',z2:'Z2 Hinrunde',z3:'Z3 Winterpause',z4:'Z4 Abschluss'}[cy] || cy || '';
}

function dimLabel(dim) {
  return dim ? `${dim} · ${DIM_FULL[dim]||dim}` : '';
}

// SAVE (debounced)

function debSave(key,fn,delay=800){clearTimeout(saveTimers[key]);saveTimers[key]=setTimeout(fn,delay);}
function _saveErr(error,label){ if(error){ console.error(label,error); showSavedToast('Speichern fehlgeschlagen ('+label+') – bitte erneut versuchen',false); return true; } return false; }

function saveRating(pid,cy,dim,oldIst,oldSoll){
  if(roGuard()) return;
  if(!canEditAssess()) return;
  const r=state.data[pid].ratings[cy][dim];
  debSave(`r_${pid}_${cy}_${dim}`,async()=>{
    const {error}=await sb.from('ratings').upsert({player_id:pid,cycle:cy,dim,coach:currentUserEmail,ist:r.ist,soll:r.soll,massnahme:r.massnahme||''},{onConflict:'player_id,cycle,dim,coach'});
    if(_saveErr(error,'Bewertung')) return;
    _rawUpsert('rawRatings',{player_id:pid,cycle:cy,dim,coach:currentUserEmail,ist:r.ist,soll:r.soll,massnahme:r.massnahme||''},x=>x.player_id===pid&&x.cycle===cy&&x.dim===dim&&x.coach===currentUserEmail);
    const details = `${cycleLabel(cy)} · ${dimLabel(dim)} → IST: ${r.ist?.toFixed(2)||'—'} / SOLL: ${r.soll?.toFixed(2)||'—'}${r.massnahme?' · '+r.massnahme:''}`;
    logActivity(pid,'rating',details,cy,dim,'ist/soll', oldIst!=null?oldIst.toFixed(2):null, r.ist!=null?r.ist.toFixed(2):null);
  });
}
function saveNote(pid,cy,oldVal){
  if(roGuard()) return;
  if(!canEditAssess()) return;
  debSave(`n_${pid}_${cy}`,async()=>{
    const content=state.data[pid].notes[cy];
    const {error}=await sb.from('notes').upsert({player_id:pid,cycle:cy,coach:currentUserEmail,content},{onConflict:'player_id,cycle,coach'});
    if(_saveErr(error,'Notiz')) return;
    _rawUpsert('rawNotes',{player_id:pid,cycle:cy,coach:currentUserEmail,content},x=>x.player_id===pid&&x.cycle===cy&&x.coach===currentUserEmail);
    logActivity(pid,'note',`${cycleLabel(cy)} · Notiz aktualisiert`,cy,null,'content',oldVal?.substring(0,80),content?.substring(0,80));
  });
}
function saveMeta(pid,field,oldVal){
  if(roGuard()) return;
  const d=state.data[pid];
  debSave(`m_${pid}`,async()=>{
    const {error}=await sb.from('player_meta').upsert({player_id:pid,position:d.position,defizit:d.defizit,staerke:d.staerke},{onConflict:'player_id'});
    if(_saveErr(error,'Profil')) return;
    logActivity(pid,'meta',`${field}: ${d[field]||'—'}`,null,null,field,oldVal,d[field]);
  });
}
function saveSI(pid,oldVals){
  if(roGuard()) return;
  if(!canEditAssess()) return;
  const s=state.siData[pid];
  debSave(`si_${pid}`,async()=>{
    const {error}=await sb.from('si_data').upsert({player_id:pid,coach:currentUserEmail,...s},{onConflict:'player_id,coach'});
    if(_saveErr(error,'SMART+')) return;

  },400);
}

function showSavedToast(msg, ok){
  let el=document.getElementById('saveToast');
  if(!el){ el=document.createElement('div'); el.id='saveToast'; document.body.appendChild(el); }
  el.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#16243a;border:1px solid '+(ok===false?'rgba(239,68,68,0.5)':'rgba(34,197,94,0.5)')+';color:#e2e8f0;font-size:13px;font-weight:700;padding:11px 20px;border-radius:10px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.45);display:block';
  el.textContent=msg;
  clearTimeout(window._saveToastT);
  window._saveToastT=setTimeout(()=>{el.style.display='none';},2400);
}

async function manualSave(){
  if(roGuard()) return;
  const btn=document.getElementById('manualSaveBtn');
  const orig=btn?btn.innerHTML:'';
  if(btn){ btn.disabled=true; btn.style.opacity='0.65'; btn.innerHTML='<i class="ti ti-loader-2"></i> SPEICHERT…'; }
  const cy=state.cycle;
  let done=0;
  if(!canEditAssess()){ showSavedToast('Im fremden Trainer-View kann nicht gespeichert werden – oben auf „Du" wechseln',false); if(btn){btn.disabled=false;btn.style.opacity='1';btn.innerHTML=orig;} return; }
  const co=currentUserEmail;
  try{
    // Aktuelles Spielerprofil: Matrix + Notizen (pro Trainer) + Meta (geteilt)
    if(state.view==='player' && state.selPlayer){
      const pid=state.selPlayer, pd=state.data[pid];
      for(const d of DIMS){
        const r=pd.ratings[cy][d];
        await sb.from('ratings').upsert({player_id:pid,cycle:cy,dim:d,coach:co,ist:r.ist,soll:r.soll,massnahme:r.massnahme||''},{onConflict:'player_id,cycle,dim,coach'});
      }
      await sb.from('notes').upsert({player_id:pid,cycle:cy,coach:co,content:pd.notes[cy]||''},{onConflict:'player_id,cycle,coach'});
      await sb.from('player_meta').upsert({player_id:pid,position:pd.position,defizit:pd.defizit,staerke:pd.staerke},{onConflict:'player_id'});
      await logActivity(pid,'rating','Manuell gespeichert · '+cycleLabel(cy)+' (Matrix + Profil)',cy,null,'manual',null,'Speicherstand');
      await logActivity(pid,'meta','Manuell gespeichert · Profil/Notizen '+cycleLabel(cy),null,null,'manual',null,'Speicherstand');
      done++;
    }
    // SI-Erfassung: alle Spieler (pro Trainer)
    if(state.view==='si'){
      for(const p of PLAYERS){ const s=state.siData[p.id]; await sb.from('si_data').upsert({player_id:p.id,coach:co,...s},{onConflict:'player_id,coach'}); }
      await logActivity(PLAYERS[0]?PLAYERS[0].id:1,'si','Manuell gespeichert · SMART+ (alle Spieler)',null,null,'manual',null,'Speicherstand');
      done++;
    }
    // Detailbogen (pro Trainer)
    if(state.view==='detail' && state.tipsSelPlayer){
      const pid=state.tipsSelPlayer, t=ensureTips(pid,cy);
      await sb.from('tips_detail').upsert({player_id:pid,cycle:cy,coach:co,scores:t.scores,beobachter:t.beobachter,entwicklung:t.entwicklung},{onConflict:'player_id,cycle,coach'});
      await logActivity(pid,'tips','Manuell gespeichert · TIPS/U '+cycleLabel(cy),cy,null,'manual',null,'Speicherstand');
      done++;
    }
    // Anderer Bereich → trotzdem Snapshot-Eintrag
    if(done===0){
      await logActivity(state.selPlayer||(PLAYERS[0]&&PLAYERS[0].id)||1,'meta','Manueller Speicherstand ('+state.view+')',null,null,'manual',null,'Speicherstand');
    }
    showSavedToast('✓ Stand gespeichert');
    refreshStamps();
  }catch(e){
    console.error('manualSave',e);
    showSavedToast('Fehler – bitte activity_log in Supabase prüfen', false);
  }
  if(btn){ btn.disabled=false; btn.style.opacity='1'; btn.innerHTML=orig; }
}

function updateRating(pid,cy,dim,field,val){
  if(roGuard()) return;
  if(!canEditAssess()){ showSavedToast('Nur deine eigene Ansicht ist bearbeitbar – oben Trainer wechseln',false); return; }
  const oldIst=state.data[pid].ratings[cy][dim].ist;
  const oldSoll=state.data[pid].ratings[cy][dim].soll;
  state.data[pid].ratings[cy][dim][field]=val;
  saveRating(pid,cy,dim,oldIst,oldSoll);
  const el=document.getElementById(`gap_${pid}_${cy}_${dim}`);
  if(el){const g=gap(state.data[pid].ratings[cy][dim].ist,state.data[pid].ratings[cy][dim].soll);el.innerHTML=g!=null?`<span style="font-size:14px;font-weight:800;color:${gapColor(g)}">${g>=0?'+':''}${g.toFixed(2)}</span>`:`<span style="color:rgba(255,255,255,0.3)">—</span>`;}
  const sel=document.querySelector(`[data-notesel="${pid}_${cy}_${dim}_${field}"]`);
  if(sel)sel.style.color=val?noteColor(val):'#6b7280';
}
function updateMassnahme(pid,cy,dim,val){
  if(roGuard()) return;
  if(!canEditAssess()){ showSavedToast('Nur deine eigene Ansicht ist bearbeitbar',false); return; }
  state.data[pid].ratings[cy][dim].massnahme=val;
  saveRating(pid,cy,dim,state.data[pid].ratings[cy][dim].ist,state.data[pid].ratings[cy][dim].soll);
}
function updateNote(pid,cy,val){
  if(roGuard()) return;
  if(!canEditAssess()){ showSavedToast('Nur deine eigene Ansicht ist bearbeitbar',false); return; }
  const old=state.data[pid].notes[cy];
  state.data[pid].notes[cy]=val;saveNote(pid,cy,old);
}
function updateField(pid,f,val){
  if(roGuard()) return;
  const old=state.data[pid][f];
  state.data[pid][f]=val;saveMeta(pid,f,old);
}
function updateSI(pid,field,delta){
  if(roGuard()) return;
  if(!canEditAssess()){ showSavedToast('Nur deine eigene Ansicht ist bearbeitbar – oben Trainer wechseln',false); return; }
  const old={...state.siData[pid]};
  state.siData[pid][field]=Math.max(0,(state.siData[pid][field]||0)+delta);
  saveSI(pid,old);
  const el=document.getElementById(`si_val_${pid}_${field}`);
  if(el)el.textContent=state.siData[pid][field];
  const tot=document.getElementById(`si_tot_${pid}`);
  if(tot){const t=SI_FIELDS.reduce((a,f)=>a+(state.siData[pid][f]||0),0);tot.textContent=t;tot.style.color=t>0?noteColor(Math.min(4,1+t*3/20)):'rgba(255,255,255,0.2)';}
  const rang=document.getElementById(`si_rang_${pid}`);
  if(rang){const t=SI_FIELDS.reduce((a,f)=>a+(state.siData[pid][f]||0),0);rang.innerHTML=t>0?`<span style="font-size:11px;font-weight:700;background:rgba(99,102,241,0.15);color:#818cf8;padding:3px 9px;border-radius:5px">${t} Pkt</span>`:`<span style="color:rgba(255,255,255,0.15);font-size:12px">—</span>`;}
}

let _navBack=false;
function goBack(){
  if(!state.navStack) state.navStack=[];
  if(state.navStack.length>0){ _navBack=true; showView(state.navStack.pop()); }
  else { showView('dashboard'); }
}
function showView(v){
  if(!state.navStack) state.navStack=[];
  if(!_navBack && state.view && state.view!==v){ state.navStack.push(state.view); if(state.navStack.length>40) state.navStack.shift(); }
  _navBack=false;
  state.view=v;
  if(v!=='player') state.editPlayer=false;
  document.querySelectorAll('.btn-nav').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+v);if(nb)nb.classList.add('active');
  const titles={dashboard:'Dashboard',kader:'Kader 2026/27',player:state.selPlayer?PLAYERS.find(x=>x.id===state.selPlayer)?.name||'Spielerprofil':'Spielerprofil',detail:'TIPS/U',vergleich:'Spieler-Vergleich',si:'SMART+',spiele:'Spiele & Matches',trainings:'Trainingsplanung',anwesenheit:'AWK – Anwesenheit & Einsätze',makro:'Makrozyklus 2026/27',verlauf:'Verlauf & Archiv'};
  document.getElementById('pageTitle').textContent=titles[v]||v;
  const showSearch=['dashboard','kader'].includes(v);
  document.getElementById('searchBox').style.display=showSearch?'flex':'none';
  renderCurrentView();
  closeSidebar();
}
function setCycle(cy){
  state.cycle=cy;
  document.querySelectorAll('.cycle-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cyc-'+cy).classList.add('active');
  renderCurrentView();
}
function renderCurrentView(){
  const v=state.view;
  if(v==='dashboard')renderDashboard();
  else if(v==='kader')renderKader();
  else if(v==='player')renderPlayer();
  else if(v==='detail')renderTipsDetail();
  else if(v==='vergleich')renderVergleich();
  else if(v==='si')renderSI();
  else if(v==='spiele')renderSpiele();
  else if(v==='trainings')renderTrainings();
  else if(v==='anwesenheit')renderAnwesenheit();
  else if(v==='makro')renderMakro();
  else if(v==='verlauf')renderVerlauf();
  refreshStamps();
}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

        <button onclick="${prevId!=null?`state.selPlayer=${prevId};renderPlayer()`:''}" ${prevId==null?'disabled':''} style="padding:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,${prevId==null?'0.2':'0.5'});cursor:${prevId==null?'default':'pointer'};display:flex;align-items:center"><i class="ti ti-chevron-left" style="font-size:16px"></i></button>
        <button onclick="${nextId!=null?`state.selPlayer=${nextId};renderPlayer()`:''}" ${nextId==null?'disabled':''} style="padding:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,${nextId==null?'0.2':'0.5'});cursor:${nextId==null?'default':'pointer'};display:flex;align-items:center"><i class="ti ti-chevron-right" style="font-size:16px"></i></button>

  // Einsatzzeit & Positionen (Saison gesamt, aus den Aufstellungen)
  let einsCard='';
  if(typeof aggMatchStats==='function'){
    if((state.matches||[]).length===0 && typeof _matchesTableMissing!=='undefined' && !_matchesTableMissing && !window._einsTriedLoad){
      window._einsTriedLoad=true;
      if(typeof loadMatches==='function') loadMatches().then(()=>{ if(state.view==='player') renderPlayer(); });

    const es=aggMatchStats({comp:'all',phase:'all'})[String(p.id)];
    const posChips = es ? Object.entries(es.pos).sort((a,b)=>b[1]-a[1]).map(([l,n])=>`<span style="font-size:10px;font-weight:700;color:#c9a84c;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);border-radius:5px;padding:2px 7px">${esc(l)}${n>1?' ×'+n:''}</span>`).join(' ') : '';

            <div style="margin-left:auto;display:flex;gap:10px;font-size:10px">

              <span style="color:#6366f1;font-weight:700">– – SOLL</span>

        </div>

            ${[['defizit','HAUPTDEFIZIT','z.B. T – Ballkontrolle'],['staerke','HAUPTSTÄRKE','z.B. S – Antritt 5m']].map(([f,l,ph])=>`
              <div><div style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:.06em;margin-bottom:4px">${l}</div>
              <input value="${esc(pd[f])}" oninput="updateField(${p.id},'${f}',this.value)" placeholder="${ph}" style="width:100%;font-size:12px;padding:7px 9px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#e2e8f0;box-sizing:border-box"/></div>`).join('')}

          <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:.08em;margin-bottom:10px">RADAR · ${cy.toUpperCase()}</div>

function noteSelectDirect(pid,cy,dim,field,val){
  let opts=`<option value="">—</option>`;
  NOTES.forEach(n=>{opts+=`<option value="${n}"${val==n?' selected':''}>${n.toFixed(2)}</option>`;});
  return `<select class="note-select" style="color:${val?noteColor(val):'#6b7280'}" onchange="updateRating(${pid},'${cy}','${dim}','${field}',this.value?parseFloat(this.value):null)">${opts}</select>`;
}

// ═══════════════════════════════════════════════════
// VERGLEICH
// ═══════════════════════════════════════════════════
function renderVergleich(){
  const cy=state.cycle;
  const btns=PLAYERS.map(p=>{
    const sel=state.compareIds.includes(p.id);
    return `<button onclick="toggleCompare(${p.id})" style="padding:4px 9px;font-size:11px;font-weight:600;border-radius:5px;border:1px solid ${sel?'#c9a84c':'rgba(255,255,255,0.08)'};background:${sel?'rgba(201,168,76,0.15)':'rgba(255,255,255,0.04)'};color:${sel?'#c9a84c':'rgba(255,255,255,0.4)'};cursor:pointer">${p.nr} ${esc(p.name.split(',')[0])}</button>`;
  }).join('');
  let cards='';
  if(state.compareIds.length>0){
    cards=`<div class="compare-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px">`;
    state.compareIds.forEach(pid=>{
      const p=PLAYERS.find(x=>x.id===pid);const pd=state.data[pid];
      const im={},sm={};DIMS.forEach(d=>{im[d]=pd.ratings[cy][d].ist||0;sm[d]=pd.ratings[cy][d].soll||0;});
      const a=getAvg(pid,cy);
      const bars=DIMS.map(d=>{const ist=pd.ratings[cy][d].ist;const g=gap(ist,pd.ratings[cy][d].soll);return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:9px;font-weight:800;color:${DIM_COLOR[d]};width:12px">${d}</span><div style="flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden"><div style="height:100%;width:${ist?((ist-1)/3*100):0}%;background:${DIM_COLOR[d]};border-radius:3px"></div></div><span style="font-size:10px;font-weight:700;color:${ist?noteColor(ist):'rgba(255,255,255,0.2)'};min-width:28px">${ist?.toFixed(2)||'—'}</span>${g>=2?'<span style="font-size:9px;color:#ef4444;font-weight:800">!</span>':''}</div>`;}).join('');
      const vl=CYCLES.map(c=>{const v=getAvg(pid,c.key);return `<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px"><span style="color:rgba(255,255,255,0.4)">${c.short}</span><span style="font-weight:700;color:${v?noteColor(v):'rgba(255,255,255,0.2)'}">${v?.toFixed(2)||'—'}</span></div>`;}).join('');
      cards+=`<div class="card" style="padding:18px;position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#c9a84c,#6366f1)"></div><div style="margin-bottom:12px"><div style="font-size:14px;font-weight:800;color:#e2e8f0">${esc(p.name)}</div><div style="font-size:10px;color:rgba(255,255,255,0.4)">${p.nr} · ${esc(p.verein)}</div></div><div style="display:flex;justify-content:center;margin-bottom:12px">${radarSVG(im,sm,145)}</div>${a?`<div style="text-align:center;font-size:20px;font-weight:800;color:${noteColor(a)};margin-bottom:12px">${a.toFixed(2)}<span style="font-size:10px;color:rgba(255,255,255,0.4);font-weight:400"> Ø</span></div>`:''}<div>${bars}</div><div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06)">${vl}</div></div>`;
    });
    cards+=`</div>`;
  } else {

function toggleCompare(id){

  renderVergleich();
}

// RGB-Hilfsfunktionen für jsPDF
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}
function noteRgb(v){
  if(!v)return[107,114,128];
  if(v<2)return[239,68,68];
  if(v<3)return[245,158,11];
  if(v<4)return[34,197,94];
  return[59,130,246];
}
function gapRgb(g){
  if(g==null)return[156,163,175];
  if(g>=2)return[239,68,68];
  if(g>=1)return[245,158,11];
  return[34,197,94];
}

// Zeichnet eine Spieler-Karte in den PDF-Doc
// x/y = obere linke Ecke, w/h = Breite/Höhe der Karte
function drawPlayerCard(doc, p, cy, x, y, w, h) {
  const pd = state.data[p.id];
  const cyInfo = CYCLES.find(c=>c.key===cy);
  const avg = getAvg(p.id, cy);

  // ── Kartenhintergrund ──────────────────────────────
  doc.setFillColor(17, 29, 46);
  doc.roundedRect(x, y, w, h, 4, 4, 'F');
  doc.setDrawColor(40, 60, 85);
  doc.setLineWidth(0.4);
  doc.roundedRect(x, y, w, h, 4, 4, 'S');

  // ── Oranger Kopfbalken ────────────────────────────
  doc.setFillColor(224, 123, 57);
  doc.roundedRect(x, y, w, 10, 4, 4, 'F');
  doc.setFillColor(224, 123, 57);
  doc.rect(x, y+4, w, 6, 'F'); // untere Ecken gerade

  // ── Kopfzeile: Name + Nr ──────────────────────────
  doc.setFont(undefined, 'bold');
  doc.setFontSize(12);
  doc.setTextColor(255, 255, 255);
  const nameStr = `${p.nr}  ${p.name}`;
  doc.text(nameStr, x+5, y+7);

  // Zyklus-Label rechts im Kopfbalken
  doc.setFontSize(8);
  doc.setFont(undefined, 'normal');
  doc.text(`${cyInfo.short} · ${cyInfo.label}`, x+w-5, y+7, {align:'right'});

  // ── Stammdaten Zeile ──────────────────────────────
  const infoY = y + 15;
  doc.setFontSize(8);
  doc.setFont(undefined, 'normal');
  doc.setTextColor(160, 175, 195);
  const infoStr = `Geb: ${p.geb}  ·  Fuss: ${p.fuss}  ·  Nat: ${p.nat}  ·  Verein: ${p.verein}${p.tw?' · TW':''}${p.rae?' · RAE':''}`;
  doc.text(infoStr, x+5, infoY);

  // Trennlinie
  doc.setDrawColor(40, 60, 85);
  doc.setLineWidth(0.3);
  doc.line(x+4, infoY+3, x+w-4, infoY+3);

  // ── TIPS/U Matrix ─────────────────────────────────
  const matrixStartY = infoY + 8;
  const colW = [52, 18, 18, 16, w - 52 - 18 - 18 - 16 - 10]; // Dim | IST | SOLL | GAP | Massnahme
  const colX = [x+5, x+57, x+75, x+93, x+109];
  const rowH = 9;

  // Tabellen-Header
  doc.setFontSize(7);
  doc.setFont(undefined, 'bold');
  doc.setTextColor(130, 145, 165);
  ['DIMENSION', 'IST', 'SOLL', 'GAP', 'MASSNAHME'].forEach((h,i)=>{
    doc.text(h, colX[i] + (i>0&&i<4 ? colW[i]/2 : 0), matrixStartY, {align: i>0&&i<4 ? 'center' : 'left'});
  });

  // Tabellen-Trennlinie
  doc.setDrawColor(40, 60, 85);
  doc.line(x+4, matrixStartY+2, x+w-4, matrixStartY+2);

  // Matrix-Zeilen
  DIMS.forEach((dim, idx) => {
    const r = pd.ratings[cy][dim];
    const g = gap(r.ist, r.soll);
    const rowY = matrixStartY + 5 + idx * rowH;
    const dimRgb = hexToRgb(DIM_COLOR[dim]);

    // Zebra-Hintergrund
    if(idx%2===0){
      doc.setFillColor(22, 35, 55);
      doc.rect(x+4, rowY-5, w-8, rowH, 'F');
    }

    // Dim-Badge (farbiger Kreis)
    doc.setFillColor(...dimRgb);
    doc.circle(colX[0]+3, rowY-1.5, 2.5, 'F');
    doc.setFontSize(6);
    doc.setFont(undefined,'bold');
    doc.setTextColor(255,255,255);
    doc.text(dim, colX[0]+3, rowY-0.8, {align:'center'});

    // Dim-Name
    doc.setFontSize(8);
    doc.setFont(undefined,'bold');
    doc.setTextColor(...dimRgb);
    doc.text(DIM_FULL[dim], colX[0]+9, rowY);

    // IST
    if(r.ist){
      doc.setFont(undefined,'bold');
      doc.setFontSize(8);
      doc.setTextColor(...noteRgb(r.ist));
      doc.text(r.ist.toFixed(2), colX[1]+colW[1]/2, rowY, {align:'center'});
    } else {
      doc.setTextColor(100,115,130);
      doc.setFont(undefined,'normal');
      doc.text('—', colX[1]+colW[1]/2, rowY, {align:'center'});
    }

    // SOLL
    if(r.soll){
      doc.setFont(undefined,'bold');
      doc.setFontSize(8);
      doc.setTextColor(99,102,241);
      doc.text(r.soll.toFixed(2), colX[2]+colW[2]/2, rowY, {align:'center'});
    } else {
      doc.setTextColor(100,115,130);
      doc.setFont(undefined,'normal');
      doc.text('—', colX[2]+colW[2]/2, rowY, {align:'center'});
    }

    // GAP
    if(g!=null){
      doc.setFont(undefined,'bold');
      doc.setFontSize(8);
      doc.setTextColor(...gapRgb(g));
      const gStr = (g>=0?'+':'')+g.toFixed(2)+(g>=2?' ⚠':'');
      doc.text(gStr, colX[3]+colW[3]/2, rowY, {align:'center'});
    } else {
      doc.setTextColor(100,115,130);
      doc.setFont(undefined,'normal');
      doc.text('—', colX[3]+colW[3]/2, rowY, {align:'center'});
    }

    // Massnahme (abgeschnitten wenn zu lang)
    if(r.massnahme){
      doc.setFont(undefined,'normal');
      doc.setFontSize(7);
      doc.setTextColor(180,190,205);
      const ms = r.massnahme.length>38 ? r.massnahme.substring(0,36)+'…' : r.massnahme;
      doc.text(ms, colX[4], rowY);
    }
  });

  // Trennlinie nach Matrix
  const afterMatrixY = matrixStartY + 5 + DIMS.length * rowH + 1;
  doc.setDrawColor(40, 60, 85);
  doc.line(x+4, afterMatrixY, x+w-4, afterMatrixY);

  // ── Stärke / Defizit ─────────────────────────────
  const sdY = afterMatrixY + 6;
  const halfW = (w-14)/2;

  // Stärke Box
  doc.setFillColor(22, 55, 35);
  doc.roundedRect(x+4, sdY-4, halfW, 10, 2, 2, 'F');
  doc.setFont(undefined,'bold');
  doc.setFontSize(7);
  doc.setTextColor(34,197,94);
  doc.text('STÄRKE', x+6, sdY);
  doc.setFont(undefined,'normal');
  doc.setTextColor(180,210,185);
  const staerkeStr = pd.staerke ? (pd.staerke.length>28?pd.staerke.substring(0,26)+'…':pd.staerke) : '—';
  doc.text(staerkeStr, x+6, sdY+4.5);

  // Defizit Box
  doc.setFillColor(55, 22, 22);
  doc.roundedRect(x+4+halfW+6, sdY-4, halfW, 10, 2, 2, 'F');
  doc.setFont(undefined,'bold');
  doc.setFontSize(7);
  doc.setTextColor(239,68,68);
  doc.text('DEFIZIT', x+4+halfW+8, sdY);
  doc.setFont(undefined,'normal');
  doc.setTextColor(210,180,180);
  const defizitStr = pd.defizit ? (pd.defizit.length>28?pd.defizit.substring(0,26)+'…':pd.defizit) : '—';
  doc.text(defizitStr, x+4+halfW+8, sdY+4.5);

  // ── Trainer-Notizen ───────────────────────────────
  const noteY = sdY + 13;
  doc.setFont(undefined,'bold');
  doc.setFontSize(7);
  doc.setTextColor(245,158,11);
  doc.text(`NOTIZEN · ${cyInfo.label.toUpperCase()}`, x+5, noteY);

  doc.setFillColor(14, 22, 36);
  const noteBoxH = h - (noteY - y) - 5;
  doc.roundedRect(x+4, noteY+2, w-8, noteBoxH, 2, 2, 'F');

  if(pd.notes[cy]){
    doc.setFont(undefined,'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(180,190,205);
    // Text umbrechen
    const splitNotes = doc.splitTextToSize(pd.notes[cy], w-14);
    const visibleLines = splitNotes.slice(0, Math.floor(noteBoxH/4.5));
    doc.text(visibleLines, x+6, noteY+7);
  } else {
    doc.setFont(undefined,'normal');
    doc.setFontSize(7);
    doc.setTextColor(80,95,115);
    doc.text('Keine Notizen erfasst.', x+6, noteY+7);
  }

  // ── Durchschnitt Ø oben rechts ────────────────────
  if(avg){
    const rgb = noteRgb(avg);
    doc.setFillColor(...rgb);
    doc.roundedRect(x+w-24, y+12, 20, 9, 2, 2, 'F');
    doc.setFont(undefined,'bold');
    doc.setFontSize(8);
    doc.setTextColor(255,255,255);
    doc.text(`Ø ${avg.toFixed(2)}`, x+w-14, y+18, {align:'center'});
  }
}

// ─────────────────────────────────────────────────────
// Gesamt-Team: alle Spieler, 2 pro Seite, Querformat
// ─────────────────────────────────────────────────────
async function exportProfilesPDF() {
  const {jsPDF} = window.jspdf;
  const cy = state.cycle;
  const cyLabel = CYCLES.find(c=>c.key===cy)?.label || cy;

  const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
  // A4 landscape: 297 x 210 mm
  const PW = 297, PH = 210;
  const margin = 8;
  const cardW = (PW - margin*3) / 2;  // 2 Karten nebeneinander
  const cardH = PH - margin*2 - 12;   // Höhe minus Kopfzeile und Rand
  const headerH = 10;

  PLAYERS.forEach((p, idx) => {
    const pageIdx = Math.floor(idx / 2);
    const posOnPage = idx % 2; // 0 = links, 1 = rechts

    if(posOnPage === 0){
      if(pageIdx > 0) doc.addPage();
      // Seitenhintergrund
      doc.setFillColor(13, 21, 32);
      doc.rect(0, 0, PW, PH, 'F');

      // Seitenheader
      doc.setFontSize(9);
      doc.setFont(undefined,'bold');
      doc.setTextColor(201,168,76);
      doc.text('FE12 Old Boys · TIPS/U Spielerprofile', margin, margin+4);
      doc.setFont(undefined,'normal');
      doc.setTextColor(120,135,155);
      doc.text(`${cyLabel} · Erstellt: ${new Date().toLocaleDateString('de-CH')}`, margin, margin+8);
      // Seitenzahl rechts
      doc.setTextColor(80,95,115);
      doc.text(`Seite ${pageIdx+1} / ${Math.ceil(PLAYERS.length/2)}`, PW-margin, margin+4, {align:'right'});
      // Trennlinie
      doc.setDrawColor(40,60,85);
      doc.setLineWidth(0.4);
      doc.line(margin, margin+10, PW-margin, margin+10);
    }

    // Karten-X-Position
    const cardX = margin + posOnPage * (cardW + margin);
    const cardY = margin + headerH;

    drawPlayerCard(doc, p, cy, cardX, cardY, cardW, cardH);
  });

  doc.save(`FE12_Profile_${cyLabel}_${new Date().toISOString().slice(0,10)}.pdf`);
}

const TIPS_MAX = TIPS_NCRIT*4;
const TIPS_ENTW = ['früh','tend. früh','normal','tend. spät','spät'];
const TIPS_LEGEND = '(leer) = noch nicht beurteilbar · 1 = schwach · 2 = genügend · 3 = gut · 4 = sehr gut';
const critIdD = (k,i)=>k+(i+1);
const detColor = v=>({1:'#ef4444',2:'#f59e0b',3:'#22c55e',4:'#3b82f6'}[v]||'#6b7280');

function ensureTips(pid,cy){
  if(!state.tipsDetail) state.tipsDetail={};
  if(!state.tipsDetail[pid]) state.tipsDetail[pid]={};
  if(!state.tipsDetail[pid][cy]) state.tipsDetail[pid][cy]={scores:{},beobachter:'',entwicklung:''};
  return state.tipsDetail[pid][cy];
}
function tipsTotals(t){
  let total=0,assessed=0; const cats={};
  TIPS_CATS.forEach(c=>{
    let sum=0,cnt=0;
    c.items.forEach((_,i)=>{const v=t.scores[critIdD(c.key,i)]; if(v){sum+=v;cnt++;total+=v;assessed++;}});
    cats[c.key]={sum,cnt,avg:cnt?(sum/cnt).toFixed(2):null};
  });
  return {total,assessed,cats,avg:assessed?(total/assessed).toFixed(2):'—'};
}
async function loadTipsDetail(){
  state.tipsDetail={};
  try{
    const r=await sb.from('tips_detail').select('*');
    (r.data||[]).forEach(row=>{
      if(!state.tipsDetail[row.player_id]) state.tipsDetail[row.player_id]={};
      state.tipsDetail[row.player_id][row.cycle]={scores:row.scores||{},beobachter:row.beobachter||'',entwicklung:row.entwicklung||''};
    });
  }catch(e){console.error('loadTipsDetail',e);}
}
function saveTipsDetail(pid,cy){
  if(roGuard()) return;
  if(!canEditAssess()) return;
  const t=ensureTips(pid,cy);
  debSave('tips_'+pid+'_'+cy,async()=>{
    const {error}=await sb.from('tips_detail').upsert({player_id:pid,cycle:cy,coach:currentUserEmail,scores:t.scores,beobachter:t.beobachter,entwicklung:t.entwicklung},{onConflict:'player_id,cycle,coach'});
    if(_saveErr(error,'TIPS/U')) return;
    _rawUpsert('rawTips',{player_id:pid,cycle:cy,coach:currentUserEmail,scores:t.scores,beobachter:t.beobachter,entwicklung:t.entwicklung},x=>x.player_id===pid&&x.cycle===cy&&x.coach===currentUserEmail);
    if(typeof logActivity==='function'){const tt=tipsTotals(t);logActivity(pid,'tips',cycleLabel(cy)+' · TIPS/U ('+tt.assessed+'/'+TIPS_NCRIT+' · Total '+tt.total+')',cy,null,'tips_detail',null,'Total '+tt.total);}
  });
}
function setTipsScore(pid,cy,cid,v){
  if(roGuard()) return;
  if(!canEditAssess()){ showSavedToast('Nur deine eigene Ansicht ist bearbeitbar – oben Trainer wechseln',false); return; }
  const t=ensureTips(pid,cy);
  if(t.scores[cid]===v) delete t.scores[cid]; else t.scores[cid]=v;
  saveTipsDetail(pid,cy);
  renderTipsDetail();
}
function setTipsMeta(pid,cy,field,val){
  if(roGuard()) return;
  if(!canEditAssess()){ showSavedToast('Nur deine eigene Ansicht ist bearbeitbar',false); return; }
  const t=ensureTips(pid,cy);
  t[field]=val; saveTipsDetail(pid,cy);
}
function selectTipsPlayer(id){ state.tipsSelPlayer=id?parseInt(id):null; renderTipsDetail(); }

function renderTipsDetail(){
  document.getElementById('pageTitle').textContent='TIPS/U';
  if(state.tipsSelPlayer===undefined) state.tipsSelPlayer = state.selPlayer || (PLAYERS[0]&&PLAYERS[0].id) || null;

// ── TIPS Detailbogen PDF (weiss, Noten farbig, TIPS/U Matrix oben) ──
function drawTipsPlayerPDF(doc,p,cy){
  const t=ensureTips(p.id,cy);
  const tot=tipsTotals(t);
  const cyInfo=CYCLES.find(c=>c.key===cy);
  const pd=state.data[p.id];
  const detRgb=v=>({1:[239,68,68],2:[245,158,11],3:[34,197,94],4:[59,130,246]}[v]||[120,130,145]);

  // Kopf (weisser Hintergrund = Standard)
  try{ const src=(typeof getTeamLogo==='function')?getTeamLogo():null; if(src){ const fmt=/^data:image\/png/i.test(src)?'PNG':'JPEG'; doc.addImage(src,fmt,177,7,19,19); } }catch(e){ console.warn('tips logo',e); }
  doc.setFontSize(15);doc.setFont(undefined,'bold');doc.setTextColor(201,168,76);
  doc.text('TIPS/U · Detailauswertung',14,16);
  doc.setFontSize(10);doc.setFont(undefined,'bold');doc.setTextColor(30,41,59);
  doc.text(p.nr+'  '+p.name,14,23);
  doc.setFontSize(8);doc.setFont(undefined,'normal');doc.setTextColor(90,100,115);
  doc.text(cyInfo.label+' ('+cyInfo.short+')  ·  Beobachter: '+(t.beobachter||'—')+'  ·  Entwicklung: '+(t.entwicklung||'—')+'  ·  '+new Date().toLocaleDateString('de-CH'),14,28);
  doc.setDrawColor(201,168,76);doc.setLineWidth(0.5);doc.line(14,31,196,31);

  // ── TIPS/U Matrix (kompakt, quer) ──
  doc.setFontSize(8.5);doc.setFont(undefined,'bold');doc.setTextColor(30,41,59);
  doc.text('TIPS/U Matrix · '+cyInfo.short,14,37);
  const istRow=['IST'], sollRow=['SOLL'], gapRow=['GAP'];
  DIMS.forEach(d=>{
    const r=pd.ratings[cy][d];
    istRow.push(r.ist!=null?r.ist.toFixed(2):'–');
    sollRow.push(r.soll!=null?r.soll.toFixed(2):'–');
    const g=gap(r.ist,r.soll);
    gapRow.push(g!=null?(g>=0?'+':'')+g.toFixed(2):'–');
  });
  doc.autoTable({
    startY:39,
    head:[['', 'T · Technik','I · Intelligenz','P · Persönl.','S · Schnell.','U · Umfeld']],
    body:[istRow,sollRow,gapRow],
    theme:'grid',
    styles:{fontSize:8,cellPadding:1.6,halign:'center',lineColor:[210,215,222],lineWidth:0.2,textColor:[40,50,65]},
    headStyles:{fillColor:[238,241,245],textColor:[60,72,90],fontStyle:'bold',fontSize:7.5,halign:'center'},
    columnStyles:{0:{halign:'left',fontStyle:'bold',cellWidth:18,fillColor:[238,241,245]}},
    margin:{left:14,right:14},
    didParseCell:function(data){
      if(data.section==='body' && data.column.index>0){
        const raw=data.cell.raw;
        if(raw==='–'){data.cell.styles.textColor=[165,173,183];return;}
        const num=parseFloat(String(raw).replace('+',''));
        data.cell.styles.fontStyle='bold';
        data.cell.styles.textColor = data.row.index===2 ? gapRgb(num) : noteRgb(num);
      }
    }
  });
  let y=doc.lastAutoTable.finalY+4;

  // ── Total / Ø / bewertet (oben, 1. Seite) ──
  doc.setFillColor(245,247,250);
  doc.roundedRect(14,y,182,9,2,2,'F');
  doc.setFillColor(201,168,76);doc.rect(14,y,1.5,9,'F');
  doc.setFontSize(9.5);doc.setFont(undefined,'bold');doc.setTextColor(30,41,59);
  doc.text('Total: '+tot.total+' / '+TIPS_MAX,19,y+6);
  doc.setFont(undefined,'normal');doc.setTextColor(90,100,115);
  doc.text('Ø: '+tot.avg,82,y+6);
  doc.text('bewertet: '+tot.assessed+' / '+TIPS_NCRIT,118,y+6);
  y+=13;

  // Legende
  doc.setFontSize(6.8);doc.setFont(undefined,'normal');doc.setTextColor(120,130,145);
  doc.text(TIPS_LEGEND,14,y);
  y+=3;

  // ── Kategorien ──
  TIPS_CATS.forEach(c=>{
    if(y>262){doc.addPage();y=16;}
    const col=hexToRgb(DIM_COLOR[c.key]||'#c9a84c');
    doc.setFontSize(9.5);doc.setFont(undefined,'bold');doc.setTextColor(col[0],col[1],col[2]);
    doc.text(c.key+' · '+c.title+(tot.cats[c.key].avg?'   (Ø '+tot.cats[c.key].avg+')':''),14,y+1);
    const body=c.items.map((it,i)=>{const v=t.scores[critIdD(c.key,i)];return [c.key+(i+1),'Er/Sie '+it, v?String(v):'–'];});
    doc.autoTable({
      startY:y+2.5,
      head:[['#','Kriterium','Note']],
      body:body,
      theme:'plain',
      styles:{fontSize:7,cellPadding:1.1,textColor:[40,50,65]},
      headStyles:{fillColor:[238,241,245],textColor:[60,72,90],fontStyle:'bold',fontSize:7},
      alternateRowStyles:{fillColor:[248,249,251]},
      columnStyles:{0:{cellWidth:11,halign:'center',textColor:[120,130,145]},1:{cellWidth:163},2:{cellWidth:14,halign:'center',fontStyle:'bold'}},
      margin:{left:14,right:14},
      didParseCell:function(data){
        if(data.section==='body' && data.column.index===2){
          const raw=data.cell.raw;
          if(raw && raw!=='–'){ data.cell.styles.textColor=detRgb(parseInt(raw)); }
          else { data.cell.styles.textColor=[170,178,188]; }
        }
      }
    });
    y=doc.lastAutoTable.finalY+3;
  });
}
async function exportTipsSingle(pid){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const p=PLAYERS.find(x=>x.id===pid);
  drawTipsPlayerPDF(doc,p,state.cycle);
  const cyLabel=CYCLES.find(c=>c.key===state.cycle)?.label||state.cycle;
  doc.save('FE12_TIPSU_'+p.name.replace(/[^a-zA-Z0-9]/g,'_')+'_'+cyLabel+'_'+new Date().toISOString().slice(0,10)+'.pdf');
}
async function exportTipsTeam(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const cyLabel=CYCLES.find(c=>c.key===state.cycle)?.label||state.cycle;
  PLAYERS.forEach((p,idx)=>{ if(idx>0)doc.addPage(); drawTipsPlayerPDF(doc,p,state.cycle); });
  doc.save('FE12_TIPSU_TEAM_'+cyLabel+'_'+new Date().toISOString().slice(0,10)+'.pdf');
}

function getCurrentKW(){const now=new Date();const start=new Date(now.getFullYear(),0,1);const diff=now-start+(start.getTimezoneOffset()-now.getTimezoneOffset())*60000;const oneWeek=604800000;return Math.ceil(diff/oneWeek);}
function getAllKWData(){return[...MAKRO.vorrunde,...MAKRO.rueckrunde];}
function getKWData(kw){return getAllKWData().find(w=>w.kw===kw);}

function makroWidget(){
  const currentKW=getCurrentKW();
  const allData=getAllKWData();
  const currentIdx=allData.findIndex(w=>w.kw===currentKW);
  const current=getKWData(currentKW);
  const next1=getKWData(currentKW+1);
  const next2=getKWData(currentKW+2);
  const kwCard=(w,highlight)=>{
    if(!w)return'';
    const border=highlight?`border:1.5px solid ${TYP_BORDER[w.typ]||'#c9a84c'}`:`border:1px solid rgba(255,255,255,0.06)`;
    const bg=highlight?TYP_COLOR[w.typ]||'rgba(201,168,76,0.1)':'#111d2e';
    return`<div style="background:${bg};${border};border-radius:10px;padding:12px 14px;flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:10px;font-weight:800;color:${TYP_BORDER[w.typ]||'#c9a84c'};letter-spacing:.08em">KW ${w.kw}</span>
        <span style="font-size:9px;color:rgba(255,255,255,0.3)">${w.monat}</span>
        ${highlight?`<span style="font-size:9px;font-weight:700;background:rgba(201,168,76,0.2);color:#c9a84c;padding:1px 6px;border-radius:4px">JETZT</span>`:''}
      </div>
      ${w.dna?`<div style="font-size:10px;font-weight:700;color:${DNA_COLOR[w.dna]||'#fff'};margin-bottom:5px;letter-spacing:.04em">DNA: ${w.dna}</div>`:''}
      ${w.label?`<div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);font-style:italic">${esc(w.label)}</div>`:''}
      ${w.ta?`<div style="font-size:11px;font-weight:700;color:#e2e8f0;margin-bottom:3px">${esc(w.ta)}</div>`:''}
      ${w.te?`<div style="font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:2px"><span style="color:#f59e0b;font-weight:700">TE</span> ${esc(w.te)}</div>`:''}
      ${w.hp?`<div style="font-size:10px;color:rgba(255,255,255,0.5)"><span style="color:#22c55e;font-weight:700">HP</span> ${esc(w.hp)}</div>`:''}
    </div>`;
  };
  return`<div style="background:linear-gradient(135deg,#0f1a28,#111d2e);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <i class="ti ti-calendar-stats" style="color:#c9a84c;font-size:18px"></i>
      <span style="font-size:14px;font-weight:700;color:#e2e8f0">Makrozyklus 2026/27</span>
      <button onclick="showView('makro')" style="margin-left:auto;padding:5px 12px;font-size:11px;font-weight:700;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);border-radius:6px;color:#c9a84c;cursor:pointer">Vollansicht →</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${kwCard(current,true)}${kwCard(next1,false)}${kwCard(next2,false)}
    </div>
  </div>`;
}

            ${w.dna?`<span style="font-size:9px;font-weight:700;color:${DNA_COLOR[w.dna]||'#fff'};letter-spacing:.04em">DNA: ${w.dna}${w.me?' · '+w.me:''}</span><br>`:''}

          <i class="ti ti-chevron-${isExp?'up':'down'}" style="font-size:14px;color:rgba(255,255,255,0.3);flex-shrink:0"></i>
        </div>
        ${isExp?`<div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:10px;margin-top:4px">
          ${w.ta?`<div style="margin-bottom:6px"><span style="font-size:9px;font-weight:700;color:#c9a84c;letter-spacing:.06em">TA</span><div style="font-size:12px;color:#e2e8f0;margin-top:2px">${esc(w.ta)}</div></div>`:''}
          ${w.te?`<div style="margin-bottom:6px"><span style="font-size:9px;font-weight:700;color:#f59e0b;letter-spacing:.06em">TE</span><div style="font-size:12px;color:#e2e8f0;margin-top:2px">${esc(w.te)}</div></div>`:''}
          ${w.hp?`<div style="margin-bottom:6px"><span style="font-size:9px;font-weight:700;color:#22c55e;letter-spacing:.06em">HP</span><div style="font-size:12px;color:#e2e8f0;margin-top:2px">${esc(w.hp)}</div></div>`:''}

  refreshStamps();
}

<script>
// ═══════════════════════════════════════════════════
// SPIELE & MATCHES  (ersetzt die externe spiele.js)
// Speicherung in Supabase-Tabelle "matches"
// ═══════════════════════════════════════════════════
if(!state.matches) state.matches = [];
state.matchEditId = state.matchEditId || null;
let _matchesTableMissing = false;
let _matchExtraCols = true;   // Formations-Spalten vorhanden? (wird bei Bedarf auf false gesetzt)
let _matchSaveTimers = {};

const COMPETITIONS = ['Meisterschaft','Turnier','Cup','Testspiel','Trainingsspiel'];
const VENUES = {home:'Heim',away:'Auswärts',neutral:'Neutral'};

// ── SPIELFORM & FORMATIONEN ────────────────────────
const SPIELFORM_LABELS = {'7er':'7er · E-Junioren','9er':'9er · D-Junioren','11er':'11er · C–A / Aktive'};
const FORMATIONS = {
  '7er':['1-2-3-1','1-2-1-1-2'],
  '9er':['1-3-4-1','1-3-2-3','1-2-1-4-1','1-2-4-2'],
  '11er':['1-4-4-2','1-4-2-3-1','1-4-3-3','1-3-5-2','1-3-4-3'],
};
function defaultFormation(sf){ return (FORMATIONS[sf]||FORMATIONS['7er'])[0]; }
function getFormOptions(sf){ return FORMATIONS[sf]||FORMATIONS['7er']; }
// Formation "1-4-4-2" → Outfield-Linien [4,4,2] (führende 1 = TW)
function parseFormation(form){
  const parts=String(form||'').split('-').map(n=>parseInt(n)).filter(n=>n>0);
  return parts.length>1?parts.slice(1):[];
}
// Liefert Positionen {id,label,x,y} in % auf einem vertikalen Feld (eigenes Tor unten)
function getPositions(form){
  const lines=parseFormation(form);
  const pos=[{id:'p0',label:'TW',pos:'TW',x:50,y:90}];
  const nB=lines.length;
  const nMid=Math.max(0,nB-2);
  lines.forEach((count,bi)=>{
    const y = nB<=1 ? 45 : Math.round(74 - bi*(60/(nB-1)));
    let label='MF';
    if(bi===0) label='ABW'; else if(bi===nB-1) label='ANG';
    for(let i=0;i<count;i++){
      const x = count===1 ? 50 : Math.round((100/(count+1))*(i+1));
      const isLeft=i===0, isRight=i===count-1;
      let spec;
      if(bi===0){ spec=((isLeft||isRight)&&count>=4)?'AV':'IV'; }
      else if(bi===nB-1){ spec = count===1?'ST':(count>=3?(isLeft?'LF':(isRight?'RF':'ST')):'ST'); }
      else {
        const midIdx=bi-1;
        let center = nMid<=1?'ZM':(midIdx===0?'DM':(midIdx===nMid-1?'OM':'ZM'));
        spec = (count>=3 && isLeft)?'LM':((count>=3 && isRight)?'RM':center);
      }
      pos.push({id:'p'+pos.length,label,pos:spec,x,y});
    }
  });
  return pos;
}

function uuid(){ return 'm-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8); }

function matchResult(m){
  if(m.status!=='played') return null;
  const gf=parseInt(m.goals_for)||0, ga=parseInt(m.goals_against)||0;
  if(gf>ga) return 'W'; if(gf<ga) return 'L'; return 'D';
}
const RESULT_INFO = {
  W:{label:'Sieg',color:'#22c55e',bg:'rgba(34,197,94,0.15)'},
  D:{label:'Unent.',color:'#f59e0b',bg:'rgba(245,158,11,0.15)'},
  L:{label:'Nied.',color:'#ef4444',bg:'rgba(239,68,68,0.15)'},
};
function matchDateLabel(d){
  if(!d) return 'Kein Datum';
  const parts=String(d).slice(0,10).split('-');
  if(parts.length<3) return d;
  return parts[2]+'.'+parts[1]+'.'+parts[0];
}
function isUpcoming(m){
  if(m.status==='played') return false;
  if(!m.match_date) return true;
  const today=new Date().toISOString().slice(0,10);
  return m.match_date.slice(0,10) >= today;
}

// ── LADEN ──────────────────────────────────────────
async function loadMatches(){
  try{
    const {data,error}=await sb.from('matches').select('*');
    if(error){
      if((error.code==='42P01')||/relation .*matches.* does not exist/i.test(error.message||'')){
        _matchesTableMissing=true;
      }
      state.matches=[]; return;
    }
    _matchesTableMissing=false;
    const rows=data||[];
    if(rows.length){ _matchExtraCols = ('spielform' in rows[0]); }
    const asObj=v=>(v&&typeof v==='object')?v:(v?JSON.parse(v):{});
    state.matches=rows.map(m=>({
      id:m.id, match_date:m.match_date||'', match_time:m.match_time||'', opponent:m.opponent||'',
      venue:m.venue||'home', competition:m.competition||'Meisterschaft',
      goals_for:m.goals_for??0, goals_against:m.goals_against??0,
      status:m.status||'planned',
      lineup:Array.isArray(m.lineup)?m.lineup:(m.lineup?JSON.parse(m.lineup):[]),
      scorers:asObj(m.scorers), assists:asObj(m.assists),
      note:m.note||'',
      spielform:m.spielform||'7er',
      formation:m.formation||defaultFormation(m.spielform||'7er'),
      formationB:m.formation_b||defaultFormation(m.spielform||'7er'),
      lineupA:asObj(m.lineup_a), lineupB:asObj(m.lineup_b),
      halves:(Array.isArray(m.halves)?m.halves:(m.halves?JSON.parse(m.halves):null))||null
    }));
    sortMatches();
  }catch(e){ console.error('loadMatches',e); state.matches=[]; }
}
function sortMatches(){
  state.matches.sort((a,b)=>{
    const da=a.match_date||'9999', db=b.match_date||'9999';
    return db.localeCompare(da);
  });
}
function getMatch(id){ return state.matches.find(m=>m.id===id); }

// ── SPEICHERN ──────────────────────────────────────
function matchPayload(m, withExtra){
  const base={
    id:m.id, match_date:m.match_date||null, opponent:m.opponent||'',
    venue:m.venue, competition:m.competition,
    goals_for:parseInt(m.goals_for)||0, goals_against:parseInt(m.goals_against)||0,
    status:m.status, lineup:m.lineup, scorers:m.scorers, assists:m.assists,
    note:m.note||''
  };
  if(withExtra){
    const sf=m.spielform||'7er';
    ensureHalves(m);
    const h0=m.halves[0];
    base.spielform=sf;
    base.match_time=m.match_time||'';
    base.formation=h0.a.formation||defaultFormation(sf);
    base.formation_b=h0.b.formation||defaultFormation(sf);
    base.lineup_a=h0.a.lineup||{};
    base.lineup_b=h0.b.lineup||{};
    base.halves=m.halves||[];
  }
  return base;
}
function _isMissingColErr(error){
  if(!error) return false;
  if(error.code==='PGRST204') return true;
  const msg=error.message||'';
  return /column .* does not exist/i.test(msg) || /could not find the .* column/i.test(msg);
}
// Robust: speichert das Spiel und lässt fehlende Spalten automatisch weg (statt komplett abzubrechen)
async function _matchUpsert(payload){
  let pl={...payload}, tries=0, dropped=[];
  while(tries++ < 14){
    const {error}=await sb.from('matches').upsert(pl,{onConflict:'id'});
    if(!error) return {error:null, dropped};
    const mm=(error.message||'').match(/Could not find the '([^']+)' column/i);
    if(error.code==='PGRST204' && mm && Object.prototype.hasOwnProperty.call(pl,mm[1])){
      dropped.push(mm[1]); delete pl[mm[1]]; continue;
    }
    return {error, dropped};
  }
  return {error:{message:'zu viele fehlende Spalten in der matches-Tabelle'}, dropped};
}
function persistMatch(id, logText){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  clearTimeout(_matchSaveTimers[id]);
  _matchSaveTimers[id]=setTimeout(async()=>{
    try{
      let {error,dropped}=await _matchUpsert(matchPayload(m,_matchExtraCols));
      if(dropped&&dropped.length){ if(dropped.some(c=>['spielform','match_time','formation','formation_b','lineup_a','lineup_b','halves'].includes(c))) _matchExtraCols=false; showSavedToast('Gespeichert – nicht vorhandene Spalten ('+dropped.join(', ')+') wurden ausgelassen',false); }
      if(error){ console.error('persistMatch',error); showSavedToast('Spiel speichern fehlgeschlagen: '+(error.message||error.code||'unbekannt'),false); return; }
      if(typeof logActivity==='function'){
        const opp=m.opponent||'Gegner offen';
        logActivity(null,'match', logText||('Spiel gespeichert · '+opp), null, null,'matches','', opp);
      }
    }catch(e){ console.error('persistMatch',e); }
  },600);
}

// ── CRUD ───────────────────────────────────────────
async function addMatch(){
  if(roGuard()) return;
  if(_matchesTableMissing){ renderSpiele(); return; }
  const sf='7er', def=defaultFormation(sf);
  const mkHalf=()=>({a:{formation:def,lineup:{}},b:{formation:def,lineup:{}}});
  const m={id:uuid(),match_date:new Date().toISOString().slice(0,10),match_time:'',opponent:'',venue:'home',competition:'Meisterschaft',goals_for:0,goals_against:0,status:'planned',lineup:[],scorers:{},assists:{},note:'',spielform:sf,formation:def,formationB:def,lineupA:{},lineupB:{},halves:[mkHalf(),mkHalf(),mkHalf()]};
  state.matches.unshift(m);
  try{
    let {error,dropped}=await _matchUpsert(matchPayload(m,_matchExtraCols));
    if(dropped&&dropped.length && dropped.some(c=>['spielform','match_time','formation','formation_b','lineup_a','lineup_b','halves'].includes(c))) _matchExtraCols=false;
    if(error){
      console.error('addMatch',error);
      showSavedToast('Spiel anlegen fehlgeschlagen: '+(error.message||error.code||'unbekannt'),false);
      state.matches=state.matches.filter(x=>x.id!==m.id);  // Phantom-Spiel wieder entfernen
      renderSpiele();
      return;
    }
    if(typeof logActivity==='function') logActivity(null,'match','Neues Spiel angelegt',null,null,'matches','','neu');
  }catch(e){ console.error('addMatch',e); showSavedToast('Spiel anlegen fehlgeschlagen: '+(e.message||'Netzwerkfehler'),false); state.matches=state.matches.filter(x=>x.id!==m.id); renderSpiele(); return; }
  state.matchEditId=m.id;
  renderSpiele();
}
async function deleteMatch(id){
  if(roGuard()) return;
  const m=getMatch(id);
  if(!confirm('Spiel'+(m&&m.opponent?' gegen '+m.opponent:'')+' wirklich löschen?')) return;
  state.matches=state.matches.filter(x=>x.id!==id);
  if(state.matchEditId===id) state.matchEditId=null;
  try{
    await sb.from('matches').delete().eq('id',id);
    if(typeof logActivity==='function') logActivity(null,'match','Spiel gelöscht'+(m&&m.opponent?' · '+m.opponent:''),null,null,'matches',m?m.opponent:'',null);
  }catch(e){ console.error('deleteMatch',e); }
  renderSpiele();
}
function editMatch(id){ state.matchEditId=id; renderSpiele(); }
function closeMatchEditor(){ state.matchEditId=null; sortMatches(); renderSpiele(); }

function updateMatchField(id,field,val){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  m[field]=val;
  if(field==='status' && val==='played' && !m.match_date){ m.match_date=new Date().toISOString().slice(0,10); }
  persistMatch(id);
  // Live-Update von Ergebnis-Badge & Kopf, ohne komplettes Re-Render
  const badge=document.getElementById('me_result_'+id);
  if(badge){ const r=matchResult(m); badge.innerHTML = r?`<span style="font-size:12px;font-weight:800;color:${RESULT_INFO[r].color};background:${RESULT_INFO[r].bg};padding:4px 12px;border-radius:6px">${RESULT_INFO[r].label} · ${m.goals_for||0}:${m.goals_against||0}</span>`:`<span style="font-size:11px;color:rgba(255,255,255,0.35)">Geplant</span>`; }
}
function stepGoal(id,which,delta){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  const f=which==='for'?'goals_for':'goals_against';
  m[f]=Math.max(0,(parseInt(m[f])||0)+delta);
  if(m.status!=='played') m.status='played';
  const el=document.getElementById('mg_'+which+'_'+id); if(el) el.textContent=m[f];
  updateMatchField(id,f,m[f]);
}
function toggleLineup(id,pid){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  if(!Array.isArray(m.lineup)) m.lineup=[];
  const i=m.lineup.indexOf(pid);
  if(i>=0){ m.lineup.splice(i,1); if(m.scorers) delete m.scorers[pid]; if(m.assists) delete m.assists[pid]; }
  else m.lineup.push(pid);
  persistMatch(id);
  renderSpiele();
}
function stepStat(id,pid,kind,delta){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  const obj = kind==='goal' ? (m.scorers||(m.scorers={})) : (m.assists||(m.assists={}));
  obj[pid]=Math.max(0,(parseInt(obj[pid])||0)+delta);
  if(obj[pid]===0) delete obj[pid];
  const el=document.getElementById('stat_'+kind+'_'+id+'_'+pid); if(el) el.textContent=obj[pid]||0;
  persistMatch(id);
}

// ── STATS ──────────────────────────────────────────
function matchStats(){
  const played=state.matches.filter(m=>m.status==='played');
  let w=0,d=0,l=0,gf=0,ga=0;
  played.forEach(m=>{ const r=matchResult(m); if(r==='W')w++; else if(r==='D')d++; else if(r==='L')l++; gf+=parseInt(m.goals_for)||0; ga+=parseInt(m.goals_against)||0; });
  return {total:state.matches.length,played:played.length,w,d,l,gf,ga};
}
function topScorers(limit=5){
  const tally={};
  state.matches.forEach(m=>{ if(m.status!=='played') return; Object.entries(m.scorers||{}).forEach(([pid,g])=>{tally[pid]=(tally[pid]||0)+(parseInt(g)||0);}); });
  return Object.entries(tally).map(([pid,g])=>({pid:parseInt(pid),goals:g})).filter(x=>x.goals>0).sort((a,b)=>b.goals-a.goals).slice(0,limit);
}

// ── FORMATION: 3 HALBZEITEN × 2 FELDER ─────────────
const HALF_LABELS = ['1. Halbzeit','2. Halbzeit','3. Halbzeit'];
const N_HALVES = 3;
function defaultHalf(sf){ const f=defaultFormation(sf); return {a:{formation:f,lineup:{}},b:{formation:f,lineup:{}}}; }
function ensureHalves(m){
  const sf=m.spielform||'7er';
  if(!Array.isArray(m.halves) || m.halves.length<N_HALVES){
    const arr = Array.isArray(m.halves)? m.halves.slice() : [];
    // Migration aus altem 2-Feld-Modell → 1. Halbzeit
    if(arr.length===0 && (m.formation||m.formationB||(m.lineupA&&Object.keys(m.lineupA).length)||(m.lineupB&&Object.keys(m.lineupB).length))){
      arr.push({a:{formation:m.formation||defaultFormation(sf),lineup:m.lineupA||{}},b:{formation:m.formationB||defaultFormation(sf),lineup:m.lineupB||{}}});
    }
    while(arr.length<N_HALVES) arr.push(defaultHalf(sf));
    m.halves=arr;
  }
  m.halves = m.halves.slice(0,N_HALVES).map(h=>({
    a:{formation:(h&&h.a&&h.a.formation)||defaultFormation(sf), lineup:(h&&h.a&&h.a.lineup)||{}},
    b:{formation:(h&&h.b&&h.b.formation)||defaultFormation(sf), lineup:(h&&h.b&&h.b.lineup)||{}},
  }));
  return m.halves;
}
function getField(m,half,which){ ensureHalves(m); return which==='B'? m.halves[half].b : m.halves[half].a; }

function changeMatchSpielform(id,val){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  m.spielform=val;
  m.halves = Array.from({length:N_HALVES}, ()=>defaultHalf(val));
  persistMatch(id,'Spielform geändert · '+(SPIELFORM_LABELS[val]||val));
  renderSpiele();
}
function changeMatchFormation(id,half,which,val){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  const fld=getField(m,half,which);
  fld.formation=val;
  // Zuweisungen behalten, deren Position es in der neuen Formation noch gibt
  const valid=new Set(getPositions(val).map(p=>p.id));
  const old=fld.lineup||{}, next={};
  Object.keys(old).forEach(k=>{ if(valid.has(k)) next[k]=old[k]; });
  fld.lineup=next;
  persistMatch(id);
  renderSpiele();
}
function assignMatchLineup(id,half,posId,val,which){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  ensureHalves(m);
  const fld=getField(m,half,which);
  if(!fld.lineup) fld.lineup={};
  if(val===''||val==null){
    delete fld.lineup[posId];
  } else {
    const pid=parseInt(val);
    // Eindeutig nur INNERHALB derselben Halbzeit (Feld A+B) → andere Halbzeiten dürfen Spieler erneut nutzen
    ['a','b'].forEach(fk=>{ const o=m.halves[half][fk].lineup; if(o){ Object.keys(o).forEach(k=>{ if(String(o[k])===String(pid)) delete o[k]; }); } });
    fld.lineup[posId]=pid;
  }
  persistMatch(id);
  renderSpiele();
}
function clearMatchField(id,half,which){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  getField(m,half,which).lineup={};
  persistMatch(id);
  renderSpiele();
}
function assignedHalfIds(m,half){
  ensureHalves(m);
  const set=new Set();
  ['a','b'].forEach(fk=>{ const o=m.halves[half][fk].lineup||{}; Object.values(o).forEach(pid=>set.add(String(pid))); });
  return set;
}

// ── SPIELZEIT & POSITIONEN (abgeleitet aus den Aufstellungen) ──
const MIN_PER_HALF = 15;   // fix: 15 Min pro Halbzeit-Einsatz
function matchPlayerStats(m){
  const per={};
  if(!m||!Array.isArray(m.halves)) return per;
  m.halves.forEach((hz,hi)=>{
    ['a','b'].forEach(fk=>{
      const fld=hz&&hz[fk]; if(!fld) return;
      const posMap={}; getPositions(fld.formation||defaultFormation(m.spielform)).forEach(pp=>posMap[pp.id]=pp.pos||pp.label);
      Object.entries(fld.lineup||{}).forEach(([posId,pid])=>{
        const k=String(pid);
        if(!per[k]) per[k]={halves:new Set(),pos:{}};
        per[k].halves.add(hi);
        const lab=posMap[posId]||'?';
        per[k].pos[lab]=(per[k].pos[lab]||0)+1;
      });
    });
  });
  const out={};
  Object.keys(per).forEach(k=>{ const h=per[k].halves.size; out[k]={halves:h,minutes:h*MIN_PER_HALF,pos:per[k].pos}; });
  return out;
}
function posSummary(posObj){
  return Object.entries(posObj||{}).sort((a,b)=>b[1]-a[1]).map(([l,n])=>n>1?l+'×'+n:l).join(', ')||'—';
}
function matchLineupIds(m){
  const set=new Set();
  if(!m||!Array.isArray(m.halves)) return set;
  m.halves.forEach(hz=>['a','b'].forEach(fk=>{ const o=(hz&&hz[fk]&&hz[fk].lineup)||{}; Object.values(o).forEach(pid=>set.add(String(pid))); }));
  return set;
}
function matchHasLineup(m){ return matchLineupIds(m).size>0; }
function matchPhase(m){ const mo=parseInt((m.match_date||'').slice(5,7))||0; return mo>=7?'vor':'rueck'; } // Jul–Dez = Vorrunde
function aggMatchStats(filter){
  const f=filter||{}; const per={};
  const blank=()=>({halves:0,minutes:0,matches:0,pos:{},goals:0,assists:0});
  (state.matches||[]).forEach(m=>{
    if(f.comp && f.comp!=='all' && m.competition!==f.comp) return;
    if(f.phase && f.phase!=='all' && matchPhase(m)!==f.phase) return;
    const ms=matchPlayerStats(m);
    Object.keys(ms).forEach(k=>{
      if(!per[k]) per[k]=blank();
      per[k].halves+=ms[k].halves; per[k].minutes+=ms[k].minutes; per[k].matches++;
      Object.entries(ms[k].pos).forEach(([l,n])=>per[k].pos[l]=(per[k].pos[l]||0)+n);
    });
    Object.entries(m.scorers||{}).forEach(([pid,n])=>{ const k=String(pid); if(!per[k])per[k]=blank(); per[k].goals+=(parseInt(n)||0); });
    Object.entries(m.assists||{}).forEach(([pid,n])=>{ const k=String(pid); if(!per[k])per[k]=blank(); per[k].assists+=(parseInt(n)||0); });
  });
  return per;
}

  const pitch=`<div style="position:relative;width:100%;max-width:300px;margin:0 auto;aspect-ratio:3/4;background:linear-gradient(180deg,#1f7a43,#15663a);border:1px solid rgba(255,255,255,0.18);border-radius:10px;overflow:hidden">
      <div style="position:absolute;left:6%;right:6%;top:50%;height:1px;background:rgba(255,255,255,0.25)"></div>
      <div style="position:absolute;left:50%;top:50%;width:54px;height:54px;border:1px solid rgba(255,255,255,0.25);border-radius:50%;transform:translate(-50%,-50%)"></div>
      <div style="position:absolute;left:24%;right:24%;bottom:0;height:13%;border:1px solid rgba(255,255,255,0.22);border-bottom:none;border-radius:4px 4px 0 0"></div>
      <div style="position:absolute;left:24%;right:24%;top:0;height:13%;border:1px solid rgba(255,255,255,0.22);border-top:none;border-radius:0 0 4px 4px"></div>
      ${markers}
    </div>`;
  return `<div style="flex:1 1 240px;max-width:340px;min-width:0">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <span style="font-size:11px;font-weight:800;color:#c9a84c">Feld ${which}</span>
      <select onchange="changeMatchFormation('${id}',${half},'${which}',this.value)" style="font-size:11px;padding:4px 8px;background:#1e2a3a;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#e2e8f0;font-weight:700">${formOpts}</select>
      <span style="font-size:10px;color:rgba(255,255,255,0.35)">${count} besetzt</span>
      ${count?`<button onclick="clearMatchField('${id}',${half},'${which}')" style="margin-left:auto;font-size:10px;font-weight:700;color:#ef4444;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:6px;padding:3px 9px;cursor:pointer">leeren</button>`:''}

function halfBlockHTML(id,half){
