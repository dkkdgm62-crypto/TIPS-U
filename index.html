      return[`${dim} · ${DIM_FULL[dim]}`,r.ist?.toFixed(2)||'—',r.soll?.toFixed(2)||'—',g!=null?(g>=0?'+':'')+g.toFixed(2)+(g>=2?' ⚠':''):'—',r.massnahme||''];
    });
    doc.autoTable({startY:y+8,head:[['Dimension','IST','SOLL','Gap','Massnahme']],body:rows,theme:'plain',styles:{fontSize:8,cellPadding:2,textColor:[200,210,220],fillColor:[20,30,45]},headStyles:{fillColor:[30,42,58],textColor:[180,190,205],fontStyle:'bold'},columnStyles:{0:{cellWidth:40},1:{cellWidth:16,halign:'center'},2:{cellWidth:16,halign:'center'},3:{cellWidth:16,halign:'center'},4:{cellWidth:100}},margin:{left:14,right:14}});
    y=doc.lastAutoTable.finalY+4;
    if(pd.notes[cy]){doc.setFontSize(8);doc.setTextColor(120,130,145);doc.text(`Notizen: ${pd.notes[cy].substring(0,200)}`,14,y);y+=5;}
    if(pd.defizit){doc.setFontSize(8);doc.setTextColor(239,68,68);doc.text(`Defizit: ${pd.defizit}`,14,y);y+=4;}
    if(pd.staerke){doc.setFontSize(8);doc.setTextColor(34,197,94);doc.text(`Stärke: ${pd.staerke}`,14,y);y+=4;}
    y+=4;
    if(idx<PLAYERS.length-1){doc.setDrawColor(40,55,70);doc.setLineWidth(0.3);doc.line(14,y-1,196,y-1);}
  });
  // SI page
  doc.addPage();doc.setFillColor(13,21,32);doc.rect(0,0,210,297,'F');
  doc.setFontSize(14);doc.setFont(undefined,'bold');doc.setTextColor(201,168,76);

  doc.autoTable({startY:28,head:[['#','Spieler','Wahrnehmen','Lösungen','Entscheidung','Gegen Ball','Total']],body:siRows,theme:'plain',styles:{fontSize:9,cellPadding:2.5,textColor:[200,210,220],fillColor:[20,30,45]},headStyles:{fillColor:[30,42,58],textColor:[180,190,205],fontStyle:'bold'},columnStyles:{0:{cellWidth:12},1:{cellWidth:55},2:{halign:'center'},3:{halign:'center'},4:{halign:'center'},5:{halign:'center'},6:{halign:'center',fontStyle:'bold'}},margin:{left:14,right:14}});

    let lmsProgressState = null;
    let activeLmsModuleId = null;
    let lmsQuizTimerInterval = null;
    let currentShuffledQuiz = [];

    function ensureLmsFields() {
      if (!lmsProgressState) {
        try {
          lmsProgressState = JSON.parse(localStorage.getItem('fe12_lms_progress'));
        } catch(e) {}
        if (!lmsProgressState) {
          lmsProgressState = {
            moduleStates: {},
            quizLocks: {},
            history: []
          };
        }
      }
      if (!lmsProgressState.moduleStates) {
        lmsProgressState.moduleStates = {};
      }
      if (!lmsProgressState.quizLocks) {
        lmsProgressState.quizLocks = {};
      }
      if (!Array.isArray(lmsProgressState.history)) {
        lmsProgressState.history = [];
      }
      
      LMS_MODULES.forEach((mod, idx) => {
        if (!lmsProgressState.moduleStates[idx]) {
          lmsProgressState.moduleStates[idx] = {
            status: 'unlocked',
            score: null,
            completedAt: null,
            offlineVerified: false
          };
        } else if (lmsProgressState.moduleStates[idx].status === 'locked') {
          lmsProgressState.moduleStates[idx].status = 'unlocked';
        }
      });
      // Locks löschen, um sofortigen Zugriff zu erlauben
      lmsProgressState.quizLocks = {};
    }

    function saveLmsState() {
      try {
        localStorage.setItem('fe12_lms_progress', JSON.stringify(lmsProgressState));
      } catch(e) {
        console.error('Error saving LMS state', e);
      }
    }

    function initLms() {
      ensureLmsFields();
      renderLmsModuleList();
      updateLmsProgressUI();
      updateLmsLastActionsUI();
      
      if (activeLmsModuleId !== null) {
        selectLmsModule(activeLmsModuleId);
      } else {
        const placeholder = document.getElementById('lms-active-module-placeholder');
        const card = document.getElementById('lms-active-module-card');
        if (placeholder) placeholder.style.display = 'block';
        if (card) card.style.display = 'none';
      }
    }

    function renderLmsModuleList() {
      const container = document.getElementById('lms-module-list');
      if (!container) return;
      container.innerHTML = '';
      
      LMS_MODULES.forEach((mod, idx) => {
        const modState = lmsProgressState.moduleStates[idx] || { status: 'unlocked', score: null };
        const isActive = activeLmsModuleId === idx;
        
        const isLocked = modState.status === 'locked';
        const isCompleted = modState.status === 'completed';
        
        const item = document.createElement('div');
        item.className = `list-item ${isActive ? 'active' : ''}`;
        
        const leftWrap = document.createElement('div');
        leftWrap.style = "display:flex; align-items:center; gap:10px; flex:1; cursor:pointer;";
        leftWrap.onclick = () => {
          if (isLocked) {
            showSavedToast('Dieses Modul ist gesperrt!', false);
          } else {
            selectLmsModule(idx);
          }
        };
        
        let iconHtml = '';
        if (isCompleted) {
          iconHtml = '<i class="ti ti-circle-check-filled" style="color:#22c55e; font-size:16px;"></i>';
        } else if (isLocked) {
          iconHtml = '<i class="ti ti-lock" style="color:rgba(255,255,255,0.3); font-size:16px;"></i>';
        } else {
          iconHtml = '<i class="ti ti-book" style="color:#c9a84c; font-size:16px;"></i>';
        }
        
        const titleSpan = document.createElement('span');
        titleSpan.style = "font-size:12px; font-weight:700; color:#e2e8f0;";
        titleSpan.textContent = mod.title;
        
        leftWrap.innerHTML = iconHtml;
        leftWrap.appendChild(titleSpan);
        item.appendChild(leftWrap);
        
        const rightWrap = document.createElement('div');
        rightWrap.style = "display:flex; align-items:center; gap:8px;";
        
        if (isCompleted && modState.score !== null) {
          const scoreBadge = document.createElement('span');
          scoreBadge.className = 'badge badge-tw';
          scoreBadge.textContent = `${modState.score}/2`;
          rightWrap.appendChild(scoreBadge);
        }
        
        if (!window.IS_READONLY) {
          const overrideBtn = document.createElement('button');
          overrideBtn.style = "background:none; border:none; padding:4px; cursor:pointer; color:rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center; transition:color 0.2s;";
          overrideBtn.title = isLocked ? "Modul manuell freischalten" : "Modul manuell sperren";
          overrideBtn.innerHTML = isLocked ? '<i class="ti ti-lock-open" style="font-size:14px;"></i>' : '<i class="ti ti-lock" style="font-size:14px;"></i>';
          overrideBtn.onmouseenter = () => overrideBtn.style.color = '#c9a84c';
          overrideBtn.onmouseleave = () => overrideBtn.style.color = 'rgba(255,255,255,0.4)';
          overrideBtn.onclick = (e) => {
            e.stopPropagation();
            toggleLmsModuleOverride(idx);
          };
          rightWrap.appendChild(overrideBtn);
        }
        
        item.appendChild(rightWrap);
        container.appendChild(item);
      });
    }

    function toggleLmsModuleOverride(moduleId) {
      if (window.IS_READONLY) return;
      ensureLmsFields();
      
      const currentState = lmsProgressState.moduleStates[moduleId];
      const oldStatus = currentState ? currentState.status : 'unlocked';
      
      let newStatus = 'locked';
      if (oldStatus === 'locked') {
        newStatus = 'unlocked';
      } else if (oldStatus === 'unlocked' || oldStatus === 'completed') {
        newStatus = 'locked';
      }
      
      if (!lmsProgressState.moduleStates[moduleId]) {
        lmsProgressState.moduleStates[moduleId] = { status: newStatus, score: null, completedAt: null, offlineVerified: false };
      } else {
        lmsProgressState.moduleStates[moduleId].status = newStatus;
      }
      
      const actionText = `Admin: Modul ${moduleId} manuell ${newStatus === 'unlocked' ? 'freigeschaltet' : 'gesperrt'}`;
      addLmsHistoryEntry(actionText);
      
      renderLmsModuleList();
      if (activeLmsModuleId === moduleId) {
        selectLmsModule(moduleId);
      }
      saveLmsState();
      showSavedToast(`Modul ${moduleId} wurde manuell ${newStatus === 'unlocked' ? 'freigeschaltet' : 'gesperrt'}.`);
    }

    function selectLmsModule(moduleId) {
      activeLmsModuleId = moduleId;
      ensureLmsFields();
      
      const mod = LMS_MODULES[moduleId];
      if (!mod) return;
      
      const placeholder = document.getElementById('lms-active-module-placeholder');
      const card = document.getElementById('lms-active-module-card');
      if (placeholder) placeholder.style.display = 'none';
      if (card) card.style.display = 'block';
      
      const titleEl = document.getElementById('lms-mod-title');
      if (titleEl) titleEl.textContent = mod.title;
      
      let theoryHtml = mod.theory
        .split('\\n\\n')
        .map(p => {
          let cleanedBlock = p.trim();
          if (cleanedBlock.startsWith('*') || cleanedBlock.startsWith('•')) {
            const listItems = cleanedBlock
              .split(/\\n[*•-]?\s*/)
              .map(line => {
                let cleanedLine = line.trim()
                  .replace(/^[*•-]\s*/, '')
                  .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                return cleanedLine ? `<li>${cleanedLine}</li>` : '';
              })
              .filter(Boolean)
              .join('');
            return `<ul style="margin: 8px 0 14px 20px; padding: 0; list-style-type: disc;">${listItems}</ul>`;
          } else {
            let cleanedText = cleanedBlock
              .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
              .replace(/\\n/g, '<br>');
            return `<p style="margin-bottom: 12px; line-height: 1.7;">${cleanedText}</p>`;
          }
        })
        .join('');
      
      const theoryTextEl = document.getElementById('lms-mod-theory-text');
      if (theoryTextEl) theoryTextEl.innerHTML = theoryHtml;
      
      const practiceTextEl = document.getElementById('lms-mod-practice-text');
      if (practiceTextEl) practiceTextEl.textContent = mod.offlineTask;
      
      const modState = lmsProgressState.moduleStates[moduleId] || { offlineVerified: false, status: 'locked' };
      
      const checkbox = document.getElementById('lms-offline-checkbox');
      if (checkbox) {
        checkbox.checked = modState.offlineVerified || false;
        checkbox.disabled = window.IS_READONLY;
      }
      
      const badge = document.getElementById('lms-mod-status-badge');
      if (badge) {
        badge.className = 'badge';
        if (modState.status === 'completed') {
          badge.textContent = 'Bestanden';
          badge.classList.add('badge-tw');
        } else if (modState.status === 'unlocked') {
          badge.textContent = 'Offen';
          badge.classList.add('badge-foot-r');
        } else {
          badge.textContent = 'Gesperrt';
          badge.classList.add('badge-foot-l');
        }
      }
      
      renderLmsModuleList();
      switchLmsSubTab('theory');
    }

    function switchLmsSubTab(subTabId) {
      document.querySelectorAll('.lms-subtab-content').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.academy-sub-nav-btn').forEach(btn => {
        if (btn.id.startsWith('lms-tab-')) btn.classList.remove('active');
      });
      
      const targetContent = document.getElementById(`lms-subtab-${subTabId}`);
      if (targetContent) targetContent.style.display = 'block';
      
      const targetBtn = document.getElementById(`lms-tab-${subTabId}-btn`);
      if (targetBtn) targetBtn.classList.add('active');
      
      if (subTabId === 'quiz') {
        refreshLmsQuizView();
      }
    }

    function refreshLmsQuizView() {
      if (activeLmsModuleId === null) return;
      ensureLmsFields();
      
      const modState = lmsProgressState.moduleStates[activeLmsModuleId] || { status: 'locked', offlineVerified: false };
      const quizLockExpiry = lmsProgressState.quizLocks[activeLmsModuleId] || 0;
      const now = Date.now();
      
      const lockView = document.getElementById('lms-quiz-lock-view');
      const unlockRequiredView = document.getElementById('lms-quiz-unlock-required');
      const quizEngineView = document.getElementById('lms-quiz-engine-view');
      const passedView = document.getElementById('lms-quiz-passed-view');
      
      if (lockView) lockView.style.display = 'none';
      if (unlockRequiredView) unlockRequiredView.style.display = 'none';
      if (quizEngineView) quizEngineView.style.display = 'none';
      if (passedView) passedView.style.display = 'none';
      
      if (modState.status === 'completed') {
        if (passedView) {
          passedView.style.display = 'block';
          const info = document.getElementById('lms-quiz-passed-info');
          if (info) info.textContent = `Bestanden mit ${modState.score || 2} von 2 Fragen.`;
        }
        return;
      }
      
      if (now < quizLockExpiry) {
        if (lockView) {
          lockView.style.display = 'block';
          startQuizTimer(quizLockExpiry);
        }
        return;
      }
      
      if (!modState.offlineVerified) {
        if (unlockRequiredView) unlockRequiredView.style.display = 'block';
        return;
      }
      
      if (quizEngineView) {
        quizEngineView.style.display = 'block';
        buildQuizQuestions();
      }
    }

    function startQuizTimer(expiryTimestamp) {
      if (lmsQuizTimerInterval) clearInterval(lmsQuizTimerInterval);
      
      const updateTimer = () => {
        const remaining = expiryTimestamp - Date.now();
        if (remaining <= 0) {
          clearInterval(lmsQuizTimerInterval);
          refreshLmsQuizView();
          return;
        }
        
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        const timerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        const timerEl = document.getElementById('lms-quiz-timer');
        if (timerEl) timerEl.textContent = timerText;
      };
      
      updateTimer();
      lmsQuizTimerInterval = setInterval(updateTimer, 1000);
    }

    function shuffleArray(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

        function buildQuizQuestions() {
      const container = document.getElementById('lms-quiz-questions-container');
      if (!container) return;
      container.innerHTML = '';
      
      const mod = LMS_MODULES[activeLmsModuleId];
      if (!mod) return;
      
      const shuffledQuestions = shuffleArray(mod.quiz);
      currentShuffledQuiz = shuffledQuestions.map(q => {
        return {
          questionText: q.question,
          shuffledAnswers: shuffleArray(q.answers)
        };
      });
      
      currentShuffledQuiz.forEach((q, qIdx) => {
        const qDiv = document.createElement('div');
        qDiv.style = "background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); padding: 16px; border-radius: 10px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px;";
        
        const qTitle = document.createElement('h5');
        qTitle.style = "font-size: 13px; font-weight: 800; color: #c9a84c; margin: 0; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06); line-height:1.4;";
        qTitle.textContent = `Frage ${qIdx + 1}: ${q.questionText}`;
        qDiv.appendChild(qTitle);
        
        const answersContainer = document.createElement('div');
        answersContainer.style = "display: flex; flex-direction: column; gap: 8px;";
        
        q.shuffledAnswers.forEach((ans, aIdx) => {
          const label = document.createElement('label');
          label.style = "display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 8px; font-size: 12px; color: #e2e8f0; cursor: pointer; transition: all 0.2s; line-height: 1.4; user-select: none;";
          
          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = `lms-q-${qIdx}`;
          radio.value = aIdx;
          radio.required = true;
          radio.style = "margin: 0; accent-color: #c9a84c; width: 16px; height: 16px; flex-shrink: 0; cursor: pointer;";
          
          const textSpan = document.createElement('span');
          textSpan.textContent = ans.text;
          
          // Hover effect on label
          label.onmouseenter = () => {
            if (!radio.checked) {
              label.style.background = "rgba(255, 255, 255, 0.06)";
              label.style.borderColor = "rgba(255, 255, 255, 0.12)";
            }
          };
          label.onmouseleave = () => {
            if (!radio.checked) {
              label.style.background = "rgba(255, 255, 255, 0.03)";
              label.style.borderColor = "rgba(255, 255, 255, 0.06)";
            }
          };
          
          radio.onchange = () => {
            // Uncheck/reset other labels in the same question container
            answersContainer.querySelectorAll('label').forEach(lbl => {
              lbl.style.background = "rgba(255, 255, 255, 0.03)";
              lbl.style.borderColor = "rgba(255, 255, 255, 0.06)";
              lbl.style.color = "#e2e8f0";
            });
            // Highlight selected label
            label.style.background = "rgba(201, 168, 76, 0.08)";
            label.style.borderColor = "rgba(201, 168, 76, 0.3)";
            label.style.color = "#c9a84c";
          };
          
          label.appendChild(radio);
          label.appendChild(textSpan);
          answersContainer.appendChild(label);
        });
        
        qDiv.appendChild(answersContainer);
        container.appendChild(qDiv);
      });
    }

    function toggleOfflineVerification(checked) {
      if (activeLmsModuleId === null || window.IS_READONLY) return;
      ensureLmsFields();
      
      lmsProgressState.moduleStates[activeLmsModuleId].offlineVerified = checked;
      
      const actionText = `Modul ${activeLmsModuleId}: Offline-Praxisaufgabe ${checked ? 'bestätigt' : 'zurückgesetzt'}`;
      addLmsHistoryEntry(actionText);
      
      saveLmsState();
    }

    function submitLmsQuiz(event) {
      if (event) event.preventDefault();
      if (activeLmsModuleId === null || window.IS_READONLY) return;
      
      const form = document.getElementById('lms-quiz-form');
      let score = 0;
      let total = currentShuffledQuiz.length;
      let allCorrect = true;
      
      currentShuffledQuiz.forEach((q, qIdx) => {
        const radios = form.elements[`lms-q-${qIdx}`];
        let selectedValue = null;
        
        if (radios.value !== undefined) {
          selectedValue = parseInt(radios.value);
        } else {
          for (let i = 0; i < radios.length; i++) {
            if (radios[i].checked) {
              selectedValue = parseInt(radios[i].value);
              break;
            }
          }
        }
        
        if (selectedValue !== null) {
          const chosenAnswer = q.shuffledAnswers[selectedValue];
          if (chosenAnswer && chosenAnswer.correct) {
            score++;
          } else {
            allCorrect = false;
          }
        } else {
          allCorrect = false;
        }
      });
      
      if (allCorrect) {
        lmsProgressState.moduleStates[activeLmsModuleId].status = 'completed';
        lmsProgressState.moduleStates[activeLmsModuleId].score = score;
        lmsProgressState.moduleStates[activeLmsModuleId].completedAt = Date.now();
        
        const actionText = `Modul ${activeLmsModuleId} bestanden (${score}/${total})`;
        addLmsHistoryEntry(actionText);
        
        const nextId = activeLmsModuleId + 1;
        if (nextId < LMS_MODULES.length) {
          if (!lmsProgressState.moduleStates[nextId]) {
            lmsProgressState.moduleStates[nextId] = { status: 'unlocked', score: null, completedAt: null, offlineVerified: false };
          } else if (lmsProgressState.moduleStates[nextId].status === 'locked') {
            lmsProgressState.moduleStates[nextId].status = 'unlocked';
          }
          addLmsHistoryEntry(`Modul ${nextId} freigeschaltet`);
        }
        
        showSavedToast('🎉 Prüfung bestanden! 100%', true);
        saveLmsState();
        renderLmsModuleList();
        updateLmsProgressUI();
        refreshLmsQuizView();
        
        const select = document.getElementById('lms-offline-checkbox');
        if (select) select.checked = false;
      } else {
        const actionText = `Modul ${activeLmsModuleId} nicht bestanden (${score}/${total})`;
        addLmsHistoryEntry(actionText);
        
        showSavedToast('❌ Prüfung nicht bestanden! (100% erforderlich). Versuche es direkt noch einmal.', false);
        saveLmsState();
        renderLmsModuleList();
        buildQuizQuestions(); // Mische die Fragen neu für einen sofortigen neuen Versuch
        refreshLmsQuizView();
      }
    }

    function selectNextLmsModule() {
      if (activeLmsModuleId === null) return;
      const nextId = activeLmsModuleId + 1;
      if (nextId < LMS_MODULES.length) {
        const modState = lmsProgressState.moduleStates[nextId];
        if (modState && modState.status !== 'locked') {
          selectLmsModule(nextId);
        } else {
          showSavedToast('Nächstes Modul ist noch gesperrt.', false);
        }
      } else {
        showSavedToast('Glückwunsch! Du hast die gesamte Masterclass absolviert.', true);
      }
    }

    function updateLmsProgressUI() {
      let passedCount = 0;
      LMS_MODULES.forEach((mod, idx) => {
        const modState = lmsProgressState.moduleStates[idx];
        if (modState && modState.status === 'completed') {
          passedCount++;
        }
      });
      
      const percent = Math.round((passedCount / LMS_MODULES.length) * 100);
      
      const txt = document.getElementById('lms-global-progress-txt');
      if (txt) {
        txt.textContent = `${percent}% (${passedCount} von ${LMS_MODULES.length} Modulen bestanden)`;
      }
      
      const bar = document.getElementById('lms-global-progress-bar');
      if (bar) {
        bar.style.width = `${percent}%`;
      }
    }

    function addLmsHistoryEntry(actionText) {
      if (!lmsProgressState.history) {
        lmsProgressState.history = [];
      }
      lmsProgressState.history.push({
        action: actionText,
        timestamp: Date.now()
      });
      updateLmsLastActionsUI();
    }

    function updateLmsLastActionsUI() {
      const list = document.getElementById('lms-last-actions-list');
      if (!list) return;
      list.innerHTML = '';
      
      const history = lmsProgressState.history || [];
      if (history.length === 0) {
        list.innerHTML = '<div style="color:rgba(255,255,255,0.4); font-style:italic;">Noch keine Aktivitäten.</div>';
        return;
      }
      
      const last2 = history.slice(-2).reverse();
      last2.forEach(h => {
        const date = new Date(h.timestamp);
        const dateStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' ' + date.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
        const div = document.createElement('div');
        div.style = "display:flex; justify-content:space-between; margin-bottom:2px; gap:8px;";
        div.innerHTML = `<span>• ${h.action}</span><span style="color:rgba(255,255,255,0.4); font-size:9px; flex-shrink:0;">${dateStr}</span>`;
        list.appendChild(div);
      });
    }

    function exportLmsProgressPDF() {

      }
      const {jsPDF} = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      
      // Page styling
      doc.setFillColor(13,21,32);
      doc.rect(0,0,210,297,'F');
      
      doc.setTextColor(201,168,76); // Gold
      doc.setFontSize(18);
      doc.setFont(undefined, 'bold');
      doc.text('Masterclass: Positionsspiel-Prinzipien', 14, 20);
      
      doc.setFontSize(10);
      doc.setFont(undefined, 'normal');
      doc.setTextColor(160,170,185); // Muted gray
      doc.text(`Lernfortschritts-Report · ${new Date().toLocaleDateString('de-CH')}`, 14, 27);
      
      doc.setDrawColor(201,168,76);
      doc.setLineWidth(0.5);
      doc.line(14,30,196,30);
      
      let passedCount = 0;
      LMS_MODULES.forEach((mod, idx) => {
        const modState = lmsProgressState.moduleStates[idx];
        if (modState && modState.status === 'completed') {
          passedCount++;
        }
      });
      const percent = Math.round((passedCount / LMS_MODULES.length) * 100);
      
      doc.setFont(undefined, 'bold');
      doc.setFontSize(11);
      doc.setTextColor(201,168,76);
      doc.text('GESAMTFORTSCHRITT:', 14, 38);
      doc.setFont(undefined, 'normal');
      doc.setTextColor(226,232,240);
      doc.text(`${percent}% (${passedCount} von ${LMS_MODULES.length} Modulen bestanden)`, 65, 38);
      
      doc.setFont(undefined, 'bold');
      doc.setTextColor(201,168,76);
      doc.text('KÜRZLICHER LERNVERLAUF (LETZTE 2 AKTIVITÄTEN):', 14, 46);
      doc.setFont(undefined, 'normal');
      doc.setTextColor(226,232,240);
      
      const history = lmsProgressState.history || [];
      let yOffset = 52;
      if (history.length === 0) {
        doc.text('Keine Aktivitäten verzeichnet.', 14, yOffset);
        yOffset += 8;
      } else {
        const last2 = history.slice(-2).reverse();
        last2.forEach((h) => {
          const dateStr = new Date(h.timestamp).toLocaleString('de-CH');
          doc.text(`• ${h.action} (${dateStr})`, 14, yOffset);
          yOffset += 6;
        });
        yOffset += 2;
      }
      
      const tableData = LMS_MODULES.map((mod, idx) => {
        const modState = lmsProgressState.moduleStates[idx] || { status: 'unlocked', score: null, completedAt: null };
        let statusText = 'Gesperrt';
        if (modState.status === 'completed') statusText = 'Bestanden';
        else if (modState.status === 'unlocked') statusText = 'Bereit / Offen';
        
        const scoreText = modState.score !== null ? `${modState.score}/2 (100%)` : '—';
        const dateText = modState.completedAt ? new Date(modState.completedAt).toLocaleDateString('de-CH') : '—';
        
        return [
          String(idx),
          mod.title.replace("Modul ", ""),
          statusText,
          scoreText,
          dateText
        ];
      });
      
      doc.autoTable({
        startY: yOffset,
        head: [['ID', 'Modul / Prinzip', 'Status', 'Testergebnis', 'Abgeschlossen am']],
        body: tableData,
        theme: 'plain',
        styles: { fontSize: 8, cellPadding: 2, textColor: [200, 210, 220], fillColor: [20, 30, 45] },
        headStyles: { fillColor: [30, 42, 58], textColor: [180, 190, 205], fontStyle: 'bold' },
        columnStyles: { 
          0: { halign: 'center', cellWidth: 10 }, 
          2: { halign: 'center', cellWidth: 30 },
          3: { halign: 'center', cellWidth: 30 },
          4: { halign: 'center', cellWidth: 30 }
        },
        margin: { left: 14, right: 14 }
      });
      
      doc.save(`FE12_LMS_Fortschritt_${new Date().toISOString().slice(0,10)}.pdf`);
      showSavedToast('✓ Masterclass-PDF erfolgreich generiert!');
    }

            <div class="phase-block" data-phase="haben">

                <span class="phase-dot" style="background:#10b981;"></span>

              <div class="phase-prinzipien">
                <div class="ziele-lbl">Prinzipien</div>
                <ul>
                  <li>Alle 11 Spieler/innen beteiligen sich am Offensivspiel – zusammen angreifen, Überzahlsituationen schaffen, Gegner ins Ungleichgewicht bringen</li>
                  <li>Optimale Feldbesetzung: Breite und Tiefe nutzen und Lösungen anbieten, getimtes Freilaufen (Dreiecks- und Rhombusbildung)</li>
                  <li>Den Spielrhythmus unter Berücksichtigung von Raum und Zeit bestimmen: den direkten Weg zum gegnerischen Tor suchen (Spiel beschleunigen) bzw. konstruktiver, dynamischer Spielaufbau mit Geduld</li>
                  <li>Duell suchen und gewinnen (Zone 2 und 3)</li>
                  <li>Ideale Position einnehmen, um bei einem möglichen Ballverlust den Gegenangriff zu verhindern</li>
                </ul>
              </div>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#047857;">1</span><span class="zone-title-txt">Spiel aufbauen</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>Breite nutzen &amp; präzise Pässe mit Variation kurz, lang oder diagonal</li>
                  <li>Initiative der Innenverteidiger und Einbezug der zentralen Mittelfeldspieler</li>
                  <li>Freilaufbewegungen, Orientierung, Signale erkennen</li>
                  <li>Einen «Zielspieler/in» einbeziehen</li>
                  <li>Den freien Raum erkennen und nutzen; Pass oder Dribbling in Zone 2</li>
                  <li class="fallback">Wenn nicht möglich, dann:</li>
                  <li class="sub">Vorbereitete lange Bälle vertikal, mit dem Ziel Ballgewinn (2. Ball)</li>
                </ul></div>
              </details>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#10b981;">2</span><span class="zone-title-txt">Spiel bestimmen</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>Spiel zwischen den Linien (Vertikalpass) mit Dreiecks- und Rhombusbildung (Einbezug der Stürmer)</li>
                  <li>Gegner fixieren im 1:1, Spielverlagerung (Diagonal) oder Dribbling in den freien Raum</li>
                  <li>Dosierte, präzise Pässe und Timing der Freilaufbewegungen (zentrale Mittelfeldspieler und Aussenspieler)</li>
                  <li>Vertikales Spiel, «Zielspieler/in» finden</li>
                  <li>Räume schaffen und besetzen, Signale erkennen</li>
                </ul></div>
              </details>
              <details class="zone-acc">

                <div class="zone-body"><ul>
                  <li>Den freien Raum nutzen, um in Richtung gegnerisches Tor zu gelangen und abzuschliessen</li>
                  <li>Kombinationsspiel mit hoher Intensität: Doppelpass, Hinterlaufen, Kreuzen, Virgola, Spiel über Dritte (Lösungen im Rücken der gegnerischen Abwehr finden)</li>
                  <li>Besetzung der Box: Entschlossenheit und Qualität im Abschluss, um das Tor zu erzielen</li>
                  <li>Sprints, Signale erkennen</li>

                <ul>
                  <li>Initiative behalten, weiterhin agieren</li>
                  <li>Spielsituation rasch erkennen und blitzschnell entscheiden</li>

                <div class="ziele-lbl">Prinzipien</div>
                <ul>
                  <li>Den schnellen Gegenangriff verhindern (1. oder 2. Pass des Gegners nach vorne blockieren) und den direkten Weg zum eigenen Tor schliessen</li>
                  <li>Sofort individuelle Position einnehmen, um rasch das kollektive Gleichgewicht zu erlangen – den ballführenden Spieler des Gegners sofort unter Druck setzen (Prinzip der 3 Kreise)</li>
                  <li>Wenn nicht möglich: Rasche Blockbildung, um den Ball gemeinsam zu erobern</li>
                  <li>Duell suchen und gewinnen</li>
                </ul>
              </div>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#c2410c;">1<small>BOX</small></span><span class="zone-title-txt">Tor verteidigen</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>Direkten Weg zum Tor schützen</li>
                  <li>So schnell wie möglich Überzahl in Ballnähe schaffen (Pyramide bilden und Diagonale absichern)</li>
                  <li>Ballführenden Spieler unter Druck setzen</li>
                  <li>Duell suchen, Schuss und Flanke blockieren</li>
                  <li>Duell 1:1 in der Box gewinnen</li>
                </ul></div>
              </details>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#f97316;">2</span><span class="zone-title-txt">Gegenangriff bremsen</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>Ballführenden Spieler sofort unter Druck setzen, Nähe zum Gegenspieler/in suchen und vertikalen Pass verhindern (Tiefe absichern)</li>
                  <li>So schnell wie möglich Überzahl in Ballnähe schaffen (Pyramide bilden)</li>

              <details class="zone-acc">

                <div class="zone-body"><ul>

                  <li class="fallback">Wenn nicht möglich, dann:</li>
                  <li class="sub">Fallen lassen, sich organisieren, mit dem Ziel, den Ball zu erobern</li>
                </ul></div>

              <div class="ziele-box">
                <div class="ziele-lbl">Ziele</div>
                <ul>
                  <li>Initiativ sein, agieren</li>
                  <li>Ball zurückerobern und Tor verhindern</li>
                  <li>Spiel des Gegners stören und ihn zu Fehlern zwingen (Raum und Zeit)</li>
                </ul>
              </div>
              <div class="phase-prinzipien">
                <div class="ziele-lbl">Prinzipien</div>
                <ul>
                  <li>Kompaktes Verteidigen: Alle 11 Spieler/innen beteiligen sich am Defensivspiel (optimale Positionierung)</li>
                  <li>Prinzip der 3 Kreise – Kreis 1: Ball jagen · Kreis 2: Nähe zum Gegenspieler/in und vertikale Pässe verhindern · Kreis 3: Tiefe antizipieren und absichern</li>
                  <li>Den direkten Weg zum Tor kontrollieren</li>
                  <li>Das Duell suchen und gewinnen</li>
                  <li>Die Passlinien schliessen und Fehler des Gegners provozieren</li>
                  <li>Mögliche Anspielstationen («Zielspieler/in») für das Umschalten DEF – OFF behalten</li>
                </ul>
              </div>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#b91c1c;">1<small>BOX</small></span><span class="zone-title-txt">Tief verteidigen</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>Ballführenden Spieler permanent unter Druck setzen, Überzahl in Ballnähe schaffen</li>
                  <li>Steuern: Von der Gefahr weg (nach aussen)</li>
                  <li>Tiefe absichern (Pyramide oder Diagonale)</li>
                  <li>Flanken und Torschüsse blocken</li>
                  <li>In der Box: Situativ zwischen Mann- oder Raumdeckung entscheiden (Duell 1:1 in der Box gewinnen)</li>
                </ul></div>
              </details>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#ef4444;">2</span><span class="zone-title-txt">Gegner kontrollieren</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>Ballführenden Spieler permanent unter Druck setzen (Mittelfeldpressing)</li>
                  <li>Prinzip der 3 Kreise</li>
                  <li>Wenn der Druck auf den ballführenden Spieler nicht (mehr) möglich ist, fallen lassen und Gegner möglichst schnell wieder unter Druck setzen</li>
                  <li>Steuern: a) Zur Überzahl (zur Mitte) · b) Von der Gefahr weg (nach aussen)</li>
                </ul></div>
              </details>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#f87171;">3</span><span class="zone-title-txt">Hoch verteidigen</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>Angriffspressing</li>
                  <li>Nach vorne verteidigen: Bei Quer-/Rückpass des Gegners</li>
                  <li>Prinzip der 3 Kreise</li>
                  <li>Ballführenden Spieler permanent unter Druck setzen, falls nicht möglich: Fallen lassen (hoch – Mitte – tief)</li>
                  <li>Den Angriff des Gegners in eine «günstige Position» steuern (nach aussen / zur Mitte)</li>
                </ul></div>
              </details>
            </div>

            <!-- PHASE 4: WIR EROBERN DEN BALL -->
            <div class="phase-block" data-phase="erobern">
              <div class="phase-head">
                <span class="phase-dot" style="background:#f59e0b;"></span>
                <div><h3>Wir erobern den Ball</h3><span class="phase-sub">Umschalten DEF – OFF</span></div>
              </div>
              <div class="ziele-box">
                <div class="ziele-lbl">Ziele</div>
                <ul>
                  <li>Initiative behalten, weiterhin agieren</li>
                  <li>Spielsituation rasch erkennen und blitzschnell entscheiden</li>
                  <li>Verfügbaren Raum und Zeit nutzen, um Tore zu erzielen</li>
                </ul>
              </div>
              <div class="phase-prinzipien">
                <div class="ziele-lbl">Prinzipien</div>
                <ul>
                  <li>Ballgewinnzone verlassen mit der Priorität vorwärts</li>
                  <li>Sofort situative Lösungen anbieten</li>
                  <li>Vom Ungleichgewicht des Gegners in seiner Organisation profitieren – direkten Weg zum Tor suchen (freie Räume attackieren mit und ohne Ball)</li>
                  <li>Wenn nicht möglich: Ballsicherung, um einen neuen Angriff vorzubereiten</li>
                </ul>
              </div>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#b45309;">1</span><span class="zone-title-txt">Nach vorne spielen</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>Tiefe nutzen: Direkt oder nach dem zweiten oder dritten Pass (Freilaufbewegungen)</li>
                  <li>Die Zone 2 oder 3 mit «Zielspieler/inn» suchen</li>
                  <li>Gezielter langer Ball in den Raum (in den Rücken der gegnerischen Defensive)</li>
                  <li class="fallback">Wenn nicht möglich, dann:</li>
                  <li class="sub">Ballsicherung (Spielrhythmus kontrollieren) mit dem Ziel Neuaufbau</li>

              </details>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#f59e0b;">2</span><span class="zone-title-txt">In die Zone 3 spielen</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>«Zielspieler/in» in der Zone 3 finden</li>
                  <li>Schnittstellenpass aus der Zone 2 in die Zone 3 oder gezielter langer Ball in den Rücken der gegnerischen Defensive</li>
                  <li>Individuelle Aktion: Einzeldurchbruch mit oder ohne Ball durch die gegnerische Abwehr</li>
                  <li class="fallback">Wenn nicht möglich, dann:</li>
                  <li class="sub">Ballsicherung (Spielrhythmus kontrollieren) mit dem Ziel Neuaufbau</li>
                </ul></div>
              </details>
              <details class="zone-acc">
                <summary><span class="zone-num" style="background:#fbbf24;">3<small>BOX</small></span><span class="zone-title-txt">Tor erzielen</span><svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></summary>
                <div class="zone-body"><ul>
                  <li>Gegner fixieren, 1:1 suchen und gewinnen</li>
                  <li>Dosierter, präziser 1. Pass</li>
                  <li>Pässe und Laufwege aufeinander abstimmen</li>
                  <li>Raschmöglichst, mit Entschlossenheit und Qualität abschliessen und das Tor erzielen</li>
                  <li class="fallback">Wenn nicht möglich, dann:</li>
                  <li class="sub">Ballsicherung mit dem Ziel, eine neue Spielsituation zu schaffen</li>
                </ul></div>
              </details>
            </div>
          </div>
          <p style="text-align:center; font-size:9px; color:rgba(255,255,255,0.35); margin-top:8px;">© 2017 SFV · Spielphilosophie</p>

    function filterLehre(key) {
      document.querySelectorAll('.phase-block').forEach(block => {
        if (block.dataset.phase) {
          const match = (key === 'all' || block.dataset.phase === key);
          block.classList.toggle('hidden', !match);
        }
      });
      document.querySelectorAll('#lehre-phase-filter .phase-chip').forEach(chip => {
        chip.classList.toggle('active', chip.dataset.phase === key);
      });
      document.querySelectorAll('.kompass-quad').forEach(q => {
        q.classList.toggle('dimmed', key !== 'all' && q.dataset.phase !== key);
      });
      if (key !== 'all') {
        const target = document.querySelector('.phase-block:not(.hidden)');
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    window.renderLehre = renderLehre;
    window.filterLehre = filterLehre;
    window.renderLms = renderLms;

// Init
initState();
if(typeof applyTeamLogo === 'function') applyTeamLogo();

// ── SPIELFORM & FORMATIONEN ────────────────────────
const SPIELFORM_LABELS = {'7er':'7er · E-Junioren','9er':'9er · D-Junioren','11er':'11er · C–A / Aktive'};
const FORMATIONS = {
  '7er':['1-2-3-1','1-2-1-1-2'],
  '9er':['1-3-4-1','1-3-2-3','1-2-1-4-1','1-2-4-2'],
  '11er':['1-4-4-2','1-4-2-3-1','1-4-3-3','1-3-5-2','1-3-4-3'],
};
function defaultFormation(sf){ return (FORMATIONS[sf]||FORMATIONS['7er'])[0]; }
function getFormOptions(sf){ return FORMATIONS[sf]||FORMATIONS['7er']; }
// Formation "1-4-4-2" → Outfield-Linien [4,4,2] (führende 1 = TW)
function parseFormation(form){
  const parts=String(form||'').split('-').map(n=>parseInt(n)).filter(n=>n>0);
  return parts.length>1?parts.slice(1):[];
}
// Liefert Positionen {id,label,x,y} in % auf einem vertikalen Feld (eigenes Tor unten)
function getPositions(form){
  const lines=parseFormation(form);
  const pos=[{id:'p0',label:'TW',pos:'TW',x:50,y:90}];
  const nB=lines.length;
  const nMid=Math.max(0,nB-2);
  lines.forEach((count,bi)=>{
    const y = nB<=1 ? 45 : Math.round(74 - bi*(60/(nB-1)));
    let label='MF';
    if(bi===0) label='ABW'; else if(bi===nB-1) label='ANG';
    for(let i=0;i<count;i++){
      const x = count===1 ? 50 : Math.round((100/(count+1))*(i+1));
      const isLeft=i===0, isRight=i===count-1;
      let spec;
      if(bi===0){ spec=((isLeft||isRight)&&count>=4)?'AV':'IV'; }
      else if(bi===nB-1){ spec = count===1?'ST':(count>=3?(isLeft?'LF':(isRight?'RF':'ST')):'ST'); }
      else {
        const midIdx=bi-1;
        let center = nMid<=1?'ZM':(midIdx===0?'DM':(midIdx===nMid-1?'OM':'ZM'));
        spec = (count>=3 && isLeft)?'LM':((count>=3 && isRight)?'RM':center);
      }
      pos.push({id:'p'+pos.length,label,pos:spec,x,y});
    }
  });
  return pos;
}

function uuid(){ return 'm-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8); }

function matchResult(m){
  if(m.status!=='played') return null;
  const gf=parseInt(m.goals_for)||0, ga=parseInt(m.goals_against)||0;
  if(gf>ga) return 'W'; if(gf<ga) return 'L'; return 'D';
}
const RESULT_INFO = {
  W:{label:'Sieg',color:'#22c55e',bg:'rgba(34,197,94,0.15)'},
  D:{label:'Unent.',color:'#f59e0b',bg:'rgba(245,158,11,0.15)'},
  L:{label:'Nied.',color:'#ef4444',bg:'rgba(239,68,68,0.15)'},
};
function matchDateLabel(d){
  if(!d) return 'Kein Datum';
  const parts=String(d).slice(0,10).split('-');
  if(parts.length<3) return d;
  return parts[2]+'.'+parts[1]+'.'+parts[0];
}
function isUpcoming(m){
  if(m.status==='played') return false;
  if(!m.match_date) return true;
  const today=new Date().toISOString().slice(0,10);
  return m.match_date.slice(0,10) >= today;
}

// ── LADEN ──────────────────────────────────────────
async function loadMatches(){
  try{
    const {data,error}=await sb.from('matches').select('*');
    if(error){
      if((error.code==='42P01')||/relation .*matches.* does not exist/i.test(error.message||'')){
        _matchesTableMissing=true;
      }
      state.matches=[]; return;
    }
    _matchesTableMissing=false;
    const rows=data||[];
    if(rows.length){ _matchExtraCols = ('spielform' in rows[0]); }
    const asObj=v=>(v&&typeof v==='object')?v:(v?JSON.parse(v):{});
    state.matches=rows.map(m=>({
      id:m.id, match_date:m.match_date||'', match_time:m.match_time||'', opponent:m.opponent||'',
      venue:m.venue||'home', competition:m.competition||'Meisterschaft',
      goals_for:m.goals_for??0, goals_against:m.goals_against??0,
      status:m.status||'planned',
      lineup:Array.isArray(m.lineup)?m.lineup:(m.lineup?JSON.parse(m.lineup):[]),
      scorers:asObj(m.scorers), assists:asObj(m.assists),
      note:m.note||'',
      spielform:m.spielform||'7er',
      formation:m.formation||defaultFormation(m.spielform||'7er'),
      formationB:m.formation_b||defaultFormation(m.spielform||'7er'),
      lineupA:asObj(m.lineup_a), lineupB:asObj(m.lineup_b),
      halves:(Array.isArray(m.halves)?m.halves:(m.halves?JSON.parse(m.halves):null))||null
    }));
    sortMatches();
  }catch(e){ console.error('loadMatches',e); state.matches=[]; }
}
function sortMatches(){
  state.matches.sort((a,b)=>{
    const da=a.match_date||'9999', db=b.match_date||'9999';
    return db.localeCompare(da);
  });
}
function getMatch(id){ return state.matches.find(m=>m.id===id); }

// ── SPEICHERN ──────────────────────────────────────
function matchPayload(m, withExtra){
  const base={
    id:m.id, match_date:m.match_date||null, opponent:m.opponent||'',
    venue:m.venue, competition:m.competition,
    goals_for:parseInt(m.goals_for)||0, goals_against:parseInt(m.goals_against)||0,
    status:m.status, lineup:m.lineup, scorers:m.scorers, assists:m.assists,
    note:m.note||''
  };
  if(withExtra){
    const sf=m.spielform||'7er';
    ensureHalves(m);
    const h0=m.halves[0];
    base.spielform=sf;
    base.match_time=m.match_time||'';
    base.formation=h0.a.formation||defaultFormation(sf);
    base.formation_b=h0.b.formation||defaultFormation(sf);
    base.lineup_a=h0.a.lineup||{};
    base.lineup_b=h0.b.lineup||{};
    base.halves=m.halves||[];
  }
  return base;
}
function _isMissingColErr(error){
  if(!error) return false;
  if(error.code==='PGRST204') return true;
  const msg=error.message||'';
  return /column .* does not exist/i.test(msg) || /could not find the .* column/i.test(msg);
}
// Robust: speichert das Spiel und lässt fehlende Spalten automatisch weg (statt komplett abzubrechen)
async function _matchUpsert(payload){
  let pl={...payload}, tries=0, dropped=[];
  while(tries++ < 14){
    const {error}=await sb.from('matches').upsert(pl,{onConflict:'id'});
    if(!error) return {error:null, dropped};
    const mm=(error.message||'').match(/Could not find the '([^']+)' column/i);
    if(error.code==='PGRST204' && mm && Object.prototype.hasOwnProperty.call(pl,mm[1])){
      dropped.push(mm[1]); delete pl[mm[1]]; continue;
    }
    return {error, dropped};
  }
  return {error:{message:'zu viele fehlende Spalten in der matches-Tabelle'}, dropped};
}
function persistMatch(id, logText){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  clearTimeout(_matchSaveTimers[id]);
  _matchSaveTimers[id]=setTimeout(async()=>{
    try{
      let {error,dropped}=await _matchUpsert(matchPayload(m,_matchExtraCols));
      if(dropped&&dropped.length){ if(dropped.some(c=>['spielform','match_time','formation','formation_b','lineup_a','lineup_b','halves'].includes(c))) _matchExtraCols=false; showSavedToast('Gespeichert – nicht vorhandene Spalten ('+dropped.join(', ')+') wurden ausgelassen',false); }
      if(error){ console.error('persistMatch',error); showSavedToast('Spiel speichern fehlgeschlagen: '+(error.message||error.code||'unbekannt'),false); return; }
      if(typeof logActivity==='function'){
        const opp=m.opponent||'Gegner offen';
        logActivity(null,'match', logText||('Spiel gespeichert · '+opp), null, null,'matches','', opp);
      }
    }catch(e){ console.error('persistMatch',e); }
  },600);
}

// ── CRUD ───────────────────────────────────────────
async function addMatch(){
  if(roGuard()) return;
  if(_matchesTableMissing){ renderSpiele(); return; }
  const sf='7er', def=defaultFormation(sf);
  const mkHalf=()=>({a:{formation:def,lineup:{}},b:{formation:def,lineup:{}}});
  const m={id:uuid(),match_date:new Date().toISOString().slice(0,10),match_time:'',opponent:'',venue:'home',competition:'Meisterschaft',goals_for:0,goals_against:0,status:'planned',lineup:[],scorers:{},assists:{},note:'',spielform:sf,formation:def,formationB:def,lineupA:{},lineupB:{},halves:[mkHalf(),mkHalf(),mkHalf()]};
  state.matches.unshift(m);
  try{
    let {error,dropped}=await _matchUpsert(matchPayload(m,_matchExtraCols));
    if(dropped&&dropped.length && dropped.some(c=>['spielform','match_time','formation','formation_b','lineup_a','lineup_b','halves'].includes(c))) _matchExtraCols=false;
    if(error){
      console.error('addMatch',error);
      showSavedToast('Spiel anlegen fehlgeschlagen: '+(error.message||error.code||'unbekannt'),false);
      state.matches=state.matches.filter(x=>x.id!==m.id);  // Phantom-Spiel wieder entfernen
      renderSpiele();
      return;
    }
    if(typeof logActivity==='function') logActivity(null,'match','Neues Spiel angelegt',null,null,'matches','','neu');
  }catch(e){ console.error('addMatch',e); showSavedToast('Spiel anlegen fehlgeschlagen: '+(e.message||'Netzwerkfehler'),false); state.matches=state.matches.filter(x=>x.id!==m.id); renderSpiele(); return; }
  state.matchEditId=m.id;
  renderSpiele();
}
async function deleteMatch(id){
  if(roGuard()) return;
  const m=getMatch(id);
  if(!confirm('Spiel'+(m&&m.opponent?' gegen '+m.opponent:'')+' wirklich löschen?')) return;
  state.matches=state.matches.filter(x=>x.id!==id);
  if(state.matchEditId===id) state.matchEditId=null;
  try{
    await sb.from('matches').delete().eq('id',id);
    if(typeof logActivity==='function') logActivity(null,'match','Spiel gelöscht'+(m&&m.opponent?' · '+m.opponent:''),null,null,'matches',m?m.opponent:'',null);
  }catch(e){ console.error('deleteMatch',e); }
  renderSpiele();
}
function editMatch(id){ state.matchEditId=id; renderCurrentView(); }
function closeMatchEditor(){ state.matchEditId=null; sortMatches(); renderCurrentView(); }

    <div style="text-align:center;min-width:50px"><div style="font-size:12px;font-weight:700;color:#e2e8f0">${d}</div><div style="font-size:9px;color:rgba(255,255,255,0.35)">${time||''}</div></div>
    <span style="font-size:8.5px;font-weight:800;letter-spacing:.04em;color:${chipColor};background:${chipColor}22;padding:3px 7px;border-radius:5px;white-space:nowrap;min-width:58px;text-align:center">${chip}</span>
    <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${title}</div><div style="font-size:10px;color:rgba(255,255,255,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sub||''}</div></div>

function termineMatchRow(m){
  const r=matchResult(m);
  const score=m.status==='played'?`${m.goals_for||0}:${m.goals_against||0}`:'–';
  const sc=r?RESULT_INFO[r].color:'rgba(255,255,255,0.4)';

  return _termineRow({onclick:`editMatch('${m.id}')`,date:m.match_date,time:m.match_time,chip:'SPIEL',chipColor:'#c9a84c',title:esc(m.opponent||'Gegner offen'),sub:esc(m.competition||'')+' · '+(VENUES[m.venue]||''),right});

function termineTrainRow(t){
  const ty=(typeof TR_TYP!=='undefined'&&TR_TYP[t.typ])||{label:'Training',color:'#3b82f6'};
  const ac=(typeof trainAttCount==='function')?trainAttCount(t):{p:0,tot:0};
  const right=ac.tot?`<div style="font-size:13px;font-weight:800;color:#22c55e;line-height:1">${ac.p}/${ac.tot}</div><div style="font-size:8.5px;color:rgba(255,255,255,0.35);margin-top:2px">anwesend</div>`:`<span style="font-size:9px;color:rgba(255,255,255,0.3)">offen</span>`;

  return _termineRow({onclick:`openTrainingFromTermine('${t.id}')`,date:t.date,time:t.time_from,chip:(ty.label||'Training').toUpperCase(),chipColor:ty.color||'#3b82f6',title:esc(t.titel||ty.label),sub:(t.ort?esc(t.ort):'—')+(time?' · '+time:''),right});
}
async function renderTermine(){
  const mc=document.getElementById('mainContent'); if(!mc) return;
  if(state.matches.length===0 && !_matchesTableMissing){ await loadMatches(); }
  if(!_trainingsLoaded && !_trainingsTableMissing){ await loadTrainings(); }
  if(!_attendanceLoaded && !_attendanceTableMissing){ await loadAttendance(); }
  if(state.matchEditId && !_matchesTableMissing){ mc.innerHTML=matchEditorHTML(state.matchEditId); return; }

  const todayStr=new Date().toISOString().slice(0,10); // YYYY-MM-DD
  const _isGameTrain=t=>t.typ&&t.typ!=='training';
  const gameItems=[];
  (state.matches||[]).forEach(m=>gameItems.push({date:m.match_date||'',time:m.match_time||'',html:termineMatchRow(m)}));
  (state.trainings||[]).filter(_isGameTrain).forEach(t=>gameItems.push({date:t.date||'',time:t.time_from||'',html:termineTrainRow(t)}));
  const trainItems=(state.trainings||[]).filter(t=>!_isGameTrain(t)).map(t=>({date:t.date||'',time:t.time_from||'',html:termineTrainRow(t)}));
  const nMatch=gameItems.length, nTrain=trainItems.length;

  const monthLabel=mk=>{ if(mk==='0000-00') return 'Ohne Datum'; const a=mk.split('-'); return new Date(+a[0],+a[1]-1,1).toLocaleDateString('de-CH',{month:'long',year:'numeric'}); };
  
  const renderGroupedList = (items, isPast, accent) => {
    if (!items.length) return '';
    const by = {};
    items.forEach(it => {
      const d = it.date || '';
      const mk = d ? d.slice(0, 7) : '0000-00';
      (by[mk] = by[mk] || []).push(it);
    });
    const keys = Object.keys(by);
    if (isPast) {
      keys.sort().reverse();
    } else {
      keys.sort((a, b) => {
        if (a === '0000-00') return 1;
        if (b === '0000-00') return -1;
        return a.localeCompare(b);
      });
    }
    return keys.map(mk => {
      const sortedRows = by[mk].sort((a, b) => {
        const da = a.date || '';
        const db = b.date || '';
        if (da !== db) {
          return isPast ? db.localeCompare(da) : da.localeCompare(db);
        }
        const ta = a.time || '';
        const tb = b.time || '';
        return isPast ? tb.localeCompare(ta) : ta.localeCompare(tb);
      });
      const rowsHtml = sortedRows.map(it => it.html).join('');
      return `<div style="margin-bottom:2px">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 4px 4px;margin-top:4px">
          <span style="font-size:10.5px;font-weight:800;letter-spacing:.04em;color:${accent};text-transform:capitalize">${monthLabel(mk)}</span>
          <span style="flex:1;height:1px;background:linear-gradient(90deg,${accent}40,transparent)"></span>
        </div>
        ${rowsHtml}
      </div>`;
    }).join('');
  };

  const buildColumnContent = (items, accent) => {
    if (!items.length) {
      return `<div style="font-size:11px;color:rgba(255,255,255,0.3);padding:16px 4px;text-align:center">Noch keine Einträge.</div>`;
    }
    const upcomingItems = items.filter(it => !it.date || it.date >= todayStr);
    const pastItems = items.filter(it => it.date && it.date < todayStr);
    let html = '';
    if (upcomingItems.length) {
      html += `<div style="font-size:9.5px;font-weight:800;color:rgba(255,255,255,0.35);letter-spacing:0.06em;padding:4px 4px 2px;text-transform:uppercase;display:flex;align-items:center;gap:6px"><i class="ti ti-arrow-up-right" style="color:${accent}"></i> Anstehend</div>`;
      html += renderGroupedList(upcomingItems, false, accent);
    }
    if (pastItems.length) {
      html += `<div style="font-size:9.5px;font-weight:800;color:rgba(255,255,255,0.35);letter-spacing:0.06em;padding:16px 4px 2px;text-transform:uppercase;margin-top:12px;border-top:1px dashed rgba(255,255,255,0.08);display:flex;align-items:center;gap:6px"><i class="ti ti-arrow-down-left" style="color:rgba(255,255,255,0.3)"></i> Vergangen</div>`;
      html += renderGroupedList(pastItems, true, accent);
    }
    return html;
  };

  const matchSection = buildColumnContent(gameItems, '#c9a84c');
  const trainSection = buildColumnContent(trainItems, '#60a5fa');

  mc.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <button onclick="addMatch()" class="edit-only" style="padding:9px 15px;font-size:12.5px;font-weight:700;background:linear-gradient(135deg,#c9a84c,#9a7c2e);border:none;border-radius:8px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px"><i class="ti ti-ball-football"></i> Neues Spiel</button>
      <button onclick="addTrainingFromTermine()" class="edit-only" style="padding:9px 15px;font-size:12.5px;font-weight:700;background:rgba(59,130,246,0.16);border:1px solid rgba(59,130,246,0.4);border-radius:8px;color:#60a5fa;cursor:pointer;display:flex;align-items:center;gap:6px"><i class="ti ti-calendar-plus"></i> Neues Training</button>
    </div>
    <div class="termine-cols" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">
      <div class="card" style="padding:14px 16px;border-top:3px solid #c9a84c">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:6px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06)">
          <div style="width:30px;height:30px;border-radius:8px;background:rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ti-ball-football" style="color:#c9a84c;font-size:16px"></i></div>
          <div style="min-width:0"><div style="font-size:13px;font-weight:800;color:#e2e8f0;line-height:1.1">Spiele &amp; Events</div><div style="font-size:9.5px;color:rgba(255,255,255,0.35);margin-top:2px">Meisterschaft · Testspiele · Turniere · Events</div></div>
          <span style="margin-left:auto;font-size:12px;font-weight:800;color:#c9a84c;background:rgba(201,168,76,0.12);padding:3px 11px;border-radius:11px">${nMatch}</span>
        </div>
        ${matchSection}
      </div>
      <div class="card" style="padding:14px 16px;border-top:3px solid #3b82f6">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:6px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06)">
          <div style="width:30px;height:30px;border-radius:8px;background:rgba(59,130,246,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ti-calendar-week" style="color:#60a5fa;font-size:16px"></i></div>
          <div style="min-width:0"><div style="font-size:13px;font-weight:800;color:#e2e8f0;line-height:1.1">Trainings</div><div style="font-size:9.5px;color:rgba(255,255,255,0.35);margin-top:2px">Reguläre Trainingseinheiten</div></div>
          <span style="margin-left:auto;font-size:12px;font-weight:800;color:#60a5fa;background:rgba(59,130,246,0.12);padding:3px 11px;border-radius:11px">${nTrain}</span>
        </div>
        ${trainSection}
      </div>
    </div>
    <style>@media(max-width:900px){.termine-cols{grid-template-columns:1fr!important}}</style>`;
}
function openTrainingFromTermine(id){ state.trainEditId=id; const t=(typeof getTraining==='function')?getTraining(id):null; if(t&&t.date) state.trainAnchor=t.date; showView('trainings'); }
function addTrainingFromTermine(){ if(roGuard())return; addTraining(); }

function updateMatchField(id,field,val){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  m[field]=val;
  if(field==='status' && val==='played' && !m.match_date){ m.match_date=new Date().toISOString().slice(0,10); }
  persistMatch(id);
  // Live-Update von Ergebnis-Badge & Kopf, ohne komplettes Re-Render
  const badge=document.getElementById('me_result_'+id);
  if(badge){ const r=matchResult(m); badge.innerHTML = r?`<span style="font-size:12px;font-weight:800;color:${RESULT_INFO[r].color};background:${RESULT_INFO[r].bg};padding:4px 12px;border-radius:6px">${RESULT_INFO[r].label} · ${m.goals_for||0}:${m.goals_against||0}</span>`:`<span style="font-size:11px;color:rgba(255,255,255,0.35)">Geplant</span>`; }
}
function stepGoal(id,which,delta){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  const f=which==='for'?'goals_for':'goals_against';
  m[f]=Math.max(0,(parseInt(m[f])||0)+delta);
  if(m.status!=='played') m.status='played';
  const el=document.getElementById('mg_'+which+'_'+id); if(el) el.textContent=m[f];
  updateMatchField(id,f,m[f]);
}
function toggleLineup(id,pid){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  if(!Array.isArray(m.lineup)) m.lineup=[];
  const i=m.lineup.indexOf(pid);
  if(i>=0){ m.lineup.splice(i,1); if(m.scorers) delete m.scorers[pid]; if(m.assists) delete m.assists[pid]; }
  else m.lineup.push(pid);
  persistMatch(id);
  renderSpiele();
}
function stepStat(id,pid,kind,delta){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  const obj = kind==='goal' ? (m.scorers||(m.scorers={})) : (m.assists||(m.assists={}));
  obj[pid]=Math.max(0,(parseInt(obj[pid])||0)+delta);
  if(obj[pid]===0) delete obj[pid];
  const el=document.getElementById('stat_'+kind+'_'+id+'_'+pid); if(el) el.textContent=obj[pid]||0;
  persistMatch(id);
}

// ── STATS ──────────────────────────────────────────
function matchStats(){
  const played=state.matches.filter(m=>m.status==='played');
  let w=0,d=0,l=0,gf=0,ga=0;
  played.forEach(m=>{ const r=matchResult(m); if(r==='W')w++; else if(r==='D')d++; else if(r==='L')l++; gf+=parseInt(m.goals_for)||0; ga+=parseInt(m.goals_against)||0; });
  return {total:state.matches.length,played:played.length,w,d,l,gf,ga};
}
function topScorers(limit=5){
  const tally={};
  state.matches.forEach(m=>{ if(m.status!=='played') return; Object.entries(m.scorers||{}).forEach(([pid,g])=>{tally[pid]=(tally[pid]||0)+(parseInt(g)||0);}); });
  return Object.entries(tally).map(([pid,g])=>({pid:parseInt(pid),goals:g})).filter(x=>x.goals>0).sort((a,b)=>b.goals-a.goals).slice(0,limit);
}

// ── FORMATION: 3 HALBZEITEN × 2 FELDER ─────────────
const HALF_LABELS = ['1. Halbzeit','2. Halbzeit','3. Halbzeit'];
const N_HALVES = 3;
function defaultHalf(sf){ const f=defaultFormation(sf); return {a:{formation:f,lineup:{}},b:{formation:f,lineup:{}}}; }
function ensureHalves(m){
  const sf=m.spielform||'7er';
  if(!Array.isArray(m.halves) || m.halves.length<N_HALVES){
    const arr = Array.isArray(m.halves)? m.halves.slice() : [];
    // Migration aus altem 2-Feld-Modell → 1. Halbzeit
    if(arr.length===0 && (m.formation||m.formationB||(m.lineupA&&Object.keys(m.lineupA).length)||(m.lineupB&&Object.keys(m.lineupB).length))){
      arr.push({a:{formation:m.formation||defaultFormation(sf),lineup:m.lineupA||{}},b:{formation:m.formationB||defaultFormation(sf),lineup:m.lineupB||{}}});
    }
    while(arr.length<N_HALVES) arr.push(defaultHalf(sf));
    m.halves=arr;
  }
  m.halves = m.halves.slice(0,N_HALVES).map(h=>({
    a:{formation:(h&&h.a&&h.a.formation)||defaultFormation(sf), lineup:(h&&h.a&&h.a.lineup)||{}},
    b:{formation:(h&&h.b&&h.b.formation)||defaultFormation(sf), lineup:(h&&h.b&&h.b.lineup)||{}},
  }));
  return m.halves;
}
function getField(m,half,which){ ensureHalves(m); return which==='B'? m.halves[half].b : m.halves[half].a; }

function changeMatchSpielform(id,val){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  m.spielform=val;
  m.halves = Array.from({length:N_HALVES}, ()=>defaultHalf(val));
  persistMatch(id,'Spielform geändert · '+(SPIELFORM_LABELS[val]||val));
  renderSpiele();
}
function changeMatchFormation(id,half,which,val){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  const fld=getField(m,half,which);
  fld.formation=val;
  // Zuweisungen behalten, deren Position es in der neuen Formation noch gibt
  const valid=new Set(getPositions(val).map(p=>p.id));
  const old=fld.lineup||{}, next={};
  Object.keys(old).forEach(k=>{ if(valid.has(k)) next[k]=old[k]; });
  fld.lineup=next;
  persistMatch(id);
  renderSpiele();
}
function assignMatchLineup(id,half,posId,val,which){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  ensureHalves(m);
  const fld=getField(m,half,which);
  if(!fld.lineup) fld.lineup={};
  if(val===''||val==null){
    delete fld.lineup[posId];
  } else {
    const pid=parseInt(val);
    // Eindeutig nur INNERHALB derselben Halbzeit (Feld A+B) → andere Halbzeiten dürfen Spieler erneut nutzen
    ['a','b'].forEach(fk=>{ const o=m.halves[half][fk].lineup; if(o){ Object.keys(o).forEach(k=>{ if(String(o[k])===String(pid)) delete o[k]; }); } });
    fld.lineup[posId]=pid;
    // Automatisch in die Aufstellung/Kader übernehmen (kein doppeltes Erfassen nötig)
    if(!Array.isArray(m.lineup)) m.lineup=[];
    if(!m.lineup.includes(pid)) m.lineup.push(pid);
  }
  persistMatch(id);
  renderSpiele();
}
function clearMatchField(id,half,which){
  if(roGuard()) return;
  const m=getMatch(id); if(!m) return;
  getField(m,half,which).lineup={};
  persistMatch(id);
  renderSpiele();
}
function assignedHalfIds(m,half){
  ensureHalves(m);
  const set=new Set();
  ['a','b'].forEach(fk=>{ const o=m.halves[half][fk].lineup||{}; Object.values(o).forEach(pid=>set.add(String(pid))); });
  return set;
}

// ── SPIELZEIT & POSITIONEN (abgeleitet aus den Aufstellungen) ──
const MIN_PER_HALF = 15;   // fix: 15 Min pro Halbzeit-Einsatz
function matchPlayerStats(m){
  const per={};
  if(!m||!Array.isArray(m.halves)) return per;
  m.halves.forEach((hz,hi)=>{
    ['a','b'].forEach(fk=>{
      const fld=hz&&hz[fk]; if(!fld) return;
      const posMap={}; getPositions(fld.formation||defaultFormation(m.spielform)).forEach(pp=>posMap[pp.id]=pp.pos||pp.label);
      Object.entries(fld.lineup||{}).forEach(([posId,pid])=>{
        const k=String(pid);
        if(!per[k]) per[k]={halves:new Set(),pos:{}};
        per[k].halves.add(hi);
        const lab=posMap[posId]||'?';
        per[k].pos[lab]=(per[k].pos[lab]||0)+1;
      });
    });
  });
  const out={};
  Object.keys(per).forEach(k=>{ const h=per[k].halves.size; out[k]={halves:h,minutes:h*MIN_PER_HALF,pos:per[k].pos}; });
  return out;
}
function posSummary(posObj){
  return Object.entries(posObj||{}).sort((a,b)=>b[1]-a[1]).map(([l,n])=>n>1?l+'×'+n:l).join(', ')||'—';
}
function matchLineupIds(m){
  const set=new Set();
  if(!m||!Array.isArray(m.halves)) return set;
  m.halves.forEach(hz=>['a','b'].forEach(fk=>{ const o=(hz&&hz[fk]&&hz[fk].lineup)||{}; Object.values(o).forEach(pid=>set.add(String(pid))); }));
  return set;
}
function matchHasLineup(m){ return matchLineupIds(m).size>0; }
function matchPhase(m){ const mo=parseInt((m.match_date||'').slice(5,7))||0; return mo>=7?'vor':'rueck'; } // Jul–Dez = Vorrunde
function aggMatchStats(filter){
  const f=filter||{}; const per={};
  const blank=()=>({halves:0,minutes:0,matches:0,pos:{},goals:0,assists:0});
  (state.matches||[]).forEach(m=>{
    if(f.comp && f.comp!=='all' && m.competition!==f.comp) return;
    if(f.phase && f.phase!=='all' && matchPhase(m)!==f.phase) return;
    const ms=matchPlayerStats(m);
    Object.keys(ms).forEach(k=>{
      if(!per[k]) per[k]=blank();
      per[k].halves+=ms[k].halves; per[k].minutes+=ms[k].minutes; per[k].matches++;
      Object.entries(ms[k].pos).forEach(([l,n])=>per[k].pos[l]=(per[k].pos[l]||0)+n);
    });
    Object.entries(m.scorers||{}).forEach(([pid,n])=>{ const k=String(pid); if(!per[k])per[k]=blank(); per[k].goals+=(parseInt(n)||0); });
    Object.entries(m.assists||{}).forEach(([pid,n])=>{ const k=String(pid); if(!per[k])per[k]=blank(); per[k].assists+=(parseInt(n)||0); });
  });
  return per;
}

      <div style="position:absolute;left:50%;top:50%;width:5px;height:5px;background:rgba(255,255,255,0.4);border-radius:50%;transform:translate(-50%,-50%)"></div>

function halfBlockHTML(id,half){

function copyMatchAlterSQL(){
  const sql=`alter table matches add column if not exists spielform text default '7er';
alter table matches add column if not exists match_time text;
alter table matches add column if not exists formation text;
alter table matches add column if not exists formation_b text;
alter table matches add column if not exists lineup_a jsonb default '{}'::jsonb;
alter table matches add column if not exists lineup_b jsonb default '{}'::jsonb;
alter table matches add column if not exists halves jsonb default '[]'::jsonb;`;
  navigator.clipboard.writeText(sql).then(()=>showSavedToast('✓ SQL kopiert – in Supabase SQL-Editor ausführen'));
}

// ── MATCHBLATT PDF ─────────────────────────────────
function _pdfDrawPitch(doc, x, y, w, h, form, lineup){
  doc.setFillColor(28,116,63); doc.roundedRect(x,y,w,h,2.5,2.5,'F');
  doc.setDrawColor(255,255,255); doc.setLineWidth(0.3);
  // Mittellinie + Mittelkreis + Punkt
  doc.line(x+w*0.04, y+h/2, x+w*0.96, y+h/2);
  doc.circle(x+w/2, y+h/2, Math.min(w,h)*0.13, 'S');
  doc.setFillColor(255,255,255); doc.circle(x+w/2, y+h/2, 0.5, 'F');
  // Strafraum + Torraum (oben & unten)
  const paW=w*0.62, paX=x+(w-paW)/2, paH=h*0.16;
  const gaW=w*0.32, gaX=x+(w-gaW)/2, gaH=h*0.07;
  doc.setDrawColor(255,255,255); doc.setLineWidth(0.3);
  doc.rect(paX, y+h-paH, paW, paH, 'S'); doc.rect(gaX, y+h-gaH, gaW, gaH, 'S');
  doc.rect(paX, y, paW, paH, 'S'); doc.rect(gaX, y, gaW, gaH, 'S');
  // Spieler
  const pos=getPositions(form);
  pos.forEach(p=>{
    const cx=x+w*(p.x/100), cy=y+h*(p.y/100);
    const pid=lineup?lineup[p.id]:null;
    const pl = pid!=null ? PLAYERS.find(z=>String(z.id)===String(pid)) : null;
    if(pl){ doc.setFillColor(201,168,76); doc.setDrawColor(255,255,255); }
    else { doc.setFillColor(255,255,255); doc.setDrawColor(150,150,150); }
    doc.setLineWidth(0.35); doc.circle(cx,cy,3.4,'FD');
    doc.setFontSize(7.2); doc.setFont(undefined,'bold');
    doc.setTextColor(pl?255:110, pl?255:110, pl?255:110);
    doc.text(pl?String(pl.nr):(p.pos||p.label), cx, cy+1.2, {align:'center'});
    if(pl){ doc.setFont(undefined,'bold'); doc.setFontSize(5.6); doc.setTextColor(255,255,255);
      doc.text(vorname(pl.name).slice(0,11), cx, cy+6.4, {align:'center'}); }
  });
}
function exportMatchPDF(id){
  const m=getMatch(id); if(!m){ return; }
  ensureHalves(m);
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PW=210, ML=14, MR=14, usable=PW-ML-MR;
  // Logo
  try{
    const src=(typeof getTeamLogo==='function')?getTeamLogo():null;
    if(src){ const fmt=/^data:image\/png/i.test(src)?'PNG':'JPEG'; doc.addImage(src,fmt,ML,11,20,20); }
  }catch(e){ console.warn('logo pdf',e); }
  doc.setTextColor(20,28,40); doc.setFont(undefined,'bold'); doc.setFontSize(18);
  doc.text('FE12 Old Boys',ML+24,19);
  doc.setFont(undefined,'normal'); doc.setFontSize(10); doc.setTextColor(201,168,76);
  doc.text('Matchblatt · Aufstellung',ML+24,25);
  doc.setDrawColor(201,168,76); doc.setLineWidth(0.6); doc.line(ML,34,PW-MR,34);
  // Meta
  const venueL={home:'Heim',away:'Auswärts',neutral:'Neutral'}[m.venue]||m.venue||'';
  const r=matchResult(m);
  const resL = m.status==='played' ? `${m.goals_for||0} : ${m.goals_against||0}${r?(' ('+RESULT_INFO[r].label+')'):''}` : 'Geplant';
  const meta=[
    ['Datum', matchDateLabel(m.match_date)+(m.match_time?'  '+m.match_time+' Uhr':'')],
    ['Gegner', m.opponent||'—'],
    ['Wettbewerb', m.competition||'—'],
    ['Ort', venueL],
    ['Spielform', SPIELFORM_LABELS[m.spielform]||m.spielform||'—'],
    ['Endstand', resL],
  ];
  let y=40; doc.setFontSize(9.5);
  const colW=usable/3;
  meta.forEach((kv,i)=>{
    const col=i%3, row=Math.floor(i/3);
    const x=ML+col*colW, yy=y+row*11;
    doc.setFont(undefined,'normal'); doc.setTextColor(120,130,145); doc.setFontSize(8);
    doc.text(kv[0].toUpperCase(), x, yy);
    doc.setFont(undefined,'bold'); doc.setTextColor(25,33,46); doc.setFontSize(10);
    doc.text(String(kv[1]).slice(0,28), x, yy+5);
  });
  y += Math.ceil(meta.length/3)*11 + 4;

  // Halbzeiten mit je 2 Feldern
  const pw=(usable-10)/2, ph=68;
  const ensure=(need)=>{ if(y+need>288){ doc.addPage(); y=18; } };
  for(let h=0; h<N_HALVES; h++){
    ensure(10+ph+12);
    doc.setFillColor(201,168,76); doc.roundedRect(ML,y,usable,7,1.5,1.5,'F');
    doc.setFont(undefined,'bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
    doc.text(HALF_LABELS[h], ML+3, y+4.8);
    y+=10;
    [['A',m.halves[h].a],['B',m.halves[h].b]].forEach((fe,ci)=>{
      const x=ML+ci*(pw+10);
      doc.setFont(undefined,'bold'); doc.setFontSize(8.5); doc.setTextColor(25,33,46);
      doc.text('Feld '+fe[0]+'  ·  '+(fe[1].formation||''), x, y-1);
      _pdfDrawPitch(doc, x, y+1, pw, ph, fe[1].formation||defaultFormation(m.spielform), fe[1].lineup||{});
    });
    y += ph+5;
    // Ersatzbank dieser Halbzeit
    const bench=PLAYERS.filter(p=>!assignedHalfIds(m,h).has(String(p.id)));
    doc.setFont(undefined,'bold'); doc.setFontSize(7.5); doc.setTextColor(120,130,145);
    doc.text('BANK', ML, y);
    doc.setFont(undefined,'normal'); doc.setFontSize(8.5); doc.setTextColor(50,58,70);
    const bt=bench.length?bench.map(p=>p.nr+' '+vorname(p.name)).join(',  '):'—';
    const bls=doc.splitTextToSize(bt, usable-16); doc.text(bls, ML+14, y);
    y += Math.max(4.5, bls.length*4)+6;
  }

  // Spielzeit & Positionen (nur aufgestellte Spieler) — 15 Min pro Halbzeit-Einsatz
  const st=matchPlayerStats(m);
  const stKeys=Object.keys(st).sort((a,b)=>st[b].minutes-st[a].minutes);
  if(stKeys.length){
    ensure(24);
    doc.setDrawColor(220,225,232); doc.setLineWidth(0.3); doc.line(ML,y,PW-MR,y); y+=5;
    doc.setFont(undefined,'bold'); doc.setFontSize(9); doc.setTextColor(201,168,76);
    doc.text('Spielzeit & Positionen',ML,y); y+=2;
    const body=stKeys.map(k=>{ const p=PLAYERS.find(z=>String(z.id)===k); const s=st[k];
      return [p?p.nr:'', p?vorname(p.name):'?', posSummary(s.pos), s.halves+' HZ', s.minutes+' Min']; });
    doc.autoTable({startY:y+2,head:[['#','Spieler','Position(en)','Einsatz','Spielzeit']],body,theme:'plain',
      styles:{fontSize:8.5,cellPadding:2,textColor:[40,48,60]},
      headStyles:{fillColor:[201,168,76],textColor:[255,255,255],fontStyle:'bold'},
      alternateRowStyles:{fillColor:[245,243,236]},
      columnStyles:{0:{cellWidth:12,halign:'center'},1:{cellWidth:46},2:{cellWidth:'auto'},3:{cellWidth:22,halign:'center'},4:{cellWidth:24,halign:'right',fontStyle:'bold'}},
      margin:{left:ML,right:MR}});
    y=doc.lastAutoTable.finalY+4;
  }

  // Tore / Assists / Notizen
  const sc=Object.entries(m.scorers||{}).filter(([,n])=>n>0);
  const as=Object.entries(m.assists||{}).filter(([,n])=>n>0);
  const nm=pid=>{ const p=PLAYERS.find(z=>String(z.id)===String(pid)); return p?vorname(p.name):'?'; };
  if(sc.length||as.length||(m.note||'').trim()){
    ensure(24);
    doc.setDrawColor(220,225,232); doc.setLineWidth(0.3); doc.line(ML,y,PW-MR,y); y+=6;
    if(sc.length){ doc.setFont(undefined,'bold'); doc.setFontSize(8); doc.setTextColor(120,130,145); doc.text('TORE', ML, y);
      doc.setFont(undefined,'normal'); doc.setFontSize(9); doc.setTextColor(40,48,60);
      const t=sc.map(([pid,n])=>nm(pid)+(n>1?' ('+n+')':'')).join(', ');
      const ls=doc.splitTextToSize(t,usable-20); doc.text(ls, ML+20, y); y+=Math.max(5,ls.length*4.4)+2; }
    if(as.length){ doc.setFont(undefined,'bold'); doc.setFontSize(8); doc.setTextColor(120,130,145); doc.text('ASSISTS', ML, y);
      doc.setFont(undefined,'normal'); doc.setFontSize(9); doc.setTextColor(40,48,60);
      const t=as.map(([pid,n])=>nm(pid)+(n>1?' ('+n+')':'')).join(', ');
      const ls=doc.splitTextToSize(t,usable-20); doc.text(ls, ML+20, y); y+=Math.max(5,ls.length*4.4)+2; }
    if((m.note||'').trim()){ doc.setFont(undefined,'bold'); doc.setFontSize(8); doc.setTextColor(120,130,145); doc.text('NOTIZEN', ML, y); y+=5;
      doc.setFont(undefined,'normal'); doc.setFontSize(9); doc.setTextColor(40,48,60);
      const ls=doc.splitTextToSize(m.note.trim(),usable); doc.text(ls, ML, y); y+=ls.length*4.4; }
  }

  // Fußzeile
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){ doc.setPage(i); doc.setFontSize(8); doc.setTextColor(160,168,180);
    doc.text('FE12 Old Boys · TIPS/U · '+new Date().toLocaleDateString('de-CH'), ML, 293);
    doc.text(i+' / '+pages, PW-MR, 293, {align:'right'}); }
  const safeOpp=(m.opponent||'Gegner').replace(/[^\w\u00C0-\u017F]+/g,'_');
  doc.save('FE12_Matchblatt_'+safeOpp+'_'+(m.match_date?m.match_date.slice(0,10):'')+'.pdf');
}
