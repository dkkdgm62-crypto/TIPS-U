function copyMatchAlterSQL(){
  const sql=`alter table matches add column if not exists spielform text default '7er';
alter table matches add column if not exists match_time text;
alter table matches add column if not exists formation text;
alter table matches add column if not exists formation_b text;
alter table matches add column if not exists lineup_a jsonb default '{}'::jsonb;
alter table matches add column if not exists lineup_b jsonb default '{}'::jsonb;
alter table matches add column if not exists halves jsonb default '[]'::jsonb;`;
  navigator.clipboard.writeText(sql).then(()=>showSavedToast('✓ SQL kopiert – in Supabase SQL-Editor ausführen'));
}

// ── MATCHBLATT PDF ─────────────────────────────────
function _pdfDrawPitch(doc, x, y, w, h, form, lineup){
  doc.setFillColor(31,122,67); doc.roundedRect(x,y,w,h,2,2,'F');
  doc.setDrawColor(255,255,255); doc.setLineWidth(0.2);
  doc.line(x+w*0.06, y+h/2, x+w*0.94, y+h/2);
  // Mittelkreis
  doc.circle(x+w/2, y+h/2, Math.min(w,h)*0.12, 'S');
  const pos=getPositions(form);
  pos.forEach(p=>{
    const cx=x+w*(p.x/100), cy=y+h*(p.y/100);
    const pid=lineup?lineup[p.id]:null;
    const pl = pid!=null ? PLAYERS.find(z=>String(z.id)===String(pid)) : null;
    if(pl){ doc.setFillColor(201,168,76); doc.setDrawColor(255,255,255); }
    else { doc.setFillColor(255,255,255); doc.setDrawColor(180,180,180); }
    doc.setLineWidth(0.2); doc.circle(cx,cy,2.7,'FD');
    doc.setFontSize(5.5); doc.setFont(undefined,'bold');
    doc.setTextColor(pl?255:120, pl?255:120, pl?255:120);
    doc.text(pl?String(pl.nr):p.label, cx, cy+0.9, {align:'center'});
    if(pl){ doc.setFont(undefined,'normal'); doc.setFontSize(4.6); doc.setTextColor(255,255,255);
      doc.text(vorname(pl.name).slice(0,9), cx, cy+5.0, {align:'center'}); }
  });
}
function exportMatchPDF(id){
  const m=getMatch(id); if(!m){ return; }
  ensureHalves(m);
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PW=210, ML=14, MR=14, usable=PW-ML-MR;
  // Logo
  try{
    const src=(typeof getTeamLogo==='function')?getTeamLogo():null;
    if(src){ const fmt=/^data:image\/png/i.test(src)?'PNG':'JPEG'; doc.addImage(src,fmt,ML,11,20,20); }
  }catch(e){ console.warn('logo pdf',e); }
  doc.setTextColor(20,28,40); doc.setFont(undefined,'bold'); doc.setFontSize(18);
  doc.text('FE12 Old Boys',ML+24,19);
  doc.setFont(undefined,'normal'); doc.setFontSize(10); doc.setTextColor(201,168,76);
  doc.text('Matchblatt · Aufstellung',ML+24,25);
  doc.setDrawColor(201,168,76); doc.setLineWidth(0.6); doc.line(ML,34,PW-MR,34);
  // Meta
  const venueL={home:'Heim',away:'Auswärts',neutral:'Neutral'}[m.venue]||m.venue||'';
  const r=matchResult(m);
  const resL = m.status==='played' ? `${m.goals_for||0} : ${m.goals_against||0}${r?(' ('+RESULT_INFO[r].label+')'):''}` : 'Geplant';
  const meta=[
    ['Datum', matchDateLabel(m.match_date)+(m.match_time?'  '+m.match_time+' Uhr':'')],
    ['Gegner', m.opponent||'—'],
    ['Wettbewerb', m.competition||'—'],
    ['Ort', venueL],
    ['Spielform', SPIELFORM_LABELS[m.spielform]||m.spielform||'—'],
    ['Endstand', resL],
  ];
  let y=40; doc.setFontSize(9.5);
  const colW=usable/3;
  meta.forEach((kv,i)=>{
    const col=i%3, row=Math.floor(i/3);
    const x=ML+col*colW, yy=y+row*11;
    doc.setFont(undefined,'normal'); doc.setTextColor(120,130,145); doc.setFontSize(8);
    doc.text(kv[0].toUpperCase(), x, yy);
    doc.setFont(undefined,'bold'); doc.setTextColor(25,33,46); doc.setFontSize(10);
    doc.text(String(kv[1]).slice(0,28), x, yy+5);
  });
  y += Math.ceil(meta.length/3)*11 + 4;

  // Halbzeiten mit je 2 Feldern
  const pw=(usable-10)/2, ph=64;
  const ensure=(need)=>{ if(y+need>288){ doc.addPage(); y=18; } };
  for(let h=0; h<N_HALVES; h++){
    ensure(8+ph+4);
    doc.setFillColor(201,168,76); doc.roundedRect(ML,y,usable,7,1.5,1.5,'F');
    doc.setFont(undefined,'bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
    doc.text(HALF_LABELS[h], ML+3, y+4.8);
    y+=10;
    [['A',m.halves[h].a],['B',m.halves[h].b]].forEach((fe,ci)=>{
      const x=ML+ci*(pw+10);
      doc.setFont(undefined,'bold'); doc.setFontSize(8.5); doc.setTextColor(25,33,46);
      doc.text('Feld '+fe[0]+'  ·  '+(fe[1].formation||''), x, y-1);
      _pdfDrawPitch(doc, x, y+1, pw, ph, fe[1].formation||defaultFormation(m.spielform), fe[1].lineup||{});
    });
    y += ph+8;
  }

  // Spielzeit & Positionen (nur aufgestellte Spieler) — 15 Min pro Halbzeit-Einsatz
  const st=matchPlayerStats(m);
  const stKeys=Object.keys(st).sort((a,b)=>st[b].minutes-st[a].minutes);
  if(stKeys.length){
    ensure(24);
    doc.setDrawColor(220,225,232); doc.setLineWidth(0.3); doc.line(ML,y,PW-MR,y); y+=5;
    doc.setFont(undefined,'bold'); doc.setFontSize(9); doc.setTextColor(201,168,76);
    doc.text('Spielzeit & Positionen',ML,y); y+=2;
    const body=stKeys.map(k=>{ const p=PLAYERS.find(z=>String(z.id)===k); const s=st[k];
      return [p?p.nr:'', p?vorname(p.name):'?', posSummary(s.pos), s.halves+' HZ', s.minutes+' Min']; });
    doc.autoTable({startY:y+2,head:[['#','Spieler','Position(en)','Einsatz','Spielzeit']],body,theme:'plain',
      styles:{fontSize:8.5,cellPadding:2,textColor:[40,48,60]},
      headStyles:{fillColor:[201,168,76],textColor:[255,255,255],fontStyle:'bold'},
      alternateRowStyles:{fillColor:[245,243,236]},
      columnStyles:{0:{cellWidth:12,halign:'center'},1:{cellWidth:46},2:{cellWidth:'auto'},3:{cellWidth:22,halign:'center'},4:{cellWidth:24,halign:'right',fontStyle:'bold'}},
      margin:{left:ML,right:MR}});
    y=doc.lastAutoTable.finalY+4;
  }

  // Tore / Assists / Notizen
  const sc=Object.entries(m.scorers||{}).filter(([,n])=>n>0);
  const as=Object.entries(m.assists||{}).filter(([,n])=>n>0);
  const nm=pid=>{ const p=PLAYERS.find(z=>String(z.id)===String(pid)); return p?vorname(p.name):'?'; };
  if(sc.length||as.length||(m.note||'').trim()){
    ensure(24);
    doc.setDrawColor(220,225,232); doc.setLineWidth(0.3); doc.line(ML,y,PW-MR,y); y+=6;
    if(sc.length){ doc.setFont(undefined,'bold'); doc.setFontSize(8); doc.setTextColor(120,130,145); doc.text('TORE', ML, y);
      doc.setFont(undefined,'normal'); doc.setFontSize(9); doc.setTextColor(40,48,60);
      const t=sc.map(([pid,n])=>nm(pid)+(n>1?' ('+n+')':'')).join(', ');
      const ls=doc.splitTextToSize(t,usable-20); doc.text(ls, ML+20, y); y+=Math.max(5,ls.length*4.4)+2; }
    if(as.length){ doc.setFont(undefined,'bold'); doc.setFontSize(8); doc.setTextColor(120,130,145); doc.text('ASSISTS', ML, y);
      doc.setFont(undefined,'normal'); doc.setFontSize(9); doc.setTextColor(40,48,60);
      const t=as.map(([pid,n])=>nm(pid)+(n>1?' ('+n+')':'')).join(', ');
      const ls=doc.splitTextToSize(t,usable-20); doc.text(ls, ML+20, y); y+=Math.max(5,ls.length*4.4)+2; }
    if((m.note||'').trim()){ doc.setFont(undefined,'bold'); doc.setFontSize(8); doc.setTextColor(120,130,145); doc.text('NOTIZEN', ML, y); y+=5;
      doc.setFont(undefined,'normal'); doc.setFontSize(9); doc.setTextColor(40,48,60);
      const ls=doc.splitTextToSize(m.note.trim(),usable); doc.text(ls, ML, y); y+=ls.length*4.4; }
  }

  // Fußzeile
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){ doc.setPage(i); doc.setFontSize(8); doc.setTextColor(160,168,180);
    doc.text('FE12 Old Boys · TIPS/U · '+new Date().toLocaleDateString('de-CH'), ML, 293);
    doc.text(i+' / '+pages, PW-MR, 293, {align:'right'}); }
  const safeOpp=(m.opponent||'Gegner').replace(/[^\w\u00C0-\u017F]+/g,'_');
  doc.save('FE12_Matchblatt_'+safeOpp+'_'+(m.match_date?m.match_date.slice(0,10):'')+'.pdf');
}

// ANWESENHEIT (Training & Spiel) + EINSÄTZE / FAIRNESS
// Speicherung in Supabase-Tabelle "attendance"
// ═══════════════════════════════════════════════════
state.attendance = state.attendance || {};      // key -> {player_id,date,type,status}
state.attDate = state.attDate || new Date().toISOString().slice(0,10);
state.attType = state.attType || 'training';
let _attendanceTableMissing = false;
let _attendanceLoaded = false;
let _attSaveTimers = {};
const ATT_STATUS = {
  present:{label:'Anwesend',color:'#22c55e',ic:'check'},
  late:{label:'Verspätet',color:'#f59e0b',ic:'clock'},
  excused:{label:'Entschuldigt',color:'#818cf8',ic:'mail'},
  absent:{label:'Abwesend',color:'#ef4444',ic:'x'},
};
state.attMatchId = state.attMatchId || null;
// Session-Schlüssel: Spiel → an Match-ID gebunden (mehrere Spiele am selben Tag möglich, z.B. Turnier); Training → an Datum gebunden
function currentSession(){
  if(state.attType==='match'){
    const m=getMatch(state.attMatchId);
    return {skey:'M_'+state.attMatchId, date:(m&&m.match_date)||state.attDate, type:'match', valid:!!m, match:m};
  }
  if(state.attTrainId){
    const t=(typeof getTraining==='function')?getTraining(state.attTrainId):null;
    if(t) return {skey:'TR_'+state.attTrainId, date:t.date||state.attDate, type:'training', valid:true, match:null, training:t};
  }
  return {skey:'T_'+state.attDate, date:state.attDate, type:'training', valid:!!state.attDate, match:null};
}
function attKeyFor(pid){ return currentSession().skey+'_'+pid; }

async function loadAttendance(){
  try{
    const {data,error}=await sb.from('attendance').select('*');
    if(error){
      if((error.code==='42P01')||/relation .*attendance.* does not exist/i.test(error.message||'')) _attendanceTableMissing=true;
      state.attendance={}; return;
    }
    _attendanceTableMissing=false;
    const map={};
    (data||[]).forEach(r=>{ map[r.id]={id:r.id,player_id:r.player_id,date:r.date,type:r.type,status:r.status}; });
    state.attendance=map; _attendanceLoaded=true;
  }catch(e){ console.error('loadAttendance',e); state.attendance={}; }
}
function setAttendance(pid,status){
  if(roGuard()) return;
  const s=currentSession(); if(!s.valid) return;
  const key=s.skey+'_'+pid;
  const cur=state.attendance[key];
  if(cur && cur.status===status){ delete state.attendance[key]; _attDelete(key); }
  else { state.attendance[key]={id:key,player_id:pid,date:s.date,type:s.type,status}; _attSave(key,pid,s.date,s.type,status); }
  renderAnwesenheit();
}
function _attSave(key,pid,date,type,status){
  clearTimeout(_attSaveTimers[key]);
  _attSaveTimers[key]=setTimeout(async()=>{
    try{
      const {error}=await sb.from('attendance').upsert({id:key,player_id:pid,date:date||null,type,status},{onConflict:'id'});
      if(error){ console.error('attendance save',error); showSavedToast('Anwesenheit speichern fehlgeschlagen – Tabelle prüfen',false); return; }
      if(typeof logActivity==='function'){ const p=PLAYERS.find(x=>x.id===pid); logActivity(pid,'meta','Anwesenheit '+(type==='training'?'Training':'Spiel')+' '+(date||'')+': '+(ATT_STATUS[status]?ATT_STATUS[status].label:status),null,null,'attendance','',p?p.name:''); }
    }catch(e){ console.error('attendance save',e); }
  },300);
}
function _attDelete(key){
  clearTimeout(_attSaveTimers[key]);
  _attSaveTimers[key]=setTimeout(async()=>{ try{ await sb.from('attendance').delete().eq('id',key); }catch(e){ console.error('attendance del',e); } },300);
}
function setAttDate(v){ state.attDate=v; renderAnwesenheit(); }
function setAttType(v){ state.attType=v; renderAnwesenheit(); }
function setEinsComp(v){ state.einsComp=v; renderAnwesenheit(); }
function setEinsPhase(v){ state.einsPhase=v; renderAnwesenheit(); }
function setAttMatch(id){ const m=getMatch(id); state.attMatchId=id; if(m&&m.match_date) state.attDate=m.match_date; renderAnwesenheit(); }
function setAttTrain(id){ state.attTrainId=id; const t=(typeof getTraining==='function')?getTraining(id):null; if(t&&t.date) state.attDate=t.date; renderAnwesenheit(); }
function markAllPresent(){
  if(roGuard()) return;
  const s=currentSession(); if(!s.valid){ showSavedToast('Bitte zuerst ein Spiel/Datum wählen',false); return; }
  PLAYERS.forEach(p=>{ const key=s.skey+'_'+p.id; state.attendance[key]={id:key,player_id:p.id,date:s.date,type:s.type,status:'present'}; _attSave(key,p.id,s.date,s.type,'present'); });
  renderAnwesenheit();
}

// Anwesenheits-Quote je Spieler: gespeicherte Einträge + automatisch Anwesend bei Spiel-Aufstellung (manuell hat Vorrang)
function attendanceStats(){
  const per={}; PLAYERS.forEach(p=>per[p.id]={present:0,total:0});
  const handled=new Set(); // manuell gesetzte Spiel-Anwesenheit: matchId_pid
  Object.entries(state.attendance).forEach(([key,r])=>{
    if(!per[r.player_id]) per[r.player_id]={present:0,total:0};
    if(r.type==='match'){ const mid=key.slice(2, key.lastIndexOf('_')); handled.add(mid+'_'+r.player_id); }
    if(r.status==='excused') return;            // entschuldigt zählt nicht gegen die Quote
    per[r.player_id].total++;
    if(r.status==='present'||r.status==='late') per[r.player_id].present++;
  });
  // Automatisch anwesend: jeder aufgestellte Spieler eines Spiels (sofern nicht manuell überschrieben)
  (state.matches||[]).forEach(m=>{
    matchLineupIds(m).forEach(pid=>{
      if(handled.has(m.id+'_'+pid)) return;
      const k=parseInt(pid); if(!per[k]) per[k]={present:0,total:0};
      per[k].total++; per[k].present++;
    });
  });
  return per;
}
// Einsätze aus den Aufstellungen (gespielte Spiele): Halbzeit-Einsätze je Spieler
function playingStats(){
  const per={}; PLAYERS.forEach(p=>per[p.id]={halves:0,matches:0});
  (state.matches||[]).forEach(m=>{
    if(m.status!=='played') return;
    if(!Array.isArray(m.halves)) return;
    const inMatch=new Set();
    m.halves.forEach(hz=>{
      const ids=new Set();
      ['a','b'].forEach(fk=>{ const o=(hz&&hz[fk]&&hz[fk].lineup)||{}; Object.values(o).forEach(pid=>ids.add(String(pid))); });
      ids.forEach(pid=>{ if(per[pid]){ per[pid].halves++; inMatch.add(pid); } });
    });
    inMatch.forEach(pid=>{ if(per[pid]) per[pid].matches++; });
  });
  return per;
}

  if(state.matches.length===0 && !_matchesTableMissing){ await loadMatches(); }
  if(_attendanceTableMissing){ mc.innerHTML=attendanceSetupHint(); return; }

  const type=state.attType;

    const def=matchesSorted.find(isUpcoming)||matchesSorted[matchesSorted.length-1];

  const rows=PLAYERS.map(p=>{

// TRAININGSPLANUNG (gemeinsam · an Makrozyklus gebunden)
// Tabelle "trainings"; Anwesenheit pro Training via AWK
// ═══════════════════════════════════════════════════
state.trainView = state.trainView || 'week';
state.trainings = state.trainings || [];
state.attTrainId = state.attTrainId || null;
state.trainAnchor = state.trainAnchor || new Date().toISOString().slice(0,10);
state.trainEditId = state.trainEditId || null;
let _trainingsTableMissing=false, _trainingsLoaded=false, _trainSaveTimers={};
const WD_LBL=['So','Mo','Di','Mi','Do','Fr','Sa'];
const WD_FULL=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const TR_TYP={training:{label:'Training',color:'#3b82f6'},event:{label:'Event',color:'#c9a84c'},spiel:{label:'Spiel & Spass',color:'#a855f7'}};

function _td(s){ return new Date(s+'T00:00:00'); }
function _tiso(d){ const x=new Date(d); x.setHours(12,0,0,0); return x.toISOString().slice(0,10); }
function isoWeek(d){ const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=(dt.getUTCDay()+6)%7; dt.setUTCDate(dt.getUTCDate()-day+3); const f=new Date(Date.UTC(dt.getUTCFullYear(),0,4)); const fd=(f.getUTCDay()+6)%7; f.setUTCDate(f.getUTCDate()-fd+3); return 1+Math.round((dt-f)/(7*864e5)); }
function mondayOf(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function trainKwData(dateStr){ const d=_td(dateStr); const kw=isoWeek(d); const arr=(d.getMonth()>=6)?MAKRO.vorrunde:MAKRO.rueckrunde; return arr.find(w=>w.kw===kw)||null; }
function trainDateLabel(ds){ const d=_td(ds); return WD_LBL[d.getDay()]+' '+('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'; }

function getTrainSchema(){ let s={}; try{ s=JSON.parse(localStorage.getItem('fe12_train_schema'))||{}; }catch(e){} return {days:s.days||[1,3,5], from:s.from||'17:00', to:s.to||'19:00', ort:s.ort||''}; }
function setTrainSchema(s){ try{ localStorage.setItem('fe12_train_schema', JSON.stringify(s)); }catch(e){} }

async function loadTrainings(){
  try{
    const {data,error}=await sb.from('trainings').select('*');
    if(error){ if(error.code==='42P01'||/relation .*trainings.* does not exist/i.test(error.message||'')) _trainingsTableMissing=true; state.trainings=[]; return; }
    _trainingsTableMissing=false;
    state.trainings=(data||[]).map(t=>({id:t.id,date:t.date||'',time_from:t.time_from||'',time_to:t.time_to||'',ort:t.ort||'',typ:t.typ||'training',titel:t.titel||'',note:t.note||'',groups:Array.isArray(t.groups)?t.groups:(t.groups?JSON.parse(t.groups):[])}));
    _trainingsLoaded=true;
  }catch(e){ console.error('loadTrainings',e); state.trainings=[]; }
}
function getTraining(id){ return (state.trainings||[]).find(t=>t.id===id); }
function trainPayload(t){ return {id:t.id,date:t.date||null,time_from:t.time_from||'',time_to:t.time_to||'',ort:t.ort||'',typ:t.typ||'training',titel:t.titel||'',note:t.note||'',groups:t.groups||[]}; }
async function _trainUpsert(t){
  let pl={...trainPayload(t)}, tries=0, dropped=[];
  while(tries++<12){ const {error}=await sb.from('trainings').upsert(pl,{onConflict:'id'}); if(!error) return {error:null,dropped};
    const mm=(error.message||'').match(/Could not find the '([^']+)' column/i);
    if(error.code==='PGRST204'&&mm&&Object.prototype.hasOwnProperty.call(pl,mm[1])){ dropped.push(mm[1]); delete pl[mm[1]]; continue; }
    return {error,dropped}; }
  return {error:{message:'zu viele fehlende Spalten'},dropped};
}
function persistTraining(id){ if(window.IS_READONLY) return; const t=getTraining(id); if(!t) return;
  clearTimeout(_trainSaveTimers[id]); _trainSaveTimers[id]=setTimeout(async()=>{ const {error}=await _trainUpsert(t); if(error){ console.error('persistTraining',error); showSavedToast('Training speichern fehlgeschlagen: '+(error.message||error.code||'?'),false); } },300); }

function newTrainId(){ return 'tr-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6); }
function addTraining(dateStr){ if(roGuard())return; const sc=getTrainSchema(); const t={id:newTrainId(),date:dateStr||state.trainAnchor,time_from:sc.from,time_to:sc.to,ort:sc.ort,typ:'training',titel:'',note:'',groups:[]}; state.trainings.push(t); state.trainEditId=t.id; persistTraining(t.id); renderTrainings(); }
function deleteTraining(id){ if(roGuard())return; if(!confirm('Training wirklich löschen?'))return; state.trainings=(state.trainings||[]).filter(t=>t.id!==id); if(state.trainEditId===id)state.trainEditId=null; (async()=>{ try{ await sb.from('trainings').delete().eq('id',id); }catch(e){console.error(e);} })(); renderTrainings(); }
function updateTraining(id,field,val){ if(roGuard())return; const t=getTraining(id); if(!t)return; t[field]=val; persistTraining(id); }
function toggleTrainEdit(id){ state.trainEditId=(state.trainEditId===id?null:id); renderTrainings(); }
function generateStandardWeek(){ if(roGuard())return; const sc=getTrainSchema(); const mon=mondayOf(_td(state.trainAnchor)); let n=0;
  sc.days.slice().sort().forEach(wd=>{ const off=(wd+6)%7; const d=new Date(mon); d.setDate(mon.getDate()+off); const ds=_tiso(d);
    if((state.trainings||[]).some(t=>t.date===ds && t.time_from===sc.from)) return;
    const t={id:newTrainId(),date:ds,time_from:sc.from,time_to:sc.to,ort:sc.ort,typ:'training',titel:'',note:'',groups:[]}; state.trainings.push(t); persistTraining(t.id); n++; });
  showSavedToast(n?('✓ '+n+' Trainings angelegt'):'Für diese Woche bereits angelegt'); renderTrainings(); }
function trainNav(dir){ const d=_td(state.trainAnchor); d.setDate(d.getDate()+dir*(state.trainView==='month'?30:7)); state.trainAnchor=_tiso(d); renderTrainings(); }
function setTrainView(v){ state.trainView=v; renderTrainings(); }
function saveTrainSchemaFromUI(){ if(roGuard())return; const days=[...document.querySelectorAll('.tsday:checked')].map(c=>parseInt(c.value)); const from=document.getElementById('ts_from').value; const to=document.getElementById('ts_to').value; const ort=document.getElementById('ts_ort').value; setTrainSchema({days,from,to,ort}); showSavedToast('✓ Standard gespeichert'); renderTrainings(); }

function removeGroup(id,gi){ if(roGuard())return; const t=getTraining(id); if(!t)return; t.groups.splice(gi,1); persistTraining(id); renderTrainings(); }
function renameGroup(id,gi,val){ if(roGuard())return; const t=getTraining(id); if(!t||!t.groups[gi])return; t.groups[gi].name=val; persistTraining(id); }
function toggleGroupPlayer(id,gi,pid){ if(roGuard())return; const t=getTraining(id); if(!t||!t.groups[gi])return; const arr=t.groups[gi].players||[]; const i=arr.indexOf(pid); if(i>=0)arr.splice(i,1); else arr.push(pid); t.groups[gi].players=arr; persistTraining(id); renderTrainings(); }

function trainAttCount(t){ // wie viele anwesend (aus AWK)

    <div style="font-size:9px;font-weight:800;letter-spacing:.06em;color:#c9a84c;margin-bottom:3px"><i class="ti ti-calendar-stats"></i> MAKRO-SCHWERPUNKT · KW ${w.kw} · ${esc(w.monat)}${w.label?' · '+esc(w.label):''}</div>
    <div style="font-size:12px;color:#e2e8f0;font-weight:600">${esc(parts||w.label||'—')}</div>
    ${w.impulse?`<div style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px">${esc(w.impulse)}</div>`:''}
  </div>`;
}

async function renderTrainings(){
  const mc=document.getElementById('mainContent'); if(!mc) return;
  if(!_trainingsLoaded && !_trainingsTableMissing){ await loadTrainings(); }
  if(!_attendanceLoaded && !_attendanceTableMissing){ await loadAttendance(); }
  if(_trainingsTableMissing){ mc.innerHTML=trainingsSetupHint(); return; }
  const sc=getTrainSchema();
  const logo=(typeof getTeamLogo==='function'&&getTeamLogo())?`<img src="${getTeamLogo()}" style="height:30px;border-radius:6px"/>`:'';
  const viewBtns=[['week','Woche','calendar-week'],['month','Monat','calendar-month']].map(([k,l,ic])=>`<button onclick="setTrainView('${k}')" style="font-size:11px;font-weight:700;padding:6px 12px;border-radius:7px;cursor:pointer;border:1px solid ${state.trainView===k?'rgba(201,168,76,0.5)':'rgba(255,255,255,0.12)'};background:${state.trainView===k?'rgba(201,168,76,0.18)':'rgba(255,255,255,0.04)'};color:${state.trainView===k?'#c9a84c':'rgba(255,255,255,0.55)'}"><i class="ti ti-${ic}"></i> ${l}</button>`).join('');
  const dayChk=[1,2,3,4,5,6,0].map(wd=>`<label style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:rgba(255,255,255,0.6)"><input type="checkbox" class="tsday" value="${wd}" ${sc.days.includes(wd)?'checked':''} style="accent-color:#c9a84c"/>${WD_LBL[wd]}</label>`).join('');
  const inp='font-size:11px;padding:5px 7px;background:#1e2a3a;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#e2e8f0';
  const schemaBar=`<div class="edit-only card" style="padding:10px 12px;margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <span style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:.05em">STANDARDWOCHE</span>
    ${dayChk}
    <input id="ts_from" type="time" value="${sc.from}" style="${inp}"/><span style="color:rgba(255,255,255,0.3)">–</span><input id="ts_to" type="time" value="${sc.to}" style="${inp}"/>
    <input id="ts_ort" value="${esc(sc.ort)}" placeholder="Ort" style="${inp};width:120px"/>
    <button onclick="saveTrainSchemaFromUI()" style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:5px 9px;cursor:pointer">Standard merken</button>
    <button onclick="generateStandardWeek()" style="font-size:10px;font-weight:700;color:#22c55e;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:6px;padding:5px 11px;cursor:pointer"><i class="ti ti-wand"></i> Diese Woche erzeugen</button>
  </div>`;
  const pdfBar=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
    <span style="font-size:10px;color:rgba(255,255,255,0.4);font-weight:700">PDF:</span>
    <button onclick="trainingsPDF('week')" style="${inp};cursor:pointer;color:#c9a84c"><i class="ti ti-file-download"></i> Woche</button>
    <button onclick="trainingsPDF('month')" style="${inp};cursor:pointer;color:#c9a84c">Monat</button>
    <button onclick="trainingsPDF('vor')" style="${inp};cursor:pointer;color:#c9a84c">Vorrunde</button>
    <button onclick="trainingsPDF('rueck')" style="${inp};cursor:pointer;color:#c9a84c">Rückrunde</button>
    <button onclick="trainingsPDF('all')" style="${inp};cursor:pointer;color:#c9a84c">Gesamt</button>
  </div>`;
  let bodyHTML='';
  if(state.trainView==='week'){
    const mon=mondayOf(_td(state.trainAnchor));
    bodyHTML=makroBanner(_tiso(mon));
    for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); const ds=_tiso(d);
      const dayTr=(state.trainings||[]).filter(t=>t.date===ds).sort((a,b)=>(a.time_from||'').localeCompare(b.time_from||''));
      bodyHTML+=`<div style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
          <span style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.55);width:90px">${WD_FULL[d.getDay()]} ${('0'+d.getDate()).slice(-2)}.${('0'+(d.getMonth()+1)).slice(-2)}.</span>
          <button class="edit-only" onclick="addTraining('${ds}')" style="font-size:10px;font-weight:700;color:#c9a84c;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);border-radius:6px;padding:2px 8px;cursor:pointer"><i class="ti ti-plus"></i></button>
        </div>
        ${dayTr.map(trainingCardHTML).join('')||'<div style="font-size:10px;color:rgba(255,255,255,0.25);padding-left:2px">–</div>'}
      </div>`;
    }
  } else {
    const a=_td(state.trainAnchor); const y=a.getFullYear(), mth=a.getMonth();
    let cur=mondayOf(new Date(y,mth,1)); const end=new Date(y,mth+1,0);
    while(cur<=end){
      const ws=_tiso(cur); const we=new Date(cur); we.setDate(cur.getDate()+6);
      const wkTr=(state.trainings||[]).filter(t=>{const td=_td(t.date); return td>=cur && td<=we;}).sort((x,z)=>(x.date+ (x.time_from||'')).localeCompare(z.date+(z.time_from||'')));
      const w=trainKwData(ws);
      bodyHTML+=`<div class="card" style="padding:11px 13px;margin-bottom:10px">
        <div style="font-size:10px;font-weight:800;color:#c9a84c;margin-bottom:6px">KW ${w?w.kw:isoWeek(cur)} · ${('0'+cur.getDate()).slice(-2)}.${('0'+(cur.getMonth()+1)).slice(-2)}.–${('0'+we.getDate()).slice(-2)}.${('0'+(we.getMonth()+1)).slice(-2)}.${w&&(w.ta||w.te||w.hp)?' · <span style="color:rgba(255,255,255,0.55);font-weight:600">'+esc([w.ta,w.te,w.hp].filter(Boolean).join(' · '))+'</span>':(w&&w.label?' · '+esc(w.label):'')}</div>
        ${wkTr.map(trainingCardHTML).join('')||'<div style="font-size:10px;color:rgba(255,255,255,0.25)">Keine Trainings.</div>'}
        <button class="edit-only" onclick="state.trainAnchor='${ws}';state.trainView='week';renderTrainings()" style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:4px 9px;cursor:pointer;margin-top:6px">Woche öffnen</button>
      </div>`;
      cur.setDate(cur.getDate()+7);
    }
  }
  const navLabel = state.trainView==='month' ? (_td(state.trainAnchor).toLocaleDateString('de-CH',{month:'long',year:'numeric'})) : ('KW '+isoWeek(_td(state.trainAnchor)));
  mc.innerHTML=`
    <div class="card" style="padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      ${logo}
      <div style="display:flex;gap:8px">${viewBtns}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
        <button onclick="trainNav(-1)" style="${inp};cursor:pointer"><i class="ti ti-chevron-left"></i></button>
        <span style="font-size:12px;font-weight:700;color:#e2e8f0;min-width:120px;text-align:center">${navLabel}</span>
        <button onclick="trainNav(1)" style="${inp};cursor:pointer"><i class="ti ti-chevron-right"></i></button>
        <button onclick="state.trainAnchor='${new Date().toISOString().slice(0,10)}';renderTrainings()" style="${inp};cursor:pointer">Heute</button>
      </div>
    </div>
    ${schemaBar}
    ${pdfBar}
    ${bodyHTML}`;
}
function trainingsSetupHint(){
  const sql=`create table if not exists trainings (
  id text primary key,
  date date,
  time_from text,
  time_to text,
  ort text,
  typ text,
  titel text,
  note text,
  groups jsonb default '[]'::jsonb,
  created_at timestamptz default now()
);
alter table trainings enable row level security;
create policy trainings_read on trainings for select to authenticated using (true);
create policy trainings_write on trainings for all to authenticated using ((select auth.email()) is distinct from 'tl@fe.ch') with check ((select auth.email()) is distinct from 'tl@fe.ch');`;
  return `<div class="card" style="padding:24px;max-width:700px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><i class="ti ti-database-cog" style="font-size:22px;color:#f59e0b"></i><div style="font-size:15px;font-weight:700;color:#e2e8f0">Tabelle «trainings» anlegen</div></div>
    <p style="font-size:13px;color:rgba(255,255,255,0.6);line-height:1.6;margin-bottom:12px">Einmalig in Supabase → SQL Editor ausführen, dann Seite neu laden:</p>
    <pre style="background:#0a121e;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px;font-size:11px;color:#9fb4cc;overflow:auto;white-space:pre;line-height:1.5">${esc(sql)}</pre>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button onclick="navigator.clipboard.writeText(\`${sql.replace(/`/g,'\\`')}\`).then(()=>showSavedToast('✓ SQL kopiert'))" style="padding:9px 16px;font-size:12px;font-weight:700;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);border-radius:8px;color:#c9a84c;cursor:pointer"><i class="ti ti-copy"></i> SQL kopieren</button>
      <button onclick="_trainingsTableMissing=false;_trainingsLoaded=false;renderTrainings()" style="padding:9px 16px;font-size:12px;font-weight:700;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:8px;color:#22c55e;cursor:pointer"><i class="ti ti-refresh"></i> Erneut prüfen</button>
    </div>
  </div>`;
}

function _trainScopeRange(scope){
  const a=_td(state.trainAnchor);
  if(scope==='week'){ const mon=mondayOf(a); const end=new Date(mon); end.setDate(mon.getDate()+6); return [mon,end,'KW '+isoWeek(a)]; }
  if(scope==='month'){ return [new Date(a.getFullYear(),a.getMonth(),1), new Date(a.getFullYear(),a.getMonth()+1,0), a.toLocaleDateString('de-CH',{month:'long',year:'numeric'})]; }
  if(scope==='vor'){ return [new Date(2026,6,1), new Date(2026,11,31), 'Vorrunde 2026']; }
  if(scope==='rueck'){ return [new Date(2027,0,1), new Date(2027,5,30), 'Rückrunde 2027']; }
  return [new Date(2026,6,1), new Date(2027,5,30), 'Gesamte Saison']; // all
}
function trainingsPDF(scope){
  if(typeof window.jspdf==='undefined'){ showSavedToast('PDF-Bibliothek nicht geladen',false); return; }
  const {jsPDF}=window.jspdf; const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PWp=doc.internal.pageSize.getWidth(); const ML=14; let y=14;
  const [from,to,label]=_trainScopeRange(scope);
  try{ const src=(typeof getTeamLogo==='function')?getTeamLogo():null; if(src){ const fmt=/^data:image\/png/i.test(src)?'PNG':'JPEG'; doc.addImage(src,fmt,PWp-26,8,18,18); } }catch(e){}
  doc.setFontSize(15);doc.setFont(undefined,'bold');doc.setTextColor(201,168,76); doc.text('Trainingsplan · '+label,ML,16);
  doc.setFontSize(8.5);doc.setFont(undefined,'normal');doc.setTextColor(90,100,115); doc.text('FE12 Old Boys · '+new Date().toLocaleDateString('de-CH'),ML,22);
  doc.setDrawColor(201,168,76);doc.setLineWidth(0.5);doc.line(ML,25,PWp-ML,25); y=30;
  const list=(state.trainings||[]).filter(t=>{const d=_td(t.date); return d>=from && d<=to;}).sort((a,b)=>(a.date+(a.time_from||'')).localeCompare(b.date+(b.time_from||'')));
  // nach KW gruppieren
  const byWeek={};
  list.forEach(t=>{ const mon=_tiso(mondayOf(_td(t.date))); (byWeek[mon]=byWeek[mon]||[]).push(t); });
  const ensure=(n)=>{ if(y+n>285){ doc.addPage(); y=16; } };
  const weeks=Object.keys(byWeek).sort();
  if(!weeks.length){ doc.setFontSize(10);doc.setTextColor(120,130,145); doc.text('Keine Trainings in diesem Zeitraum.',ML,y); }
  weeks.forEach(ws=>{
    const w=trainKwData(ws); ensure(16);
    doc.setFillColor(201,168,76); doc.roundedRect(ML,y,PWp-2*ML,7,1.5,1.5,'F');
    doc.setFont(undefined,'bold');doc.setFontSize(9);doc.setTextColor(255,255,255);
    doc.text('KW '+(w?w.kw:isoWeek(_td(ws)))+(w?('  ·  '+[w.ta,w.te,w.hp].filter(Boolean).join(' · ')||w.label||''):''),ML+2,y+4.8);
    y+=10;
    byWeek[ws].forEach(t=>{
      const ty=(TR_TYP[t.typ]||TR_TYP.training).label; const att=trainAttCount(t);
      const grp=(t.groups||[]).map(g=>g.name+': '+(g.players||[]).map(pid=>{const p=PLAYERS.find(z=>z.id===pid);return p?vorname(p.name):'';}).filter(Boolean).join(', ')).join('  |  ');
      ensure(14);
      doc.setFont(undefined,'bold');doc.setFontSize(9);doc.setTextColor(30,41,59);
      doc.text(trainDateLabel(t.date)+'  '+(t.time_from||'')+(t.time_to?'–'+t.time_to:'')+'  ·  '+ty+(t.ort?'  ·  '+t.ort:'')+(t.titel?'  ·  '+t.titel:''),ML,y); y+=4.5;
      if(att.tot){ doc.setFont(undefined,'normal');doc.setFontSize(8);doc.setTextColor(34,150,80); doc.text('Anwesend: '+att.p+'/'+att.tot,ML+2,y); y+=4; }
      if(t.note){ doc.setFont(undefined,'normal');doc.setFontSize(8);doc.setTextColor(90,100,115); const ls=doc.splitTextToSize('Inhalt: '+t.note,PWp-2*ML-4); ensure(ls.length*3.6); doc.text(ls,ML+2,y); y+=ls.length*3.6+1; }
      if(grp){ doc.setFont(undefined,'normal');doc.setFontSize(8);doc.setTextColor(120,90,30); const ls=doc.splitTextToSize('Gruppen: '+grp,PWp-2*ML-4); ensure(ls.length*3.6); doc.text(ls,ML+2,y); y+=ls.length*3.6+1; }
      y+=2;
    });
    y+=3;
  });
  doc.save('FE12_Trainingsplan_'+scope+'_'+new Date().toISOString().slice(0,10)+'.pdf');
}
