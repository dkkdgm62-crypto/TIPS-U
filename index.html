// ANWESENHEIT (Training & Spiel) + EINSÄTZE / FAIRNESS
// Speicherung in Supabase-Tabelle "attendance"
// ═══════════════════════════════════════════════════
state.attendance = state.attendance || {};      // key -> {player_id,date,type,status}
state.attDate = state.attDate || new Date().toISOString().slice(0,10);
state.attType = state.attType || 'training';
let _attendanceTableMissing = false;
let _attendanceLoaded = false;
let _attSaveTimers = {};
const ATT_STATUS = {
  present:{label:'Anwesend',color:'#22c55e',ic:'check'},
  late:{label:'Verspätet',color:'#f59e0b',ic:'clock'},
  excused:{label:'Entschuldigt',color:'#818cf8',ic:'mail'},
  absent:{label:'Abwesend',color:'#ef4444',ic:'x'},
};
state.attMatchId = state.attMatchId || null;
// Session-Schlüssel: Spiel → an Match-ID gebunden (mehrere Spiele am selben Tag möglich, z.B. Turnier); Training → an Datum gebunden
function currentSession(){
  if(state.attType==='match'){
    const m=getMatch(state.attMatchId);
    return {skey:'M_'+state.attMatchId, date:(m&&m.match_date)||state.attDate, type:'match', valid:!!m, match:m};
  }
  if(state.attTrainId){
    const t=(typeof getTraining==='function')?getTraining(state.attTrainId):null;
    if(t) return {skey:'TR_'+state.attTrainId, date:t.date||state.attDate, type:'training', valid:true, match:null, training:t};
  }
  return {skey:'T_'+state.attDate, date:state.attDate, type:'training', valid:!!state.attDate, match:null};
}
function attKeyFor(pid){ return currentSession().skey+'_'+pid; }

async function loadAttendance(){
  try{
    const {data,error}=await sb.from('attendance').select('*');
    if(error){
      if((error.code==='42P01')||/relation .*attendance.* does not exist/i.test(error.message||'')) _attendanceTableMissing=true;
      state.attendance={}; return;
    }
    _attendanceTableMissing=false;
    const map={};
    (data||[]).forEach(r=>{ map[r.id]={id:r.id,player_id:r.player_id,date:r.date,type:r.type,status:r.status}; });
    state.attendance=map; _attendanceLoaded=true;
  }catch(e){ console.error('loadAttendance',e); state.attendance={}; }
}
function setAttendance(pid,status){
  if(roGuard()) return;
  const s=currentSession(); if(!s.valid) return;
  const key=s.skey+'_'+pid;
  const cur=state.attendance[key];
  if(cur && cur.status===status){ delete state.attendance[key]; _attDelete(key); }
  else { state.attendance[key]={id:key,player_id:pid,date:s.date,type:s.type,status}; _attSave(key,pid,s.date,s.type,status); }
  renderAnwesenheit();
}
function _attSave(key,pid,date,type,status){
  clearTimeout(_attSaveTimers[key]);
  _attSaveTimers[key]=setTimeout(async()=>{
    try{
      const {error}=await sb.from('attendance').upsert({id:key,player_id:pid,date:date||null,type,status},{onConflict:'id'});
      if(error){ console.error('attendance save',error); showSavedToast('Anwesenheit speichern fehlgeschlagen – Tabelle prüfen',false); return; }
      if(typeof logActivity==='function'){ const p=PLAYERS.find(x=>x.id===pid); logActivity(pid,'meta','Anwesenheit '+(type==='training'?'Training':'Spiel')+' '+(date||'')+': '+(ATT_STATUS[status]?ATT_STATUS[status].label:status),null,null,'attendance','',p?p.name:''); }
    }catch(e){ console.error('attendance save',e); }
  },300);
}
function _attDelete(key){
  clearTimeout(_attSaveTimers[key]);
  _attSaveTimers[key]=setTimeout(async()=>{ try{ await sb.from('attendance').delete().eq('id',key); }catch(e){ console.error('attendance del',e); } },300);
}
function setAttDate(v){ state.attDate=v; renderAnwesenheit(); }
function setAttType(v){ state.attType=v; renderAnwesenheit(); }
function setEinsComp(v){ state.einsComp=v; renderAnwesenheit(); }
function setEinsPhase(v){ state.einsPhase=v; renderAnwesenheit(); }
function setAttMatch(id){ const m=getMatch(id); state.attMatchId=id; if(m&&m.match_date) state.attDate=m.match_date; renderAnwesenheit(); }
function setAttTrain(id){ state.attTrainId=id; const t=(typeof getTraining==='function')?getTraining(id):null; if(t&&t.date) state.attDate=t.date; renderAnwesenheit(); }
function setAttEvent(val){
  if(!val) return;
  if(val.slice(0,3)==='TR_'){ const id=val.slice(3); state.attType='training'; state.attTrainId=id; const t=(typeof getTraining==='function')?getTraining(id):null; if(t&&t.date) state.attDate=t.date; }
  else if(val.slice(0,2)==='M_'){ const id=val.slice(2); state.attType='match'; state.attMatchId=id; const m=getMatch(id); if(m&&m.match_date) state.attDate=m.match_date; }
  renderAnwesenheit();
}
function markAllPresent(){
  if(roGuard()) return;
  const s=currentSession(); if(!s.valid){ showSavedToast('Bitte zuerst ein Spiel/Datum wählen',false); return; }
  PLAYERS.forEach(p=>{ const key=s.skey+'_'+p.id; state.attendance[key]={id:key,player_id:p.id,date:s.date,type:s.type,status:'present'}; _attSave(key,p.id,s.date,s.type,'present'); });
  renderAnwesenheit();
}

// Anwesenheits-Quote je Spieler: gespeicherte Einträge + automatisch Anwesend bei Spiel-Aufstellung (manuell hat Vorrang)
function attendanceStats(){
  const per={}; PLAYERS.forEach(p=>per[p.id]={present:0,total:0});
  const handled=new Set(); // manuell gesetzte Spiel-Anwesenheit: matchId_pid
  Object.entries(state.attendance).forEach(([key,r])=>{
    if(!per[r.player_id]) per[r.player_id]={present:0,total:0};
    if(r.type==='match'){ const mid=key.slice(2, key.lastIndexOf('_')); handled.add(mid+'_'+r.player_id); }
    if(r.status==='excused') return;            // entschuldigt zählt nicht gegen die Quote
    per[r.player_id].total++;
    if(r.status==='present'||r.status==='late') per[r.player_id].present++;
  });
  // Automatisch anwesend: jeder aufgestellte Spieler eines Spiels (sofern nicht manuell überschrieben)
  (state.matches||[]).forEach(m=>{
    matchLineupIds(m).forEach(pid=>{
      if(handled.has(m.id+'_'+pid)) return;
      const k=parseInt(pid); if(!per[k]) per[k]={present:0,total:0};
      per[k].total++; per[k].present++;
    });
  });
  return per;
}
// Einsätze aus den Aufstellungen (gespielte Spiele): Halbzeit-Einsätze je Spieler
function playingStats(){
  const per={}; PLAYERS.forEach(p=>per[p.id]={halves:0,matches:0});
  (state.matches||[]).forEach(m=>{
    if(m.status!=='played') return;
    if(!Array.isArray(m.halves)) return;
    const inMatch=new Set();
    m.halves.forEach(hz=>{
      const ids=new Set();
      ['a','b'].forEach(fk=>{ const o=(hz&&hz[fk]&&hz[fk].lineup)||{}; Object.values(o).forEach(pid=>ids.add(String(pid))); });
      ids.forEach(pid=>{ if(per[pid]){ per[pid].halves++; inMatch.add(pid); } });
    });
    inMatch.forEach(pid=>{ if(per[pid]) per[pid].matches++; });
  });
  return per;
}

// Sitzungen nach Datum ordnen: heute/kommend (nächstliegend zuerst), dann vergangen (neueste zuerst)
function _awkOrder(items,getDate){
  const today=new Date().toISOString().slice(0,10);
  const up=items.filter(x=>(getDate(x)||'')>=today).sort((a,b)=>(getDate(a)||'').localeCompare(getDate(b)||''));
  const past=items.filter(x=>(getDate(x)||'')<today).sort((a,b)=>(getDate(b)||'').localeCompare(getDate(a)||''));
  return {up,past};
}
async function renderAnwesenheit(){
  const mc=document.getElementById('mainContent'); if(!mc) return;
  if(!_attendanceLoaded && !_attendanceTableMissing){ await loadAttendance(); }
  if(!_trainingsLoaded && !_trainingsTableMissing){ await loadTrainings(); }
  if(state.matches.length===0 && !_matchesTableMissing){ await loadMatches(); }
  if(_attendanceTableMissing){ mc.innerHTML=attendanceSetupHint(); return; }

  let type=state.attType;
  const inputStyle='padding:8px 11px;background:#1e2a3a;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;font-size:13px';
  // Sitzungen geordnet (heute/kommend zuerst), Standard = nächstliegende
  // Kombinierte Terminliste: Spiele + Trainings in EINER chronologischen Liste
  const _evMatches=(state.matches||[]).map(m=>({kind:'match',id:m.id,date:m.match_date||'',time:m.match_time||'',label:(m.opponent||'Gegner offen')+(m.competition?' · '+m.competition:'')}));
  const _evTrains=(state.trainings||[]).map(t=>({kind:'training',id:t.id,date:t.date||'',time:t.time_from||'',label:((TR_TYP[t.typ]||TR_TYP.training).label)+(t.titel?' · '+t.titel:'')}));
  const evOrd=_awkOrder(_evMatches.concat(_evTrains), e=>e.date);
  const _hasMatch=(state.matches||[]).some(x=>x.id===state.attMatchId);
  const _hasTrain=(state.trainings||[]).some(x=>x.id===state.attTrainId);
  const _validSel=(state.attType==='match'&&_hasMatch)||(state.attType==='training'&&_hasTrain);
  if(!_validSel && (evOrd.up.length||evOrd.past.length)){
    const def=evOrd.up[0]||evOrd.past[0];
    state.attType=def.kind;
    if(def.kind==='match'){ state.attMatchId=def.id; } else { state.attTrainId=def.id; }
    if(def.date) state.attDate=def.date;
  }
  const sess=currentSession();
  type=sess.type;
  const date=sess.date;

  // EINE kombinierte Terminliste (Spiele + Trainings), chronologisch geordnet
  let sessionCtrl='';
  if(evOrd.up.length||evOrd.past.length){
    const optE=e=>{ const d=e.kind==='match'?matchDateLabel(e.date):trainDateLabel(e.date); const tag=e.kind==='match'?'Spiel':'Training'; const lbl=d+(e.time?' '+e.time:'')+' · '+tag+' · '+e.label; const val=(e.kind==='match'?'M_':'TR_')+e.id; const sel=(e.kind==='match'?(state.attType==='match'&&e.id===state.attMatchId):(state.attType==='training'&&e.id===state.attTrainId)); return `<option value="${val}" ${sel?'selected':''}>${esc(lbl)}</option>`; };
    const grp=(l,a)=>a.length?`<optgroup label="${l}">${a.map(optE).join('')}</optgroup>`:'';
    sessionCtrl=`<select onchange="setAttEvent(this.value)" style="${inputStyle};min-width:260px;flex:1">${grp('Heute & kommend',evOrd.up)}${grp('Vergangen',evOrd.past)}</select>`;
  } else {
    sessionCtrl=`<span style="font-size:12px;color:rgba(255,255,255,0.45)"><i class="ti ti-info-circle"></i> Noch keine Termine – Spiele/Trainings in den jeweiligen Bereichen anlegen.</span>`;
  }

  // Erfassung
  const autoIds = (type==='match' && sess.match) ? matchLineupIds(sess.match) : new Set();
  const rows=trainPlayerOrder().map(p=>{
    const manual=state.attendance[sess.skey+'_'+p.id];
    const auto = !manual && autoIds.has(String(p.id));
    const cur = manual || (auto?{status:'present'}:null);
    const btns=Object.entries(ATT_STATUS).map(([k,info])=>{
      const on=cur&&cur.status===k;
      return `<button onclick="setAttendance(${p.id},'${k}')" title="${info.label}" style="width:30px;height:30px;border-radius:7px;cursor:pointer;border:1px solid ${on?info.color:'rgba(255,255,255,0.1)'};background:${on?info.color+'2e':'rgba(255,255,255,0.04)'};color:${on?info.color:'rgba(255,255,255,0.4)'};display:inline-flex;align-items:center;justify-content:center"><i class="ti ti-${info.ic}" style="font-size:15px"></i></button>`;
    }).join('');
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
      <div style="width:26px;height:26px;border-radius:50%;background:rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#c9a84c;flex-shrink:0">${initials(p.name)}</div>
      <span style="flex:1;font-size:12.5px;color:#e2e8f0;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}${p.tw?' <span style="font-size:8px;color:#3b82f6;font-weight:800">TW</span>':''}${auto?' <span style="font-size:8px;color:#22c55e;font-weight:700">• aufgestellt</span>':''}</span>
      <div class="edit-only" style="display:flex;gap:5px">${btns}</div>
      ${window.IS_READONLY?`<span style="font-size:11px;font-weight:700;color:${cur?ATT_STATUS[cur.status].color:'rgba(255,255,255,0.3)'}">${cur?ATT_STATUS[cur.status].label:'—'}</span>`:''}
    </div>`;
  }).join('');

  // Quoten-Zusammenfassung
  const as=attendanceStats();
  const sumRows=PLAYERS.map(p=>{
    const s=as[p.id]||{present:0,total:0};
    const rate=s.total?Math.round(s.present/s.total*100):0;
    const col=rate>=80?'#22c55e':rate>=60?'#f59e0b':(s.total?'#ef4444':'rgba(255,255,255,0.3)');
    return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
      <span style="flex:1;font-size:12px;color:#e2e8f0;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</span>
      <div style="flex:0 0 110px;height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden"><div style="height:100%;width:${rate}%;background:${col}"></div></div>
      <span style="font-size:11px;font-weight:700;color:${col};width:38px;text-align:right">${s.total?rate+'%':'—'}</span>
      <span style="font-size:10px;color:rgba(255,255,255,0.35);width:54px;text-align:right">${s.present}/${s.total}</span>
    </div>`;
  }).join('');

  // Einsätze / Spielzeit / Positionen (mit Filter Wettbewerb + Zeitraum)
  state.einsComp = state.einsComp||'all';
  state.einsPhase = state.einsPhase||'all';
  const agg=aggMatchStats({comp:state.einsComp,phase:state.einsPhase});

function exportStatsPDF(){

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const PWp=doc.internal.pageSize.getWidth();
  try{ const src=(typeof getTeamLogo==='function')?getTeamLogo():null; if(src){ const fmt=/^data:image\/png/i.test(src)?'PNG':'JPEG'; doc.addImage(src,fmt,PWp-26,8,18,18); } }catch(e){}
  doc.setFontSize(15);doc.setFont(undefined,'bold');doc.setTextColor(201,168,76);
  doc.text('Anwesenheit & Statistik',14,16);
  const compL = (state.einsComp==='all'||!state.einsComp)?'Alle Wettbewerbe':state.einsComp;
  const phaseL = state.einsPhase==='vor'?'Vorrunde':(state.einsPhase==='rueck'?'Rückrunde':'Saison gesamt');
  doc.setFontSize(9);doc.setFont(undefined,'normal');doc.setTextColor(90,100,115);
  doc.text('FE12 Old Boys · '+compL+' · '+phaseL+' · '+new Date().toLocaleDateString('de-CH'),14,23);
  doc.setDrawColor(201,168,76);doc.setLineWidth(0.5);doc.line(14,27,PWp-14,27);
  const as=attendanceStats();
  const agg=aggMatchStats({comp:state.einsComp,phase:state.einsPhase});
  const body=PLAYERS.slice().sort((a,b)=>((agg[String(b.id)]?agg[String(b.id)].minutes:0)-(agg[String(a.id)]?agg[String(a.id)].minutes:0))).map(p=>{
    const a=as[p.id]||{present:0,total:0}; const s=agg[String(p.id)]||{minutes:0,matches:0,pos:{},goals:0,assists:0};
    const rate=a.total?Math.round(a.present/a.total*100)+'% ('+a.present+'/'+a.total+')':'—';
    return [p.nr, p.name, rate, String(s.matches||0), (s.minutes||0)+' Min', posSummary(s.pos), String(s.goals||0), String(s.assists||0)];
  });
  doc.autoTable({startY:31,head:[['#','Spieler','Anwesend','Spiele','Spielzeit','Positionen','Tore','Assists']],body,theme:'striped',
    styles:{fontSize:8.5,cellPadding:2,textColor:[40,48,60]},
    headStyles:{fillColor:[201,168,76],textColor:[255,255,255],fontStyle:'bold'},
    columnStyles:{0:{cellWidth:10,halign:'center'},1:{cellWidth:44},2:{cellWidth:36},3:{cellWidth:16,halign:'center'},4:{cellWidth:22,halign:'right'},5:{cellWidth:'auto'},6:{cellWidth:14,halign:'center'},7:{cellWidth:16,halign:'center'}},
    margin:{left:14,right:14}});
  doc.save('FE12_Anwesenheit_Statistik_'+new Date().toISOString().slice(0,10)+'.pdf');
}

function _td(s){ return new Date(s+'T00:00:00'); }
function _tiso(d){ const x=new Date(d); x.setHours(12,0,0,0); return x.toISOString().slice(0,10); }
function isoWeek(d){ const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=(dt.getUTCDay()+6)%7; dt.setUTCDate(dt.getUTCDate()-day+3); const f=new Date(Date.UTC(dt.getUTCFullYear(),0,4)); const fd=(f.getUTCDay()+6)%7; f.setUTCDate(f.getUTCDate()-fd+3); return 1+Math.round((dt-f)/(7*864e5)); }
function mondayOf(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function trainKwData(dateStr){ const d=_td(dateStr); const kw=isoWeek(d); const arr=(d.getMonth()>=6)?MAKRO.vorrunde:MAKRO.rueckrunde; return arr.find(w=>w.kw===kw)||null; }
function trainDateLabel(ds){ const d=_td(ds); return WD_LBL[d.getDay()]+' '+('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'; }

async function loadTrainings(){
  try{
    const {data,error}=await sb.from('trainings').select('*');
    if(error){ if(error.code==='42P01'||/relation .*trainings.* does not exist/i.test(error.message||'')) _trainingsTableMissing=true; state.trainings=[]; return; }
    _trainingsTableMissing=false;
    state.trainings=(data||[]).map(t=>({id:t.id,date:t.date||'',time_from:t.time_from||'',time_to:t.time_to||'',ort:t.ort||'',typ:t.typ||'training',titel:t.titel||'',note:t.note||'',groups:Array.isArray(t.groups)?t.groups:(t.groups?JSON.parse(t.groups):[])}));
    _trainingsLoaded=true;
  }catch(e){ console.error('loadTrainings',e); state.trainings=[]; }
}
function getTraining(id){ return (state.trainings||[]).find(t=>t.id===id); }
function trainPayload(t){ return {id:t.id,date:t.date||null,time_from:t.time_from||'',time_to:t.time_to||'',ort:t.ort||'',typ:t.typ||'training',titel:t.titel||'',note:t.note||'',groups:t.groups||[]}; }
async function _trainUpsert(t){
  let pl={...trainPayload(t)}, tries=0, dropped=[];
  while(tries++<12){ const {error}=await sb.from('trainings').upsert(pl,{onConflict:'id'}); if(!error) return {error:null,dropped};
    const mm=(error.message||'').match(/Could not find the '([^']+)' column/i);
    if(error.code==='PGRST204'&&mm&&Object.prototype.hasOwnProperty.call(pl,mm[1])){ dropped.push(mm[1]); delete pl[mm[1]]; continue; }
    return {error,dropped}; }
  return {error:{message:'zu viele fehlende Spalten'},dropped};
}
function persistTraining(id){ if(window.IS_READONLY) return; const t=getTraining(id); if(!t) return;
  clearTimeout(_trainSaveTimers[id]); _trainSaveTimers[id]=setTimeout(async()=>{ const {error}=await _trainUpsert(t); if(error){ console.error('persistTraining',error); showSavedToast('Training speichern fehlgeschlagen: '+(error.message||error.code||'?'),false); } },300); }

function closeCreateTrainingModal() {
  const m = document.getElementById('createTrainingModal');
  if (m) m.remove();
}

function setCreateTrainingMode(mode) {
  const isSingle = mode === 'single';
  document.getElementById('ct_single_date_container').style.display = isSingle ? 'block' : 'none';
  document.getElementById('ct_block_date_container').style.display = isSingle ? 'none' : 'block';
  
  const btnSingle = document.getElementById('ct_mode_single');
  const btnBlock = document.getElementById('ct_mode_block');
  
  if (isSingle) {
    btnSingle.style.background = '#3b82f6';
    btnSingle.style.color = '#fff';
    btnBlock.style.background = 'transparent';
    btnBlock.style.color = 'rgba(255,255,255,0.6)';
  } else {
    btnBlock.style.background = '#3b82f6';
    btnBlock.style.color = '#fff';
    btnSingle.style.background = 'transparent';
    btnSingle.style.color = 'rgba(255,255,255,0.6)';
  }
  
  const modal = document.getElementById('createTrainingModal');
  if (modal) modal.dataset.mode = mode;
}

async function submitCreateTrainingModal() {
  if (roGuard()) return;
  const modal = document.getElementById('createTrainingModal');
  if (!modal) return;
  const mode = modal.dataset.mode || 'single';
  
  const tf = document.getElementById('ct_time_from').value;
  const tt = document.getElementById('ct_time_to').value;
  const ort = document.getElementById('ct_ort').value.trim();
  const typ = document.getElementById('ct_typ').value;
  const titel = document.getElementById('ct_titel').value.trim();
  const note = document.getElementById('ct_note').value.trim();
  
  const createdIds = [];
  
  if (mode === 'single') {
    const dateStr = document.getElementById('ct_date').value;
    if (!dateStr) { alert('Bitte ein Datum auswählen.'); return; }
    
    const t = {
      id: newTrainId(),
      date: dateStr,
      time_from: tf,
      time_to: tt,
      ort: ort,
      typ: typ,
      titel: titel,
      note: note,
      groups: []
    };
    state.trainings.push(t);
    persistTraining(t.id);
    createdIds.push(t.id);
  } else {
    const ds = document.getElementById('ct_date_start').value;
    const de = document.getElementById('ct_date_end').value;
    if (!ds || !de) { alert('Bitte Start- und Enddatum auswählen.'); return; }
    
    const parseLocalDate = (s) => {
      const parts = s.split('-');
      return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]), 12, 0, 0);
    };
    const start = parseLocalDate(ds);
    const end = parseLocalDate(de);
    if (start > end) { alert('Startdatum darf nicht nach Enddatum liegen.'); return; }
    
    const checkedWeekdays = Array.from(document.querySelectorAll('.ct-weekday:checked')).map(el => parseInt(el.value));
    if (!checkedWeekdays.length) { alert('Bitte mindestens einen Wochentag auswählen.'); return; }
    
    let current = new Date(start);
    while (current <= end) {
      const day = current.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
      if (checkedWeekdays.includes(day)) {
        const dateStr = current.getFullYear() + '-' + 
                        String(current.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(current.getDate()).padStart(2, '0');
        const t = {
          id: newTrainId(),
          date: dateStr,
          time_from: tf,
          time_to: tt,
          ort: ort,
          typ: typ,
          titel: titel,
          note: note,
          groups: []
        };
        state.trainings.push(t);
        persistTraining(t.id);
        createdIds.push(t.id);
      }
      current.setDate(current.getDate() + 1);
    }
  }
  
  if (createdIds.length === 0) {
    alert('Kein Training erstellt. Bitte überprüfen Sie, ob die ausgewählten Wochentage in den Datumsbereich fallen.');
    return;
  }
  
  closeCreateTrainingModal();
  
  if (createdIds.length === 1) {
    state.trainEditId = createdIds[0];
    state.trainAnchor = state.trainings.find(x => x.id === createdIds[0]).date;
  } else {
    state.trainEditId = null;
    const firstT = state.trainings.find(x => x.id === createdIds[0]);
    if (firstT && firstT.date) state.trainAnchor = firstT.date;
  }
  
  showSavedToast('✓ ' + createdIds.length + ' Training(s) erstellt');
  showView('trainings');
  renderTrainings();
  
  if (state.view === 'termine') {
    renderTermine();
  }
}

function _minOf(s){ if(!s||!/^\d{1,2}:\d{2}$/.test(s))return null; const [h,m]=s.split(':').map(Number); return h*60+m; }
function _durH(t){ const a=_minOf(t.time_from),b=_minOf(t.time_to); return (a!=null&&b!=null&&b>a)?(b-a):0; }

function getLehreMatchForDate(dateStr) {
  const w = trainKwData(dateStr);
  if (!w) return null;

  const text = `${w.ta || ''} ${w.te || ''} ${w.hp || ''} ${w.impulse || ''} ${w.label || ''}`.toLowerCase();
  const matchedPhases = [];
  const matchedZones = [];

  // Phase matching
  if (
    (text.includes('haben') && !text.includes('nicht haben')) ||
    text.includes('aufbauen') ||
    text.includes('aufbau') ||
    text.includes('bestimmen') ||
    text.includes('angreifen') ||
    text.includes('ballbesitz') ||
    text.includes('offensiv') ||
    text.includes('tore erzielen') ||
    text.includes('angriff abschliessen')
  ) {
    matchedPhases.push('haben');
  }
  if (
    text.includes('verlieren') ||
    text.includes('off-def') ||
    text.includes('umschalten off-def') ||
    text.includes('gegenpressing') ||
    text.includes('gegenangriff bremsen')
  ) {
    matchedPhases.push('verlieren');
  }
  if (
    text.includes('nicht haben') ||
    text.includes('block') ||
    text.includes('verteidigen') ||
    text.includes('defensiv') ||
    text.includes('gegentor verhindern') ||
    text.includes('tief verteidigen') ||
    text.includes('gegner kontrollieren') ||
    text.includes('hoch verteidigen')
  ) {
    matchedPhases.push('habennicht');
  }
  if (
    text.includes('erobern') ||
    text.includes('def-off') ||
    text.includes('umschalten def-off') ||
    text.includes('ballgewinn') ||
    text.includes('nach vorne spielen') ||
    text.includes('in die zone 3 spielen') ||
    text.includes('tor erzielen')
  ) {
    matchedPhases.push('erobern');
  }

  // Fallbacks for general training terms
  if (matchedPhases.length === 0) {
    if (text.includes('angriff') || text.includes('off')) {
      matchedPhases.push('haben');
    } else if (text.includes('def') || text.includes('schützen') || text.includes('sichern') || text.includes('block')) {
      matchedPhases.push('habennicht');
    }
  }

  // Zone matching
  const keywordsZ1 = ['z1', 'zone 1', 'aufbau', 'aufbauen', 'tief verteidigen', 'tor verteidigen', 'nach vorne spielen', 'innenverteidiger'];
  const keywordsZ2 = ['z2', 'zone 2', 'bestimmen', 'mittelfeld', 'gegner kontrollieren', 'gegenangriff bremsen', 'in die zone 3 spielen', 'angreifen'];
  const keywordsZ3 = ['z3', 'zone 3', 'erzielen', 'abschliessen', 'box', 'torschuss', 'tore erzielen', 'gegenpressing', 'hoch verteidigen', 'stürmer', '1:1 in der box'];

  if (keywordsZ1.some(k => text.includes(k))) matchedZones.push(1);
  if (keywordsZ2.some(k => text.includes(k))) matchedZones.push(2);
  if (keywordsZ3.some(k => text.includes(k))) matchedZones.push(3);

  if (matchedZones.length === 0) {
    matchedZones.push(1, 2, 3);
  }

  return {
    kw: w.kw,
    phases: matchedPhases,
    zones: matchedZones
  };
}

  // Werkzeuge-Panel (Standardwoche + PDF) – einklappbar
  const dayChk=[1,2,3,4,5,6,0].map(wd=>`<label style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:5px 9px;cursor:pointer"><input type="checkbox" class="tsday" value="${wd}" ${sc.days.includes(wd)?'checked':''} style="accent-color:#c9a84c;margin:0;cursor:pointer"/>${WD_LBL[wd]}</label>`).join('');
  const pdfBtns=[['week','Diese Woche'],['month','Monat'],['vor','Vorrunde'],['rueck','Rückrunde'],['all','Gesamt']].map(([s,l])=>`<button onclick="trainingsPDF('${s}')" style="${inp};cursor:pointer;color:#c9a84c;font-weight:700"><i class="ti ti-file-download"></i> ${l}</button>`).join('');
  const toolsPanel=state.trainCfgOpen?`<div class="card" style="padding:13px 15px;margin-bottom:14px">
    <div class="edit-only">
      <div style="font-size:9px;font-weight:800;letter-spacing:.06em;color:rgba(255,255,255,0.4);margin-bottom:9px">STANDARDWOCHE · AUTOMATISCH ANLEGEN</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:11px">
        ${dayChk}
        <span style="margin-left:8px;font-size:10px;color:rgba(255,255,255,0.4);font-weight:700">ZEIT</span>
        <input id="ts_from" type="time" value="${sc.from}" style="${inp}"/><span style="color:rgba(255,255,255,0.3)">–</span><input id="ts_to" type="time" value="${sc.to}" style="${inp}"/>
        <input id="ts_ort" value="${esc(sc.ort)}" placeholder="Ort" style="${inp};width:130px"/>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        <button onclick="saveTrainSchemaFromUI()" style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.65);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 12px;cursor:pointer">Als Standard merken</button>
        <button onclick="generateStandardWeek()" style="font-size:11.5px;font-weight:800;color:#22c55e;background:rgba(34,197,94,0.13);border:1px solid rgba(34,197,94,0.32);border-radius:8px;padding:7px 14px;cursor:pointer"><i class="ti ti-wand"></i> Diese Woche anlegen</button>
      </div>
      <div style="height:1px;background:rgba(255,255,255,0.07);margin-bottom:13px"></div>
    </div>
    <div style="font-size:9px;font-weight:800;letter-spacing:.06em;color:rgba(255,255,255,0.4);margin-bottom:9px">PDF EXPORTIEREN</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">${pdfBtns}</div>
  </div>`:'';

  // Inhalt
  let bodyHTML='';
  if(state.trainView==='week'){
    const mon=mondayOf(_td(state.trainAnchor)); const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    const weekTr=(state.trainings||[]).filter(t=>{const td=_td(t.date); return td>=mon && td<=sun;});
    const totMin=weekTr.reduce((s,t)=>s+_durH(t),0); const hh=totMin/60;
    const hStr=totMin?(' · '+(Number.isInteger(hh)?hh:hh.toFixed(1).replace('.',','))+' h'):'';
    bodyHTML=makroBanner(_tiso(mon));
    bodyHTML+=`<div style="font-size:10.5px;color:rgba(255,255,255,0.42);font-weight:600;margin:-6px 2px 12px"><i class="ti ti-clock-hour-4"></i> ${weekTr.length} Training${weekTr.length===1?'':'s'}${hStr} diese Woche</div>`;
    if(!weekTr.length && getTrainSchema().days.length){
      bodyHTML+=`<div class="edit-only" style="border:1px dashed rgba(201,168,76,0.35);border-radius:12px;padding:15px;margin-bottom:14px;text-align:center;background:rgba(201,168,76,0.03)">
        <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:10px">Diese Woche hat noch keine Trainings.</div>
        <button onclick="generateStandardWeek()" style="font-size:12px;font-weight:800;color:#22c55e;background:rgba(34,197,94,0.13);border:1px solid rgba(34,197,94,0.32);border-radius:9px;padding:9px 18px;cursor:pointer"><i class="ti ti-wand"></i> Standardwoche übernehmen</button>
      </div>`;
    }
    for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); const ds=_tiso(d); const isT=ds===todayIso;
      const dayTr=(state.trainings||[]).filter(t=>t.date===ds).sort((a,b)=>(a.time_from||'').localeCompare(b.time_from||''));
      bodyHTML+=`<div style="margin-bottom:11px">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:6px">
          <span style="font-size:11.5px;font-weight:800;color:${isT?'#c9a84c':'rgba(255,255,255,0.6)'}">${WD_FULL[d.getDay()]} ${('0'+d.getDate()).slice(-2)}.${('0'+(d.getMonth()+1)).slice(-2)}.</span>
          ${isT?'<span style="font-size:8.5px;font-weight:800;background:rgba(201,168,76,0.2);color:#c9a84c;border-radius:5px;padding:2px 6px;letter-spacing:.04em">HEUTE</span>':''}
          <div style="flex:1;height:1px;background:rgba(255,255,255,0.06)"></div>
          <button class="edit-only" onclick="addTraining('${ds}')" style="font-size:10px;font-weight:700;color:#c9a84c;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.22);border-radius:7px;padding:4px 10px;cursor:pointer"><i class="ti ti-plus"></i> Training</button>
        </div>
        ${dayTr.length?dayTr.map(trainingCardHTML).join(''):'<div style="font-size:10px;color:rgba(255,255,255,0.22);padding:1px 2px 3px">— frei —</div>'}
      </div>`;
    }
  } else {
    const a=_td(state.trainAnchor); const y=a.getFullYear(), mth=a.getMonth();
    let cur=mondayOf(new Date(y,mth,1)); const end=new Date(y,mth+1,0);
    while(cur<=end){
      const ws=_tiso(cur); const we=new Date(cur); we.setDate(cur.getDate()+6);
      const wkTr=(state.trainings||[]).filter(t=>{const td=_td(t.date); return td>=cur && td<=we;}).sort((x,z)=>(x.date+(x.time_from||'')).localeCompare(z.date+(z.time_from||'')));
      const w=trainKwData(ws); const sw=[w&&w.ta,w&&w.te,w&&w.hp].filter(Boolean).join(' · ');
      bodyHTML+=`<div class="card" style="padding:12px 14px;margin-bottom:11px">
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap">
          <span style="font-size:11px;font-weight:800;color:#c9a84c">KW ${w?w.kw:isoWeek(cur)}</span>
          <span style="font-size:10px;color:rgba(255,255,255,0.4)">${('0'+cur.getDate()).slice(-2)}.${('0'+(cur.getMonth()+1)).slice(-2)}.–${('0'+we.getDate()).slice(-2)}.${('0'+(we.getMonth()+1)).slice(-2)}.</span>
          ${sw?`<span style="font-size:10px;color:rgba(255,255,255,0.55);font-weight:600">· ${esc(sw)}</span>`:''}
        </div>
        ${wkTr.length?wkTr.map(trainingCardHTML).join(''):'<div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:6px">Keine Trainings.</div>'}
        <button class="edit-only" onclick="state.trainAnchor='${ws}';state.trainView='week';renderTrainings()" style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:5px 10px;cursor:pointer;margin-top:4px"><i class="ti ti-arrow-right"></i> Woche öffnen</button>
      </div>`;
      cur.setDate(cur.getDate()+7);
    }
  }

  // Nav-Label
  let navLabel;
  if(state.trainView==='month'){ navLabel=_td(state.trainAnchor).toLocaleDateString('de-CH',{month:'long',year:'numeric'}); }
  else { const m=mondayOf(_td(state.trainAnchor)); const s=new Date(m); s.setDate(m.getDate()+6); navLabel='KW '+isoWeek(m)+' · '+m.getDate()+'.–'+s.getDate()+'. '+s.toLocaleDateString('de-CH',{month:'short'}); }

  mc.innerHTML=`
    <div style="margin-bottom:12px"><button onclick="state.trainEditId=null;showView('termine')" style="display:flex;align-items:center;gap:5px;font-size:13px;color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 14px;cursor:pointer"><i class="ti ti-arrow-left"></i> Zurück zu Termine</button></div>
    <div class="card" style="padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      ${logo}
      <div style="display:flex;gap:8px">${viewBtns}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
        <button onclick="trainNav(-1)" style="${navBtn}"><i class="ti ti-chevron-left"></i></button>
        <span style="font-size:12px;font-weight:700;color:#e8edf3;min-width:135px;text-align:center">${navLabel}</span>
        <button onclick="trainNav(1)" style="${navBtn}"><i class="ti ti-chevron-right"></i></button>
        <button onclick="state.trainAnchor='${todayIso}';renderTrainings()" style="${navBtn};font-size:11px;font-weight:700">Heute</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <button class="edit-only" onclick="addTraining()" style="font-size:11.5px;font-weight:800;padding:8px 15px;border-radius:8px;cursor:pointer;border:1px solid rgba(201,168,76,0.4);background:rgba(201,168,76,0.16);color:#c9a84c"><i class="ti ti-plus"></i> Neues Training</button>
      <button onclick="toggleTrainCfg()" style="font-size:11px;font-weight:700;padding:8px 13px;border-radius:8px;cursor:pointer;border:1px solid ${state.trainCfgOpen?'rgba(201,168,76,0.4)':'rgba(255,255,255,0.12)'};background:${state.trainCfgOpen?'rgba(201,168,76,0.12)':'rgba(255,255,255,0.04)'};color:${state.trainCfgOpen?'#c9a84c':'rgba(255,255,255,0.6)'}"><i class="ti ti-settings"></i> Werkzeuge ${state.trainCfgOpen?'▴':'▾'}</button>
    </div>
    ${toolsPanel}
    ${bodyHTML}`;
}
function trainingsSetupHint(){
  const sql=`create table if not exists trainings (
  id text primary key,
  date date,
  time_from text,
  time_to text,
  ort text,
  typ text,
  titel text,
  note text,
  groups jsonb default '[]'::jsonb,
  created_at timestamptz default now()
);
alter table trainings enable row level security;
create policy trainings_read on trainings for select to authenticated using (true);
create policy trainings_write on trainings for all to authenticated using ((select auth.email()) is distinct from 'tl@fe.ch') with check ((select auth.email()) is distinct from 'tl@fe.ch');`;
  return `<div class="card" style="padding:24px;max-width:700px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><i class="ti ti-database-cog" style="font-size:22px;color:#f59e0b"></i><div style="font-size:15px;font-weight:700;color:#e2e8f0">Tabelle «trainings» anlegen</div></div>
    <p style="font-size:13px;color:rgba(255,255,255,0.6);line-height:1.6;margin-bottom:12px">Einmalig in Supabase → SQL Editor ausführen, dann Seite neu laden:</p>
    <pre style="background:#0a121e;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px;font-size:11px;color:#9fb4cc;overflow:auto;white-space:pre;line-height:1.5">${esc(sql)}</pre>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button onclick="navigator.clipboard.writeText(\`${sql.replace(/`/g,'\\`')}\`).then(()=>showSavedToast('✓ SQL kopiert'))" style="padding:9px 16px;font-size:12px;font-weight:700;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);border-radius:8px;color:#c9a84c;cursor:pointer"><i class="ti ti-copy"></i> SQL kopieren</button>
      <button onclick="_trainingsTableMissing=false;_trainingsLoaded=false;renderTrainings()" style="padding:9px 16px;font-size:12px;font-weight:700;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:8px;color:#22c55e;cursor:pointer"><i class="ti ti-refresh"></i> Erneut prüfen</button>
    </div>
  </div>`;
}

function _trainScopeRange(scope){
  const a=_td(state.trainAnchor);
  if(scope==='week'){ const mon=mondayOf(a); const end=new Date(mon); end.setDate(mon.getDate()+6); return [mon,end,'KW '+isoWeek(a)]; }
  if(scope==='month'){ return [new Date(a.getFullYear(),a.getMonth(),1), new Date(a.getFullYear(),a.getMonth()+1,0), a.toLocaleDateString('de-CH',{month:'long',year:'numeric'})]; }
  if(scope==='vor'){ return [new Date(2026,6,1), new Date(2026,11,31), 'Vorrunde 2026']; }
  if(scope==='rueck'){ return [new Date(2027,0,1), new Date(2027,5,30), 'Rückrunde 2027']; }
  return [new Date(2026,6,1), new Date(2027,5,30), 'Gesamte Saison']; // all
}
function trainingsPDF(scope){
  if(typeof window.jspdf==='undefined'){ showSavedToast('PDF-Bibliothek nicht geladen',false); return; }
  const {jsPDF}=window.jspdf; const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PWp=doc.internal.pageSize.getWidth(); const ML=14; let y=14;
  const [from,to,label]=_trainScopeRange(scope);
  try{ const src=(typeof getTeamLogo==='function')?getTeamLogo():null; if(src){ const fmt=/^data:image\/png/i.test(src)?'PNG':'JPEG'; doc.addImage(src,fmt,PWp-26,8,18,18); } }catch(e){}
  doc.setFontSize(15);doc.setFont(undefined,'bold');doc.setTextColor(201,168,76); doc.text('Trainingsplan · '+label,ML,16);
  doc.setFontSize(8.5);doc.setFont(undefined,'normal');doc.setTextColor(90,100,115); doc.text('FE12 Old Boys · '+new Date().toLocaleDateString('de-CH'),ML,22);
  doc.setDrawColor(201,168,76);doc.setLineWidth(0.5);doc.line(ML,25,PWp-ML,25); y=30;
  const list=(state.trainings||[]).filter(t=>{const d=_td(t.date); return d>=from && d<=to;}).sort((a,b)=>(a.date+(a.time_from||'')).localeCompare(b.date+(b.time_from||'')));
  // nach KW gruppieren
  const byWeek={};
  list.forEach(t=>{ const mon=_tiso(mondayOf(_td(t.date))); (byWeek[mon]=byWeek[mon]||[]).push(t); });
  const ensure=(n)=>{ if(y+n>285){ doc.addPage(); y=16; } };
  const weeks=Object.keys(byWeek).sort();
  if(!weeks.length){ doc.setFontSize(10);doc.setTextColor(120,130,145); doc.text('Keine Trainings in diesem Zeitraum.',ML,y); }
  weeks.forEach(ws=>{
    const w=trainKwData(ws); ensure(16);
    doc.setFillColor(201,168,76); doc.roundedRect(ML,y,PWp-2*ML,7,1.5,1.5,'F');
    doc.setFont(undefined,'bold');doc.setFontSize(9);doc.setTextColor(255,255,255);
    doc.text('KW '+(w?w.kw:isoWeek(_td(ws)))+(w?('  ·  '+[w.ta,w.te,w.hp].filter(Boolean).join(' · ')||w.label||''):''),ML+2,y+4.8);
    y+=10;
    byWeek[ws].forEach(t=>{
      const ty=(TR_TYP[t.typ]||TR_TYP.training).label; const att=trainAttCount(t);
      const grp=(t.groups||[]).map(g=>g.name+': '+(g.players||[]).map(pid=>{const p=PLAYERS.find(z=>z.id===pid);return p?vorname(p.name):'';}).filter(Boolean).join(', ')).join('  |  ');
      ensure(14);
      doc.setFont(undefined,'bold');doc.setFontSize(9);doc.setTextColor(30,41,59);
      doc.text(trainDateLabel(t.date)+'  '+(t.time_from||'')+(t.time_to?'–'+t.time_to:'')+'  ·  '+ty+(t.ort?'  ·  '+t.ort:'')+(t.titel?'  ·  '+t.titel:''),ML,y); y+=4.5;
      if(att.tot){ doc.setFont(undefined,'normal');doc.setFontSize(8);doc.setTextColor(34,150,80); doc.text('Anwesend: '+att.p+'/'+att.tot,ML+2,y); y+=4; }
      if(t.note){ doc.setFont(undefined,'normal');doc.setFontSize(8);doc.setTextColor(90,100,115); const ls=doc.splitTextToSize('Inhalt: '+t.note,PWp-2*ML-4); ensure(ls.length*3.6); doc.text(ls,ML+2,y); y+=ls.length*3.6+1; }
      if(grp){ doc.setFont(undefined,'normal');doc.setFontSize(8);doc.setTextColor(120,90,30); const ls=doc.splitTextToSize('Gruppen: '+grp,PWp-2*ML-4); ensure(ls.length*3.6); doc.text(ls,ML+2,y); y+=ls.length*3.6+1; }
      y+=2;
    });
    y+=3;
  });
  doc.save('FE12_Trainingsplan_'+scope+'_'+new Date().toISOString().slice(0,10)+'.pdf');
}
